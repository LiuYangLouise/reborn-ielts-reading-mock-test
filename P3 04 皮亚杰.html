<script>
    // 皮亚杰文章数据
    const piagetArticle = {
        title: "Jean Piaget (1896-1980)",
        bodyText: `Jean Piaget (1896-1980)

*Seymour Papert looks at the work of the pioneering Swiss philosopher and psychologist*

Jean Piaget spent much of his professional life listening to children, watching children and poring over reports of researchers around the world who were doing the same. He found, to put it most succinctly, that children don't think like grown-ups. After thousands of interactions with young people often barely old enough to talk, Piaget began to suspect that behind their cute and seemingly irrational utterances were thought processes that had their own kind of order and their own special logic. Einstein called it "a discovery so simple that only a genius could have thought of it."

Although not an educational reformer, Piaget championed a way of thinking about children that provided the foundation for today's education-reform movements. It was a shift comparable to the way modern anthropology displaced stories of primitive tribes being 'noble savages' and 'cannibals'. One might say that Piaget was the first to take children's thinking seriously.

He has been revered by generations of teachers inspired by the belief that children are not empty vessels to be filled with knowledge (as traditional pedagogical theory had it) but active builders of knowledge---little scientists who are constantly creating and testing their own hypotheses about the world. And though he may not be as famous as Sigmund Freud or even B. F. Skinner, his influence on psychology may be longer lasting.

In 1920, while doing research in a child-psychology laboratory in Paris, Piaget noticed that children of the same age made similar errors on intelligence tests. Fascinated by their reasoning processes, he began to suspect that the key to human knowledge might be discovered by observing how the child's mind develops. On his return to Switzerland he began watching children play, scrupulously recording their words and actions as their minds raced to find reasons for why things are the way they are. In one of his most famous experiments, Piaget asked children, 'What makes the wind?' A typical dialogue would be:

Piaget: What makes the wind?

Julia: The trees.

Piaget: How do you know?

Julia: I saw them waving their arms.

Piaget: How does that make the wind?

Julia: (waving her hand in front of his face) Like this. Only they are bigger. And there are lots of trees.

Piaget recognised that five-year-old Julia's beliefs, while not correct by any adult criterion, are not 'incorrect' either. They are entirely sensible and coherent within the framework of the child's way of knowing. Classifying them as 'true' or 'false' misses the point and shows a lack of respect for the child. What Piaget was after was a theory that the wind dialogue demonstrated coherence, ingenuity and the practice of a kind of explanatory principle (in this case by referring to body actions) that stands young children in very good stead when they don't know enough or don't have enough skill to handle the kind of explanation that grown-ups prefer.

Piaget was not an educator and never laid down rules about how to intervene in such situations. But his work strongly suggests that the automatic reaction of putting the child right may well be counter-productive. If their theories are always greeted by 'Nice try, but this is how it really is...' they might give up after a while on making theories. As Piaget put it, 'children have real understanding only of that which they invent themselves, and each time that we try to teach them something too quickly, we keep them from inventing it themselves.'

Disciples of Piaget have a tolerance for---indeed a fascination with---children's primitive laws of physics: that things disappear when they are out of sight; that the moon and the sun follow you around; that big things float and small things sink. Einstein was intrigued by Piaget's findings, especially by the idea that seven-year-olds insist that going faster can take more time---perhaps because this, like Einstein's own theories of relativity, runs so contrary to common sense.

Although every teacher in training still memorises Piaget's successive stages of childhood development, the greater part of Piaget's work is less well known, perhaps because schools of education regard it as 'too deep' for teachers. Piaget never thought of himself as a child psychologist. His real interest was epistemology---the theory of knowledge---which, like physics, was considered a branch of philosophy until Piaget came along and made it a science.

Through epistemology, Piaget explored multiple ways of knowing. He acknowledged them and examined them non-judgementally, yet with a philosopher's analytic rigour. Since Piaget, the territory has been widely colonised by those who write about women's ways of knowing, Afrocentric ways of knowing, even the computer's ways of knowing. Indeed, artificial intelligence and the information-processing model of the mind owe more to Piaget than its proponents may realise.

The core of Piaget is his belief that looking carefully at how knowledge develops in children will elucidate the nature of knowledge in general. Whether this has in fact led to deeper understanding remains, like everything about Piaget, controversial. In the past decade, Piaget has been vigorously challenged by the current fashion of viewing knowledge as an intrinsic property of the brain. Ingenious experiments have demonstrated that newborn infants already have some of the knowledge that Piaget believed children constructed. But for those, like me, who still see Piaget as the giant in the field of cognitive theory, the difference between what the baby brings and what the adult has is so immense that the new discoveries do not significantly reduce the gap, but only increase the mystery.`,
        // 选择题 27-31
        mcqQuestions: [
            { id: 27, text: "In the second paragraph, the writer mentions the example of modern anthropology to illustrate",
              options: [
                  "A. the universality of Piaget's insights into the workings of the mind.",
                  "B. the similarity between children's thought-processing in different cultures.",
                  "C. how Piaget's work represents a crucial turning-point in our approach to education.",
                  "D. how Piaget's work has aided our understanding of humankind's evolution from primitive origins."
              ] },
            { id: 28, text: "According to the writer, what point is illustrated by the dialogue about the wind?",
              options: [
                  "A. The factual accuracy of what children say is of minor significance.",
                  "B. Children want to learn about scientific principles.",
                  "C. Children's reasoning processes can be amusing to adults.",
                  "D. Children often pretend that they know the answers to questions."
              ] },
            { id: 29, text: "Piaget believed in the importance of",
              options: [
                  "A. preventing children from making false assumptions.",
                  "B. giving children honest feedback on their hypotheses.",
                  "C. showing children how to formulate their own ideas about the world.",
                  "D. maintaining children's confidence in their ability to interpret the world."
              ] },
            { id: 30, text: "What does the writer suggest in the seventh paragraph?",
              options: [
                  "A. Children's sense of their surroundings changes as they get older.",
                  "B. Children are able to grasp certain complex ideas as well as adults are.",
                  "C. Even apparently irrational ideas can be worthy of interest.",
                  "D. Sometimes the simplest explanations are the best."
              ] },
            { id: 31, text: "The writer's main purpose is to",
              options: [
                  "A. outline Piaget's contribution to a range of scientific fields.",
                  "B. summarise how education has benefited from Piaget's findings.",
                  "C. discuss Piaget's role in the development of 20th-century psychology.",
                  "D. express doubts about a number of Piaget's theories."
              ] }
        ],
        // 选词填空 32-36 (选项 A-I)
        wordBank: {
            A: "correct", B: "theories", C: "brain", D: "simple", E: "teachers", F: "psychology", G: "logical", H: "thought", I: "philosophers"
        },
        summarySentences: [
            { id: 32, text: "Piaget maintained that children's mental processes were far more _____ than they might appear." },
            { id: 33, text: "He encouraged the view that a child was not a 'blank slate' waiting to be filled with information, but rather a systematic builder of knowledge who regularly tries out his or her own _____ about the world." },
            { id: 34, text: "Piaget's impact on the area of _____ could well outlast that of more celebrated pioneers of this discipline." },
            { id: 35, text: "Despite doubts cast over his ideas by the current view associating knowledge exclusively with the _____ the effects of his work are still strong today." },
            { id: 36, text: "His principles are still widely used in the professional development of _____" }
        ],
        // 判断题 37-40 (YES/NO/NOT GIVEN)
        ynQuestions: [
            { id: 37, text: "Piaget's early work in Paris involved innovative research techniques." },
            { id: 38, text: "Piaget gave clear guidelines as to how adults should give information to children." },
            { id: 39, text: "Piaget made a significant contribution to the field of epistemology." },
            { id: 40, text: "We still have much to learn about the nature of knowledge." }
        ]
    };
    
    let articlesData = [piagetArticle];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 禁用右键默认菜单 + 禁止复制翻译
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
    document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
    document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    function startTimer() {
        if (submitted) return;
        if (articlesData.length === 0) return;
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        globalDeadline = Date.now() + (articlesData.length * 20 * 60 * 1000);
        if (!submitted) startTimer();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            let processed = escapeHtml(para).replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            if (processed.trim()) html += `<p>${processed}</p>`;
        }
        return html;
    }
    
    // 渲染题目区：选择题 + 选词填空 + 判断题
    function renderQuestionsPanel(article) {
        let html = `<div class="instruction-note">📌 阅读文章后作答。选择题请点选；选词填空请从下拉框选择正确选项；判断题请点选YES/NO/NOT GIVEN。</div>`;
        html += `<div class="questions-container">`;
        
        // 选择题 27-31
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 27–31</div>
            <div class="group-instruction">Choose the correct letter, A, B, C or D.</div>`;
        for (let q of article.mcqQuestions) {
            const answerKey = `${currentArticleIdx}_mcq_${q.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${q.id}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                </div>
                <div class="mcq-options">`;
            for (let opt of q.options) {
                const optLetter = opt.charAt(0);
                const isChecked = (saved === optLetter);
                html += `<label class="mcq-opt">
                    <input type="radio" name="mcq_${q.id}" value="${optLetter}" ${isChecked ? "checked" : ""} data-mcq-id="${q.id}" data-mcq-val="${optLetter}">
                    <span>${escapeHtml(opt)}</span>
                </label>`;
            }
            html += `</div></div>`;
        }
        html += `</div>`;
        
        // 选词填空 32-36
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 32–36</div>
            <div class="group-instruction">Complete the summary using the list of words, A-I, below.</div>`;
        for (let sent of article.summarySentences) {
            const answerKey = `${currentArticleIdx}_word_${sent.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${sent.id}</span>
                    <span class="q-text">${escapeHtml(sent.text)}</span>
                </div>
                <div class="word-select">
                    <select data-word-id="${sent.id}">
                        <option value="">-- Select answer --</option>`;
            for (let [letter, name] of Object.entries(article.wordBank)) {
                const selected = (saved === letter) ? 'selected' : '';
                html += `<option value="${letter}" ${selected}>${letter}. ${escapeHtml(name)}</option>`;
            }
            html += `</select>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 判断题 37-40 (YES/NO/NOT GIVEN)
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 37–40</div>
            <div class="group-instruction">YES / NO / NOT GIVEN</div>`;
        for (let q of article.ynQuestions) {
            const answerKey = `${currentArticleIdx}_yn_${q.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${q.id}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                </div>
                <div class="yn-options">
                    <label class="yn-opt">
                        <input type="radio" name="yn_${q.id}" value="YES" ${saved === "YES" ? "checked" : ""} data-yn-id="${q.id}">
                        <span>YES</span>
                    </label>
                    <label class="yn-opt">
                        <input type="radio" name="yn_${q.id}" value="NO" ${saved === "NO" ? "checked" : ""} data-yn-id="${q.id}">
                        <span>NO</span>
                    </label>
                    <label class="yn-opt">
                        <input type="radio" name="yn_${q.id}" value="NOT GIVEN" ${saved === "NOT GIVEN" ? "checked" : ""} data-yn-id="${q.id}">
                        <span>NOT GIVEN</span>
                    </label>
                </div>
            </div>`;
        }
        html += `</div>`;
        html += `</div>`;
        return html;
    }
    
    // 事件绑定
    function attachQuestionEvents() {
        // 选择题radio
        document.querySelectorAll('input[type="radio"][data-mcq-id]').forEach(radio => {
            radio.removeEventListener('change', handleMcqChange);
            radio.addEventListener('change', handleMcqChange);
        });
        // 选词填空下拉框
        document.querySelectorAll('select[data-word-id]').forEach(select => {
            select.removeEventListener('change', handleWordChange);
            select.addEventListener('change', handleWordChange);
        });
        // 判断题radio
        document.querySelectorAll('input[type="radio"][data-yn-id]').forEach(radio => {
            radio.removeEventListener('change', handleYnChange);
            radio.addEventListener('change', handleYnChange);
        });
    }
    
    function handleMcqChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-mcq-id'));
        const value = radio.getAttribute('data-mcq-val');
        const key = `${currentArticleIdx}_mcq_${qid}`;
        if (radio.checked) {
            userAnswers[key] = value;
            const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
            allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
        }
    }
    
    function handleWordChange(e) {
        if (submitted) return;
        const select = e.target;
        const qid = parseInt(select.getAttribute('data-word-id'));
        const value = select.value;
        const key = `${currentArticleIdx}_word_${qid}`;
        if (value) userAnswers[key] = value;
        else delete userAnswers[key];
    }
    
    function handleYnChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-yn-id'));
        const value = radio.value;
        const key = `${currentArticleIdx}_yn_${qid}`;
        userAnswers[key] = value;
        const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
        allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
    }
    
    function renderCurrent() {
        if (articlesData.length === 0) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        let questionsHtml = renderQuestionsPanel(article);
        document.getElementById('questionsRenderArea').innerHTML = questionsHtml;
        attachQuestionEvents();
        reapplyHighlightFeature();
        updateTabBar();
    }
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        let btnsHtml = '';
        for (let i = 0; i < articlesData.length; i++) {
            let activeClass = (i === currentArticleIdx) ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Piaget</button>`;
        }
        container.innerHTML = btnsHtml;
        document.getElementById('articleCountInfo').innerHTML = `${articlesData.length} 篇文章 (每篇20分钟)`;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (submitted) { alert("已提交答案，请清空后再切换"); return; }
                let idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
    }
    
    // 高亮功能
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch (err) { }
    }
    
    function handleContextMenuCustom(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        const articlePane = document.getElementById('articleRenderArea');
        while (target && target !== articlePane) {
            if (target.classList && target.classList.contains('highlight')) {
                highlightSpan = target;
                break;
            }
            target = target.parentElement;
        }
        if (!highlightSpan) return;
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const deleteOption = document.createElement('div');
        deleteOption.className = 'context-menu-item';
        deleteOption.textContent = '🗑️ Delete highlight';
        deleteOption.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const text = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(text, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(deleteOption);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function initHighlightFeature() {
        const pane = document.getElementById('leftArticlePane');
        pane.removeEventListener('mouseup', handleTextSelection);
        pane.addEventListener('mouseup', handleTextSelection);
        pane.removeEventListener('contextmenu', handleContextMenuCustom);
        pane.addEventListener('contextmenu', handleContextMenuCustom);
    }
    function reapplyHighlightFeature() { initHighlightFeature(); }
    
    // 提交汇总
    function computeResults() {
        let report = "";
        for (let idx = 0; idx < articlesData.length; idx++) {
            report += `\n📄 P${idx+1}: Jean Piaget\n─────────────────────\n`;
            let mcqKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_mcq_`)).sort();
            let wordKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_word_`)).sort();
            let ynKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_yn_`)).sort();
            for (let key of mcqKeys) {
                let qid = key.split('_')[2];
                report += `  ${qid}. ${userAnswers[key]}\n`;
            }
            for (let key of wordKeys) {
                let qid = key.split('_')[2];
                let letter = userAnswers[key];
                let name = piagetArticle.wordBank[letter] || letter;
                report += `  ${qid}. ${letter} (${name})\n`;
            }
            for (let key of ynKeys) {
                let qid = key.split('_')[2];
                report += `  ${qid}. ${userAnswers[key]}\n`;
            }
            if (mcqKeys.length === 0 && wordKeys.length === 0 && ynKeys.length === 0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已经提交过了");
        submitted = true;
        stopTimer();
        let resultStr = computeResults();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px; display:flex; gap:15px; justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResults()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('select, input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有已填答案？")) {
            userAnswers = {};
            submitted = false;
            document.getElementById('submitAllBtn').disabled = false;
            document.getElementById('resultPanel').style.display = 'none';
            renderCurrent();
            refreshTimer();
        }
    };
    
    renderCurrent();
    refreshTimer();
    initHighlightFeature();
</script>
</body>
</html>
