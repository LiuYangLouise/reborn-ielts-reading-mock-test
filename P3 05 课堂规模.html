        const fullArticleText = `Does Class Size Matter?

A Of all the ideas for improving education, few are as simple or attractive as reducing the number of pupils per teacher. Unlike competing proposals for reform, class-size reductions rarely elicit huge outcries or involve structural change. The testing of educators, by contrast, generally arouses the anger of unions. Similarly, establishing special 'charter' schools involves privileging some schools over others, with the credits provided usually coming out of the budgets of struggling local schools. With its uncomplicated appeal, class-size reduction in the U.S. has lately gone from being a subject of primary academic interest to a policy juggernaut with over twenty states aiming at decreasing class sizes.

B Do small classes improve school achievement? To answer this, investigators have attempted to analyse existing data, such as records at the U.S. Department of Education. These reveal that there were steep drops in pupil-teacher ratios between 1969 and 1997, but no significant gains in academic performance.

But do these findings mean that class size makes no difference? Not necessarily. For instance, schools strive for more than just high test scores; they also usually try to keep their drop-out rates low. And, indeed, the drop-out rate for older students fell considerably over that period. Because drop-outs generally come from the low end of the achievement distribution, a reduction in the drop-out rate could be expected to pull down average test scores.

Another reason for discounting those data is the difficulty of ensuring a level playing field. In a perfect world, U.S. students would all come from well-off families, with two highly educated English-speaking parents who are involved in their children's schooling. Teachers would all be creative and have complete mastery of the subject matter. The reality is very different.

C Over the past 35 years, some studies of existing data have produced evidence that smaller classes benefit students, but most of these studies were poorly designed. The exception was the Tennessee study called Project STAR (Student Teacher Achievement Ratio). Frederick Mosteller of Harvard University has called it 'one of the greatest experiments in education in United States history'.

Students entering kindergarten were randomly assigned to one of three kinds of classes: a small class of 13 to 17 students, a regular-size class of 22 to 26 or a regular-size class with both a teacher and a full-time teacher's aide. The students remained in whatever category they had been assigned to throughout the third grade, after which they joined a regular classroom in the fourth. To ensure that teaching quality did not differ, teachers were randomly assigned to small and regular-size classrooms. Few teachers received any special training for working with small classes, and there were no new curricular materials.

D At the end of STAR, researchers analysed the data. Jeremy Finn of New York University and Charles Achilles of Eastern Michigan University found evidence for 'an array of benefits of small classes'. They calculated that students in smaller classes were outperforming their counterparts in regular-sized classes by the first grade and that this advantage persisted even after students returned to larger classes. They also found that the effect was stronger for black and Hispanic minority groups - a significant finding for policy-makers.

Eric Hanushek of Stanford, however, criticises some of STAR's key conclusions. He argues that STAR does not prove that gains persist long after students return to regular classes. It was debatable how much later improvement stemmed from other factors, such as a supportive home. Nor does he accept that the benefits accumulate, with participants widening the gap with their peers in larger classes year by year.

Hanushek and others have also shown that during the study too many children moved from regular to small classes, probably because school personnel caved in to parent demands. And Hanushek also asserts that STAR failed to ensure good randomisation of teacher and student assignments. However, these points do not undermine STAR's basic findings.

E The largest public class size reduction programme so far, California's, stands more as a warning than as worthy of emulation. That state is trying to reduce classes in kindergarten through grade three despite a shortage of teachers that is most acute in low-income areas.

This is exacerbating the disparity in resources available to rich and poor schools in California, because more affluent areas can attract the best teachers. Indeed, some of the extra teachers needed are being recruited from the poorer schools. Researchers found a statistically significant achievement advantage in reading, writing and mathematics for students in classes that had been reduced to 20. What is more, the effect did not vary for students of different backgrounds.

F Wisconsin's Student Achievement Guarantee in Education (SAGE) was a five-year pilot study to do some of the groundwork for a major project. Class sizes were reduced in only 14 schools, but it was noteworthy for targeting schools at which 30% of the students were below poverty level, compared with California's across-the-board approach. SAGE lowered the average pupil-teacher ratio in kindergarten through third grade to 12-15:1 from 21-25:1. Analysts have studied the results of first-grade students in these schools and similar first-grade students elsewhere and found the results accord with those from STAR.

STAR and SAGE have made it hard to argue against reducing class sizes. But the California initiative shows that reductions made with too little forethought can yield minuscule gains. Administrators need solid information before they can make sensible policy decisions.`;

                        <label class="match-opt"><input type="radio" name="proj_${q.id}" value="A" ${saved === "A" ? "checked" : ""} data-proj-id="${q.id}" data-proj-val="A"> <span>A. Project STAR</span></label>
                        <label class="match-opt"><input type="radio" name="proj_${q.id}" value="B" ${saved === "B" ? "checked" : ""} data-proj-id="${q.id}" data-proj-val="B"> <span>B. California class size reduction</span></label>
                        <label class="match-opt"><input type="radio" name="proj_${q.id}" value="C" ${saved === "C" ? "checked" : ""} data-proj-id="${q.id}" data-proj-val="C"> <span>C. SAGE</span></label>
                    </div>
                </div>`;
            }
            html += `</div>`;
            html += `</div>`;
            return html;
        }

        function attachEvents() {
            // Paragraph dropdowns
            document.querySelectorAll('select[data-para-id]').forEach(sel => {
                sel.removeEventListener('change', handleParaChange);
                sel.addEventListener('change', handleParaChange);
            });
            // Project radio buttons
            document.querySelectorAll('input[type="radio"][data-proj-id]').forEach(radio => {
                radio.removeEventListener('change', handleProjChange);
                radio.addEventListener('change', handleProjChange);
            });
        }
        
        function handleParaChange(e) {
            if(submitted) return;
            let sel = e.target;
            let qid = parseInt(sel.getAttribute('data-para-id'));
            let key = `${currentArticleIdx}_para_${qid}`;
            userAnswers[key] = sel.value;
        }
        
        function handleProjChange(e) {
            if(submitted) return;
            let radio = e.target;
            let qid = parseInt(radio.getAttribute('data-proj-id'));
            let val = radio.getAttribute('data-proj-val');
            let key = `${currentArticleIdx}_proj_${qid}`;
            if(radio.checked) {
                userAnswers[key] = val;
                // Uncheck others with same name (already handled by radio group)
                let all = document.querySelectorAll(`input[name="proj_${qid}"]`);
                all.forEach(r => { if(r !== radio && r.checked) r.checked = false; });
            }
        }
        
        function renderCurrent() {
            let art = articlesData[currentArticleIdx];
            let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(art.title)}</div><div class="article-text">${formatArticleText(art.bodyText)}</div></div>`;
            document.getElementById('articleRenderArea').innerHTML = artHtml;
            document.getElementById('questionsRenderArea').innerHTML = renderQuestionsPanel(art);
            attachEvents();
            initHighlight();
        }
        
        // Highlight feature
        function handleTextSelection(e) {
            if(submitted) return;
            const selection = window.getSelection();
            if(!selection.toString().trim()) return;
            const range = selection.getRangeAt(0);
            const container = document.getElementById('articleRenderArea');
            if(!container.contains(range.commonAncestorContainer)) return;
            try {
                const span = document.createElement('span');
                span.className = 'highlight';
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch(err) {}
        }
        
        function handleContextMenuCustom(e) {
            if(submitted) return;
            let target = e.target;
            let highlightSpan = null;
            const articlePane = document.getElementById('articleRenderArea');
            while(target && target !== articlePane) {
                if(target.classList && target.classList.contains('highlight')) {
                    highlightSpan = target;
                    break;
                }
                target = target.parentElement;
            }
            if(!highlightSpan) return;
            e.preventDefault();
            if(currentContextMenu) currentContextMenu.remove();
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            const delOpt = document.createElement('div');
            delOpt.className = 'context-menu-item';
            delOpt.textContent = '🗑️ Delete highlight';
            delOpt.onclick = (ev) => {
                ev.stopPropagation();
                const parent = highlightSpan.parentNode;
                const textNode = document.createTextNode(highlightSpan.textContent);
                parent.replaceChild(textNode, highlightSpan);
                parent.normalize();
                menu.remove();
                currentContextMenu = null;
            };
            menu.appendChild(delOpt);
            document.body.appendChild(menu);
            currentContextMenu = menu;
            setTimeout(() => {
                const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
                document.addEventListener('click', closeHandler);
            }, 0);
        }
        
        function initHighlight() {
            const pane = document.getElementById('leftArticlePane');
            pane.removeEventListener('mouseup', handleTextSelection);
            pane.addEventListener('mouseup', handleTextSelection);
            pane.removeEventListener('contextmenu', handleContextMenuCustom);
            pane.addEventListener('contextmenu', handleContextMenuCustom);
        }
        
        function computeResults() {
            let report = "";
            for(let idx=0; idx<articlesData.length; idx++) {
                let art = articlesData[idx];
                report += `\n📄 ${art.title}\n─────────────────────\n`;
                let allKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_`)).sort();
                let map = new Map();
                for(let k of allKeys) {
                    let parts = k.split('_');
                    let qid = parseInt(parts[2]);
                    let val = userAnswers[k];
                    map.set(qid, val || "(no answer)");
                }
                let sorted = Array.from(map.keys()).sort((a,b)=>a-b);
                for(let q of sorted) {
                    report += `  ${q}. ${map.get(q)}\n`;
                }
                if(sorted.length===0) report += `  (no answers)\n`;
                report += `\n`;
            }
            return report;
        }
        
        document.getElementById('submitAllBtn').onclick = () => {
            if(submitted) return alert("Already submitted.");
            submitted = true;
            stopTimer();
            let resultStr = computeResults();
            let panel = document.getElementById('resultPanel');
            panel.innerHTML = `<div class="result-header">📊 Answer Summary (with question numbers)</div><div class="copy-area">${resultStr.replace(/\n/g,'<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy answers for checking</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
            panel.style.display = 'block';
            document.getElementById('copyResultsBtn')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(computeResults()); alert("Answers copied"); });
            document.getElementById('closeResultBtn')?.addEventListener('click', ()=>{ panel.style.display = 'none'; });
            document.getElementById('submitAllBtn').disabled = true;
            document.querySelectorAll('select, input').forEach(el => el.disabled = true);
        };
        
        document.getElementById('clearAllBtn').onclick = () => {
            if(confirm("Clear all answers and reset highlights?")) {
                stopTimer(); submitted=false; userAnswers={}; globalDeadline=null;
                renderCurrent(); document.getElementById('resultPanel').style.display='none';
                document.getElementById('submitAllBtn').disabled=false;
                refreshTimer();
            }
        };
        
        const parsed = parseArticle(combined, "Does Class Size Matter?");
        articlesData = [parsed];
        currentArticleIdx=0; submitted=false; userAnswers={};
        renderCurrent(); refreshTimer();
        
        function updateTabBar() {
            let container = document.getElementById('articleSwitchContainer');
            if(!articlesData.length) return;
            let btns = '';
            for(let i=0;i<articlesData.length;i++) {
                let activeClass = i===currentArticleIdx ? 'active-article' : '';
                btns += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Class Size</button>`;
            }
            container.innerHTML = btns;
            document.querySelectorAll('.nav-article-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(submitted) { alert("Already submitted, please reset first."); return; }
                    let idx = parseInt(btn.getAttribute('data-idx'));
                    if(!isNaN(idx) && idx !== currentArticleIdx) {
                        currentArticleIdx = idx;
                        renderCurrent();
                        updateTabBar();
                    }
                });
            });
            document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage (20 minutes)`;
        }
        updateTabBar();
    })();
</script>
</body>
</html>
