    // Disable native context menu except on highlight spans
    document.addEventListener('contextmenu', function(e) {
        let target = e.target;
        let isHighlightSpan = false;
        while(target && target !== document.body) {
            if(target.classList && target.classList.contains('highlight')) {
                isHighlightSpan = true;
                break;
            }
            target = target.parentElement;
        }
        if (!isHighlightSpan) {
            e.preventDefault();
            return false;
        }
        e.preventDefault();
        return false;
    });
    
    // Disable copy/cut

    document.addEventListener('cut', function(e) { e.preventDefault(); return false; });

        if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
            e.preventDefault();
            return false;

    // ---------- Margaret Mahy Article ----------
    const fullArticleText = `The New Zealand writer Margaret Mahy

In a career spanning some fifty years, Margaret Mahy has come to occupy a unique place in New Zealand writing with innovative fiction and original characterisation. In our solidly realist tradition, the linguistic fireworks of Mahy's children's fiction and the explorations of human behaviour at the heart of her supernatural teenage fiction stand gloriously alone. Mahy's clearest heir, I have always thought, is Elizabeth Knox --- and maybe the true inheritance there is sheer singularity. Just as there is no one else like Knox in New Zealand writing, Mahy, too, has ventured into imaginative territory unknown to other local writers. So it was with great pleasure that I visited Mahy recently at her Governor's Bay home to talk about her new book. As with all journalists, she is generous to a fault with her time and attention; and, as always --- despite her careful consideration of questions and thoughtful answers --- I'm reminded she isn't truly comfortable making herself or her life the heart of any conversation.

Certainly, any consideration of the style of Mahy's novels and picture books throws up some irresistible theories. As a writer committed to supporting herself through her art, she has seldom had the time for formal research. Rather, it has been a matter of going out and finding inspiration from her immediate environment: the writing on the side of a bus; a spelling mistake in a note to herself; the similarity between a cat and a fur hat. But despite these sometimes mundane origins, the settings for her stories are delightfully varied, as these books celebrate the dramatic plot twists and unpredictability of adventures on the high seas or in Antarctica, and also in quite unassuming places like the library or even down the back of a chair at home. Mahy has a lifelong affection for characters who are agents of upheaval and disturbance. Her junior and picture books are peppered with pirates, robbers and lions, though they appear alongside librarians, mothers and children, working against comfortable stereotype. Her fictions often have at their heart a young adult burdened with special powers, such as the ability to cast spells in order to transform their world in supernatural and fantastical ways. Another common feature is that, while the conclusions of her tales are usually predictable, they leave the reader feeling absolutely complete, the moral questions resulting from our hero's powers having been resolved.

Many of these themes can be found in her new novel, The Magician of Hoad. The book was begun more than 15 years ago and envisioned as an 'entire' fantasy --- one set in a fully imagined world with detailed history and complex tribal inter- relationships, a classical hero quest at its heart. The story ballooned at one point to 800 pages and has been through at least two substantial rewrites. Now half its original size, it is a fascinating read --- an adventure, a romance, and a gold mine of Mahy literary preoccupations.

The other splendid Mahy publication this year is a re- issue of Bubble Trouble in a now- illustrated edition. This tongue- twister tale first appeared in 1991, was included in 100 New Zealand Poems (1993) and has been recited by Mahy at countless private and public functions. Perhaps more than any other work, Bubble Trouble is the Mahy that New Zealand children and their parents know so well, the rollicking story of a clown who serves up a joyous torrent of word- play and unexpected rhyme.

Those connections are four or five deep now. I read The Lion in the Meadow in the School Journal in the late 1960s; my step- daughter listened to The Boy Who Was Followed Home over and over in the 1970s; my own children sat very still mouthing The Great White Man- Eating Shark in the 80s and 90s; now, in the 21st century, my grandchildren have heard Down the Dragon's Tongue, A Summery Saturday Morning and Dashing Dog many times.

Of course, readers are important to any working writer, but Mahy's espousal of the act of reading goes beyond that: a book is not properly finished, she has often said, until it has been read, because a reader brings something important to the book. So, doubtless out of need to build a market --- she's not ignorant of her popularity --- but also out of genuine care for that other dynamic part of the author- reader relationship, Mahy has, until recently, kept up a punishing schedule of public appearances.

Private conversation with Mahy has always been a wild ride --- marvellous, in the true sense of the word, the product of a hungry head and an infinite capacity to be astonished. She races away at one stage to consult an encyclopaedia for L. M. Montgomery's date of death, and speculates about the 'real' Montgomery, creator of the ever- popular Anne of Green Gables. Although I'd come to talk about her new book, I couldn't help but be captivated by her infectious curiosity.

A few years ago, the writer David Hill told a funny story. Though his writing was, he conceded, very different from Mahy's, he had been affected by her peculiarly alert way of looking at the world, particularly the mad, slippery life of language. Once, Hill said, in a motel room, a sign on a door caught his eye: 'This door is alarmed.' Mahy would like that, thought Hill. She would enjoy the comedy just below the surface of the formal warning; she would leap immediately to the possibilities for story and language play: 'Yes, and this window is concerned, this light fitting is irritated.' His story was a wonderful comment on Mahy's vision.`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];

    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("Time is up! Please submit your answers.");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;
        if (!submitted) startTimerForCurrentArticle();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) html += `<p>${escapeHtml(para)}</p>`;
        }
        return html;
    }

        for (let q of ynQuestions) {

            html += `<div class="question-item"><div class="q-title"><span class="q-num">${q.id}</span> ${escapeHtml(q.text)}</div>`;
            html += `<div class="options-list">
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="YES" ${stored === 'YES' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> YES</label>
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="NO" ${stored === 'NO' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> NO</label>
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="NOT GIVEN" ${stored === 'NOT GIVEN' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> NOT GIVEN</label>
            </div></div>`;
        }
        
        // Summary completion 32-35 (select from A-I)
        html += `<div class="section-header" style="margin-top: 20px;">📝 Questions 32-35 (Complete the summary - choose A-I)</div>`;
        html += `<div class="summary-text">`;
        html += `<p><strong>Theories about Mahy's style</strong></p>`;
        html += `<p>Mahy's determination to earn a living from writing has encouraged her to find the ideas for her work in <select class="summary-select" data-sum-qid="32" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'A' ? 'selected' : ''}>A. disruptive and unpredictable</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'B' ? 'selected' : ''}>B. everyday</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'C' ? 'selected' : ''}>C. loveable</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'D' ? 'selected' : ''}>D. controversial</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'E' ? 'selected' : ''}>E. exotic and ordinary</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'F' ? 'selected' : ''}>F. isolated</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'G' ? 'selected' : ''}>G. unconfident</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'H' ? 'selected' : ''}>H. unsurprising but satisfying</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_32`] === 'I' ? 'selected' : ''}>I. magical</option></select> places.</p>`;
        html += `<p>The stories themselves are set in locations that are <select class="summary-select" data-sum-qid="33" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'A' ? 'selected' : ''}>A. disruptive and unpredictable</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'B' ? 'selected' : ''}>B. everyday</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'C' ? 'selected' : ''}>C. loveable</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'D' ? 'selected' : ''}>D. controversial</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'E' ? 'selected' : ''}>E. exotic and ordinary</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'F' ? 'selected' : ''}>F. isolated</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'G' ? 'selected' : ''}>G. unconfident</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'H' ? 'selected' : ''}>H. unsurprising but satisfying</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_33`] === 'I' ? 'selected' : ''}>I. magical</option></select>.</p>`;
        html += `<p>In terms of characterisation, almost all of her books feature unruly people, and very often an adolescent who possesses <select class="summary-select" data-sum-qid="34" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'A' ? 'selected' : ''}>A. disruptive and unpredictable</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'B' ? 'selected' : ''}>B. everyday</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'C' ? 'selected' : ''}>C. loveable</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'D' ? 'selected' : ''}>D. controversial</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'E' ? 'selected' : ''}>E. exotic and ordinary</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'F' ? 'selected' : ''}>F. isolated</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'G' ? 'selected' : ''}>G. unconfident</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'H' ? 'selected' : ''}>H. unsurprising but satisfying</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_34`] === 'I' ? 'selected' : ''}>I. magical</option></select> abilities.</p>`;
        html += `<p>Finally, the endings of the stories tend to be <select class="summary-select" data-sum-qid="35" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'A' ? 'selected' : ''}>A. disruptive and unpredictable</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'B' ? 'selected' : ''}>B. everyday</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'C' ? 'selected' : ''}>C. loveable</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'D' ? 'selected' : ''}>D. controversial</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'E' ? 'selected' : ''}>E. exotic and ordinary</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'F' ? 'selected' : ''}>F. isolated</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'G' ? 'selected' : ''}>G. unconfident</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'H' ? 'selected' : ''}>H. unsurprising but satisfying</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_35`] === 'I' ? 'selected' : ''}>I. magical</option></select>.</p>`;
        html += `</div>`;
        
        // Multiple choice 36-40
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 36-40 (Multiple choice)</div>`;
        
        const mcQuestions = [
            { id: 36, text: "What does the writer say about The Magician of Hoad?" },
            { id: 37, text: "According to the writer, Bubble Trouble" },
            { id: 38, text: "The writer's purpose in the fifth paragraph is to" },
            { id: 39, text: "According to the sixth paragraph, which of the following is true?" },
            { id: 40, text: "What is the writer doing in the final paragraph?" }
        ];
        
        const mcOptions = {
            36: ["A. It is partly based on true history.", "B. It was restructured in the writing process.", "C. It is quite different from conventional stories.", "D. It does not reflect the usual themes of Mahy's work."],
            37: ["A. was first illustrated in 1991.", "B. is written in plain language.", "C. is an old favourite for many families.", "D. has not been read aloud by Mahy before."],
            38: ["A. show how Mahy's style has changed through generations.", "B. criticise Mahy's children's stories for being repetitive.", "C. describe how new media have changed entertainment.", "D. illustrate Mahy's popularity with generations of children."],
            39: ["A. Readers sometimes do not finish Mahy's books.", "B. Mahy actively encourages feedback from readers.", "C. Readers are necessary in order to complete a book.", "D. Mahy does not realise how important she is to some readers."],
            40: ["A. illustrating Mahy's view of the world", "B. comparing Mahy with another writer", "C. correcting a misconception about Mahy", "D. suggesting reasons for Mahy's approach"]
        };
        
        for (let q of mcQuestions) {
            let answerKey = `${currentArticleIdx}_mc_${q.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${q.id}</span> ${escapeHtml(q.text)}</div>`;
            html += `<select class="choice-select" data-mc-qid="${q.id}" data-article="${currentArticleIdx}">`;
            html += `<option value="">-- Select answer --</option>`;
            for (let opt of mcOptions[q.id]) {
                let letter = opt.charAt(0);
                let selected = (stored === letter) ? 'selected' : '';
                html += `<option value="${letter}" ${selected}>${opt}</option>`;
            }
            html += `</select></div>`;
        }
        
        return html;
    }
    
    function attachDynamicEvents() {
        // YES/NO/NOT GIVEN
        document.querySelectorAll('input[data-yn-qid]').forEach(radio => {
            radio.removeEventListener('change', handleYNChange);
            radio.addEventListener('change', handleYNChange);
        });
        // Summary completion
        document.querySelectorAll('select[data-sum-qid]').forEach(sel => {
            sel.removeEventListener('change', handleSumChange);
            sel.addEventListener('change', handleSumChange);
        });
        // Multiple choice
        document.querySelectorAll('select[data-mc-qid]').forEach(sel => {
            sel.removeEventListener('change', handleMCChange);
            sel.addEventListener('change', handleMCChange);
        });
    }
    
    function handleYNChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.ynQid);
        let key = `${currentArticleIdx}_yn_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleSumChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleMCChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.mcQid);
        let key = `${currentArticleIdx}_mc_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 27-31】\n";
        for (let i = 27; i <= 31; i++) {
            let key = `${currentArticleIdx}_yn_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 32-35 (Summary completion)】\n";
        for (let i = 32; i <= 35; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 36-40 (Multiple choice)】\n";
        for (let i = 36; i <= 40; i++) {
            let key = `${currentArticleIdx}_mc_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "The New Zealand writer Margaret Mahy");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
