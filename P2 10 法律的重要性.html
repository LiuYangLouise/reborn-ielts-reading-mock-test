    const fullArticleText = `The Importance of Law

A The law influences all of us virtually all the time. It governs almost all aspects of our behaviour, and even what happens to us when we are no longer alive. It affects us from the embryo onwards. It governs the air we breathe, the food and drink we consume, our travel, family relationships, and our property. It applies at the bottom of the ocean and in space. Each time we examine a label on a food product, engage in work as an employee or employer, travel on the roads, go to school to learn or to teach, stay in a hotel, borrow a library book, create or dissolve a commercial company, play sports, or engage the services of someone for anything from plumbing a sink to planning a city, we are in the world of law.

B Law has also become much more widely recognised as the standard by which behaviour needs to be judged. A very telling development in recent history is the way in which the idea of law has permeated all parts of social life. The universal standard of whether something is socially tolerated is progressively becoming whether it is legal, rather than something that has always been considered acceptable. In earlier times, most people were illiterate. Today, by contrast, a vast number of people can read, and it is becoming easier for people to take an interest in law, and for the general population to help actually shape the law in many countries. However, law is a versatile instrument that can be used equally well for the improvement or the degradation of humanity.

C This, of course, puts law in a very significant position. In our rapidly developing world, all sorts of skills and knowledge are valuable. Those people, for example, with knowledge of computers, the internet, and communications technology are relied upon by the rest of us. There is now someone with IT skills or an IT help desk in every UK school, every company, every hospital, every local and central government office. Without their knowledge, many parts of commercial and social life today would seize up in minutes. But legal understanding is just as vital and as universally needed. The American comedian Jerry Seinfeld put it like this, 'We are all throwing the dice, playing the game, moving our pieces around the board, but if there is a problem, the lawyer is the only person who has read the inside of the top of the box.' In other words, the lawyer is the only person who has read and made sense of the rules.

D The number of laws has never been greater, nor has the volume of legislation that has to be absorbed and implemented by organisations and the community. In the UK, for instance, about 35 new Acts of Parliament are passed each year, along with thousands of new rules, regulations and court decisions. Parliamentary output has more than doubled from about 1,100 pages a year in the early 1970s, to over 2,500 pages a year today. Between 1997 and 2006, the legislature passed 365 Acts of Parliament and more than 32,000 legally binding statutory instruments. In a system with so much law, lawyers do a great deal not just to vindicate the rights of citizens and organisations but also to help develop the law through legal arguments, some of which are adapted by judges to become laws. Law courts can and do produce new law and revise old law, but they do so having heard the arguments of lawyers.

E However, despite their important role in developing the rules, lawyers are not universally admired. Anti-lawyer jokes have a long history going back to the ancient Greeks. More recently, the son of a famous Hollywood actor was asked at his junior school what his father did for a living, to which he replied, 'My daddy is a movie actor, and sometimes he plays the good guy, and sometimes, he plays the lawyer.' For balance, though, it is worth remembering that there are and have been many heroic and revered lawyers such as the Roman philosopher and politician Cicero, and Mahatma Gandhi, the Indian campaigner for Independence.

F People sometimes make comments that characterise lawyers as professionals whose concerns put personal reward above truth, or who gain financially from misfortune. There are undoubtedly lawyers that would fit that bill, just as there are some scientists, journalists and others in that category. But, in general, it is no more just to say that lawyers are bad because they make a living from people's problems than it is to make the same accusation in respect of nurses or IT consultants. A great many lawyers are involved in public law work, such as that involving civil liberties, housing and other issues. Such work is not lavishly remunerated and the quality of the service provided by these lawyers relies on considerable professional dedication. Moreover, much legal work has nothing to do with conflict or misfortune, but is primarily concerned with drafting documents. Another source of social disaffection for lawyers, and disaffection for the law, is a limited public understanding of how law works and how it could be changed. Greater clarity about these issues, maybe as a result of better public relations, would reduce many aspects of public dissatisfaction with the law.`;

    function parseArticleContent(fullText, fallbackTitle) {

        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);

            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();

            return m;

        html += `<p><strong>Lawyers as professionals</strong></p>`;
        html += `<p>People sometimes say that <input type="text" class="fill-input" data-sum-qid="22" data-article="${currentArticleIdx}" placeholder="22" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_22`] || '')}"> is of little interest to lawyers, who are more concerned with making money.</p>`;
        html += `<p>This may well be the case with some individuals, in the same way that some <input type="text" class="fill-input" data-sum-qid="23" data-article="${currentArticleIdx}" placeholder="23" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_23`] || '')}"> or scientific experts may also be driven purely by financial greed.</p>`;
        html += `<p>However, criticising lawyers because their work is concerned with people's problems would be similar to attacking IT staff or <input type="text" class="fill-input" data-sum-qid="24" data-article="${currentArticleIdx}" placeholder="24" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_24`] || '')}"> for the same reason.</p>`;
        html += `<p>In fact, many lawyers focus on questions relating, for example, to housing or civil liberties, which requires them to have <input type="text" class="fill-input" data-sum-qid="25" data-article="${currentArticleIdx}" placeholder="25" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_25`] || '')}"> to their work.</p>`;
        html += `<p>What's more, a lot of lawyers' time is spent writing <input type="text" class="fill-input" data-sum-qid="26" data-article="${currentArticleIdx}" placeholder="26" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_26`] || '')}"> rather than dealing with people's misfortunes.</p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        // Paragraph headings
        document.querySelectorAll('select[data-heading-para]').forEach(sel => {
            sel.removeEventListener('change', handleHeadingChange);
            sel.addEventListener('change', handleHeadingChange);
        });
        // Legal skills checkboxes
        const legalCheckboxes = document.querySelectorAll('.legal-checkbox');
        legalCheckboxes.forEach(cb => {
            cb.removeEventListener('change', handleLegalChange);
            cb.addEventListener('change', handleLegalChange);
        });
        // Summary completion
        document.querySelectorAll('input[data-sum-qid]').forEach(inp => {
            inp.removeEventListener('input', handleSumInput);
            inp.addEventListener('input', handleSumInput);
        });
    }
    
    function handleHeadingChange(e) {
        if (submitted) return;
        let paraLetter = e.target.dataset.headingPara;
        let key = `${currentArticleIdx}_heading_${paraLetter}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleLegalChange(e) {
        if (submitted) return;
        let selected = [];
        document.querySelectorAll('.legal-checkbox:checked').forEach(cb => {
            selected.push(cb.value);
        });
        if (selected.length > 2) {
            e.target.checked = false;
            selected = selected.filter(v => v !== e.target.value);
            alert("Please select exactly two options.");
        }
        let key = `${currentArticleIdx}_legal`;
        userAnswers[key] = selected.join(',');
        renderCurrent();
    }
    
    function handleSumInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 14-19 (Paragraph headings)】\n";
        const paragraphs = ['A', 'B', 'C', 'D', 'E', 'F'];
        for (let i = 0; i < paragraphs.length; i++) {
            let key = `${currentArticleIdx}_heading_${paragraphs[i]}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${14 + i}. ${ans}\n`;
        }
        report += "\n【Questions 20-21 (Legal skills - two answers)】\n";
        let legalAns = userAnswers[`${currentArticleIdx}_legal`] || "(not answered)";
        report += `  ${legalAns}\n`;
        report += "\n【Questions 22-26 (Summary - ONE WORD ONLY)】\n";
        for (let i = 22; i <= 26; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "The Importance of Law");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
