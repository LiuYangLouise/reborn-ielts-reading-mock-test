<body>
<div class="app-container">
    <div class="mock-header">
        <div class="title-area">
            <h1>🐜 Reborn新生留学 · 白蚁窝阅读模考</h1>
            <p>左键选中高亮，右键删除高亮 | 已内置 Termite Mounds | 禁止复制/查词/翻译</p>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn reset-btn" id="clearAllBtn">🗑️ 清空所有答案 & 重置</button>

    <div class="article-tab-bar" id="articleTabBar">

    </div>

    <div class="reading-dashboard">
        <div class="left-article-pane" id="leftArticlePane">
            <div id="articleRenderArea" style="min-height: 200px;"></div>
        </div>

            <div id="questionsRenderArea"></div>
        </div>
    </div>

    <div class="submit-section">

<script>
    // 禁用原生右键菜单（除高亮span外）
    document.addEventListener('contextmenu', function(e) {
        let target = e.target;
        let isHighlightSpan = false;
        while(target && target !== document.body) {
            if(target.classList && target.classList.contains('highlight')) {
                isHighlightSpan = true;
                break;
            }
            target = target.parentElement;
        }
        if (!isHighlightSpan) {
            e.preventDefault();
            return false;
        }
        e.preventDefault();
        return false;
    });
    
    // 禁止复制/剪切等
    document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
    document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
            e.preventDefault();
            return false;
        }
        if (e.key === 'F12' || e.key === 'ContextMenu') {
            e.preventDefault();
            return false;
        }
    });
    
    // ---------- 文章内容 ----------
    const fullArticleText = `Termite Mounds

Could the vast towers of mud constructed by insects in sub-Saharan
Africa hold the key to our energy-efficient building of the future?

A To most of us, termites are destructive insects which can cause damage
on a devastating scale. But according to Dr Rupert Soar of Loughborough
University's School of Mechanical and Manufacturing Engineering, these
pests may serve a useful purpose for us after all. His multidisciplinary
team of British and American engineers and biologists has set out to
investigate the giant mounds built by termites in Namibia, in
sub-Saharan Africa, as part of the most extensive study of these
structures ever taken.

B Termite mounds are impressive for their size alone; typically they are
three metres high, and some as tall as eight metres have been found.
They also reach far into the earth, where the insects 'mine' their
building materials, carefully selecting each grain of sand they use. The
termite's nest is contained in the central cavity of the mound, safely
protected from the harsh environment outside. The mound itself is formed
of an intricate lattice of tunnels, which split into smaller and smaller
tunnels, much like a person's blood vessels.

C This complex system of tunnels draws in air from the outside,
capturing wind energy to drive it through the mound. It also serves to
expel spent respiratory gases from the nest to prevent the termites from
suffocating, so ensuring them a continuous provision of fresh,
breathable air. So detailed is the design that the nest stays within
three degrees of a constant temperature, despite variations on the
outside of up to 50°C from blistering heat in the daytime to below
freezing on the coldest nights. The mound also automatically regulates
moisture in the air, by means of both its underground 'cellar', and
evaporation from the top of the mound. Some colonies even had
'chimneys' at a height of 20m to control moisture loss in the hottest
regions of sub-Saharan Africa.

D Furthermore, the termites have evolved in such a way as to outsource
some of their biological functions. Part of their digestive process is
carried out by a fungus, which they 'farm' inside the mound. This
fungus, which is found nowhere else on earth, thrives in the constant
and optimum environment of the mound. The termites feed the fungus with
slightly chewed wood pulp, which the fungus then breaks down into a
digestible sugary food to provide the insects with energy, and cellulose
which they use for building. And, although the termites must generate
waste, none ever leaves the structure, indicating that there is also
some kind of internal waste-recycling system.

E Scientists are so excited by the mounds that they have labelled them a
'super organism' because, in Soar's words, "They dance on the edge of
what we would perceive to be cool or, if you're too cold, you need to
thrive: that's called homeostasis." What the termites have done is to
move homeostatic function away from their body, into the structure in
which they live. "As more information comes to light about the unique
features of termite mounds, we may ultimately need to redefine our
understanding of what constitutes a 'living' organism."

F To reveal the structure of the mounds, Soar's team begins by filling
and covering their plaster of Paris, a chalky white paste based on the
mineral gypsum, which becomes rock-solid when dry. The researcher then
carves the plaster of Paris into half-millimetre-thick slices, and
photographs them sequentially. Once the pictures are digitally scanned,
computer technology is able to recreate complex three-dimensional images
of the mounds. These models have enabled the team to map termite
architecture at a level of detail never before attained.

G Soar hopes that the models will explain how termite mounds create a
self-regulating living environment which manages to respond to changing
internal and external conditions without drawing on any outside source
of power. If they do, the findings could be invaluable in informing
future architectural design, and could inspire buildings that are
self-sufficient, environmentally friendly, and cheap to run. "As we
approach a world of climate change and temperatures rise," he explains,
"there will not be enough fuel to drive air conditioners around the
world." It is hoped, says Soar, "that the findings will provide clues
that aid the ultimate development of new kinds of human habitats,
suitable for a variety of arid, hostile environments not only on the
earth but maybe one day on the moon and beyond."`;

    // 题目部分
    const questionsRaw = `**You should spend about 20 minutes on Questions 27-40, which are based on Reading Passage 3 on the following pages.**

**Questions 27-33**

**Reading Passage 3 has seven paragraphs A-G.**

**Choose the correct heading for each paragraph from the list of headings below.**

**Write the correct number, i-ix, in boxes 27-33 on your answer sheet.**

**List of Headings**

iii reconsidering the termite's reputation

iv principal functions of the termite mound

v distribution of termite mounds in sub-Saharan Africa

vi some potential benefits of understanding termite architecture

vii the astonishing physical dimensions of the termite mound

viii termite mounds under threat from global climate change

ix a mutually beneficial relationship

27 Paragraph A: [dropdown_27]

28 Paragraph B: [dropdown_28]

29 Paragraph C: [dropdown_29]

30 Paragraph D: [dropdown_30]

31 Paragraph E: [dropdown_31]

32 Paragraph F: [dropdown_32]

33 Paragraph G: [dropdown_33]

**Questions 34-37**

**Label the diagram below.**

**Choose ONE WORD ONLY from the passage for each answer.**

**Write your answers in boxes 34-37 on your answer sheet.**

(Diagram of termite mound with labeled parts: tunnels, air, moisture, evaporation)

34 ___________ (the network inside the mound)

35 ___________ (what is drawn in from outside)

36 ___________ (what is regulated in the air)

37 ___________ (process that occurs at the top of the mound)

**Questions 38-40**

**Do the following statements agree with the claims of the writer in Reading Passage 3?**

**In boxes 38-40 on your answer sheet, write**

YES if the statement agrees with the claims of the writer

NO if the statement contradicts the claims of the writer

NOT GIVEN if it is impossible to say what the writer thinks about this

38 The termite mound appears to process its refuse material internally.

39 Dr Soar's reconstruction involves scanning a single photograph of a complete mound into a computer.

40 New information about termite architecture could help people deal with future energy crises.`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 段落标题选项 i-ix
    const headingOptions = [
        { value: "", text: "请选择..." },
        { value: "i", text: "i methods used to investigate termite mound formation" },
        { value: "ii", text: "ii challenging our assumptions about the nature of life" },
        { value: "iii", text: "iii reconsidering the termite's reputation" },
        { value: "iv", text: "iv principal functions of the termite mound" },
        { value: "v", text: "v distribution of termite mounds in sub-Saharan Africa" },
        { value: "vi", text: "vi some potential benefits of understanding termite architecture" },
        { value: "vii", text: "vii the astonishing physical dimensions of the termite mound" },
        { value: "viii", text: "viii termite mounds under threat from global climate change" },
        { value: "ix", text: "ix a mutually beneficial relationship" }
    ];
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;
        if (!submitted) startTimerForCurrentArticle();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) {
                html += `<p>${escapeHtml(para)}</p>`;
            }
        }
        return html;
    }
    
    function generateDropdown(questionId, options, storedValue) {
        let html = `<select class="dropdown-select" data-qid="${questionId}" data-article="${currentArticleIdx}">`;
        for (let opt of options) {
            let selected = (storedValue === opt.value) ? 'selected' : '';
            html += `<option value="${opt.value}" ${selected}>${opt.text}</option>`;
        }
        html += `</select>`;
        return html;
    }
    
    function renderQuestions() {
        let html = `<div class="instruction-text">📌 Reading Passage: Termite Mounds · Questions 27-40</div>`;
        
        // 段落标题匹配 27-33
        html += `<div class="section-header">📋 Questions 27-33 (Paragraph Headings)</div>`;
        const paraLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
        for (let i = 0; i < paraLetters.length; i++) {
            let qid = 27 + i;
            let answerKey = `${currentArticleIdx}_heading_${qid}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${qid}</span> Paragraph ${paraLetters[i]}: ${generateDropdown(qid, headingOptions, stored)}</div></div>`;
        }
        
        // 图表填空 34-37
        html += `<div class="section-header" style="margin-top: 20px;">📐 Questions 34-37 (Label the diagram - ONE WORD ONLY)</div>`;
        html += `<div class="diagram-box">
            <div class="diagram-title">🐜 Termite Mound Cross-section</div>
            <div style="font-family: monospace; font-size: 12px; background: #e8f0f0; padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                <pre style="margin: 0; font-family: monospace;">
        ╱╲
       ╱  ╲
      ╱    ╲
     ╱      ╲  ← [37] ___________ (occurs at top)
    ╱        ╲
   ╱   [34]   ╲
  ╱  ________  ╲  ← network of passages
 ╱  ╱      ╲  ╲
╱__╱        ╲__╲
   │          │
   │  [36]    │  ← regulated in air
   │  & [35]  │  ← drawn from outside
   │__________│
                </pre>
            </div>
            <div class="diagram-item"><div class="diagram-label">34.</div> <input type="text" class="fill-input" data-note-qid="34" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_34`] || '')}"></div>
            <div class="diagram-item"><div class="diagram-label">35.</div> <input type="text" class="fill-input" data-note-qid="35" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_35`] || '')}"></div>
            <div class="diagram-item"><div class="diagram-label">36.</div> <input type="text" class="fill-input" data-note-qid="36" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_36`] || '')}"></div>
            <div class="diagram-item"><div class="diagram-label">37.</div> <input type="text" class="fill-input" data-note-qid="37" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_37`] || '')}"></div>
        </div>`;
        
        // YES/NO/NOT GIVEN 38-40
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 38-40 (YES / NO / NOT GIVEN)</div>`;
        
        const ynQuestions = [
            { id: 38, text: "The termite mound appears to process its refuse material internally." },
            { id: 39, text: "Dr Soar's reconstruction involves scanning a single photograph of a complete mound into a computer." },
            { id: 40, text: "New information about termite architecture could help people deal with future energy crises." }
        ];
        
        for (let q of ynQuestions) {
            let answerKey = `${currentArticleIdx}_yn_${q.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${q.id}</span> ${escapeHtml(q.text)}</div>`;
            html += `<div class="options-list">
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="YES" ${stored === 'YES' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> YES</label>
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="NO" ${stored === 'NO' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> NO</label>
                <label class="opt-label"><input type="radio" name="yn_${q.id}" value="NOT GIVEN" ${stored === 'NOT GIVEN' ? 'checked' : ''} data-yn-qid="${q.id}" data-article="${currentArticleIdx}"> NOT GIVEN</label>
            </div></div>`;
        }
        
        return html;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('.dropdown-select').forEach(sel => {
            sel.removeEventListener('change', handleDropdownChange);
            sel.addEventListener('change', handleDropdownChange);
        });
        document.querySelectorAll('.fill-input').forEach(inp => {
            inp.removeEventListener('input', handleNoteInput);
            inp.addEventListener('input', handleNoteInput);
        });
        document.querySelectorAll('input[data-yn-qid]').forEach(radio => {
            radio.removeEventListener('change', handleYNChange);
            radio.addEventListener('change', handleYNChange);
        });
    }
    
    function handleDropdownChange(e) {
        if (submitted) return;
        let sel = e.target;
        let qid = parseInt(sel.dataset.qid);
        let key = `${currentArticleIdx}_heading_${qid}`;
        userAnswers[key] = sel.value;
    }
    
    function handleNoteInput(e) {
        if (submitted) return;
        let inp = e.target;
        let qid = parseInt(inp.dataset.noteQid);
        let key = `${currentArticleIdx}_note_${qid}`;
        userAnswers[key] = inp.value.trim();
    }
    
    function handleYNChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.ynQid);
        let key = `${currentArticleIdx}_yn_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 27-33 (Paragraph Headings)】\n";
        for (let i = 27; i <= 33; i++) {
            let key = `${currentArticleIdx}_heading_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 34-37 (Diagram - ONE WORD ONLY)】\n";
        for (let i = 34; i <= 37; i++) {
            let key = `${currentArticleIdx}_note_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 38-40 (YES/NO/NOT GIVEN)】\n";
        for (let i = 38; i <= 40; i++) {
            let key = `${currentArticleIdx}_yn_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已提交过答案");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button><button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('.dropdown-select, .fill-input, input[type="radio"]').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有答案和重置高亮？")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Termite Mounds");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("已提交答案，请先清空"); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} 篇文章 (每篇20分钟)`;
    }
    updateTabBar();
</script>
</body>
</html>
