    const fullArticleText = `The Impact of the Potato

*Jeff Chapman relates the story of history's most important vegetable*

The potato was first cultivated in South America between three and seven thousand years ago, though scientists believe they may have grown wild in the region as long as 13,000 years ago. The genetic patterns of potato distribution indicate that the potato probably originated in the mountainous west-central region of the continent.

Early Spanish chroniclers who misused the Indian word batata (sweet potato) as the name for the potato noted the importance of the tuber to the Incan Empire. The Incas had learned to preserve the potato for storage by dehydrating and mashing potatoes into a substance called chuño, which could be stored in a room for up to 10 years, providing excellent insurance against possible crop failures. As well as using the food as a staple crop, the Incas thought potatoes made childbirth easier and used them to treat injuries.

The Spanish conquistadors first encountered the potato when they arrived in Peru in 1532 in search of gold, and noted Inca miners eating chuño. At the time the Spaniards failed to realize that the potato represented a far more important treasure than either silver or gold, but they did gradually begin to use potatoes as basic rations aboard their ships. After the arrival of the potato in Spain in 1570, a few Spanish farmers began to cultivate them on a small scale, mostly as food for livestock.

Throughout Europe, potatoes were regarded with suspicion, distaste and fear. Generally considered to be unfit for human consumption, they were used only as animal fodder and sustenance for the starving. In northern Europe, potatoes were primarily grown in botanical gardens as an exotic novelty. Even peasants refused to eat from a plant that produced ugly, misshapen tubers and that had come from a heathen civilization. Some felt that the potato plant's resemblance to plants in the nightshade family hinted that it was the creation of witches or devils.

In meat-loving England, farmers and urban workers regarded potatoes with extreme distaste. In 1662, the Royal Society recommended the cultivation of the tuber to the English government and the nation, but this recommendation had little impact. Potatoes did not become a staple until, during the food shortages associated with the Revolutionary Wars, the English government began to officially encourage potato cultivation. In 1795, the Board of Agriculture issued a pamphlet entitled "Hints Respecting the Culture and Use of Potatoes"; this was followed shortly by pro-potato editorials and potato recipes in The Times. Gradually, the lower classes began to follow the lead of the upper classes.

A similar pattern emerged across the English Channel in the Netherlands, Belgium and France. While the potato slowly gained ground in eastern France (where it was often the only crop remaining after marauding soldiers plundered wheat fields and vineyards), it did not achieve widespread acceptance until the late 1700s. The peasants remained suspicious, in spite of a 1771 paper from the Faculte de Paris testifying that the potato was not harmful but beneficial. The people began to overcome their distaste when the plant received the royal seal of approval: Louis XVI began to sport a potato flower in his buttonhole, and Marie-Antoinette wore a purple potato blossom in her hair.

Frederick the Great of Prussia saw the potato's potential to help feed his nation and lower the price of bread, but faced the challenge of overcoming the people's prejudice against the plant. When he issued a 1774 order for his subjects to grow potatoes as protection against famine, the town of Kolberg replied: "The things have neither smell nor taste, not even the dogs will eat them, so what use are they to us?" Trying a less direct approach to encourage his subjects to begin planting potatoes, Frederick used a bit of reverse psychology: he planted a royal field of potato plants and stationed a heavy guard to protect this field from thieves. Nearby peasants naturally assumed that anything worth guarding was worth stealing, and so sneaked into the field and snatched the plants for their home gardens. Of course, this was entirely in line with Frederick's wishes.

Historians debate whether the potato was primarily a cause or an effect of the huge population boom in industrial-era England and Wales. Prior to 1800, the English diet had consisted primarily of meat, supplemented by bread, butter and cheese. Few vegetables were consumed, most vegetables being regarded as nutritionally worthless and potentially harmful. This view began to change gradually in the late 1700s. The Industrial Revolution was drawing an ever-increasing percentage of the populace into crowded cities, where only the richest could afford homes with ovens or coal storage rooms, and people were working 12-16 hour days which left them with little time or energy to prepare food. High-yielding, easily prepared potato crops were the obvious solution to England's food problems.

Whereas most of their neighbours regarded the potato with suspicion and had to be persuaded to use it by the upper classes, the Irish peasantry embraced the tuber more passionately than anyone since the Incas. The potato was well suited to the Irish soil and climate, and its high yield suited the most important concern of most Irish farmers: to feed their families.

The most dramatic example of the potato's potential to alter population patterns occurred in Ireland, where the potato had become a staple by 1800. The Irish population doubled to eight million between 1780 and 1841, this without any significant expansion of industry or reform of agricultural techniques beyond the widespread cultivation of the potato. Though Irish landholding practices were primitive in comparison with those of England, the potato's high yields allowed even the poorest farmers to produce more healthy food than they needed with scarcely any investment or hard labour. Even children could easily plant, harvest and cook potatoes, which of course required no threshing, curing or grinding. The abundance provided by potatoes greatly decreased infant mortality and encouraged early marriage.`;

    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";

            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }

            if (m === '>') return '&gt;';
            return m;

        html += `<p>9 Before 1800, English people preferred eating <input type="text" class="fill-input" data-sent-qid="9" data-article="${currentArticleIdx}" placeholder="9" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sent_9`] || '')}"> with bread, butter and cheese.</p>`;
        html += `<p>10 The obvious way to deal with England's food problems was high-yielding potato <input type="text" class="fill-input" data-sent-qid="10" data-article="${currentArticleIdx}" placeholder="10" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sent_10`] || '')}">.</p>`;
        html += `<p>11 The Irish <input type="text" class="fill-input" data-sent-qid="11" data-article="${currentArticleIdx}" placeholder="11" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sent_11`] || '')}"> and climate suited potatoes well.</p>`;
        html += `<p>12 Between 1780 and 1841, thanks to the <input type="text" class="fill-input" data-sent-qid="12" data-article="${currentArticleIdx}" placeholder="12" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sent_12`] || '')}"> of the potato, the Irish population doubled to eight million.</p>`;
        html += `<p>13 The potato's high yields helped the poorest farmers to produce more healthy food almost without <input type="text" class="fill-input" data-sent-qid="13" data-article="${currentArticleIdx}" placeholder="13" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sent_13`] || '')}">.</p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('input[data-tf-qid]').forEach(radio => {
            radio.removeEventListener('change', handleTFChange);
            radio.addEventListener('change', handleTFChange);
        });
        document.querySelectorAll('input[data-sent-qid]').forEach(inp => {
            inp.removeEventListener('input', handleSentInput);
            inp.addEventListener('input', handleSentInput);
        });
    }
    
    function handleTFChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.tfQid);
        let key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleSentInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sentQid);
        let key = `${currentArticleIdx}_sent_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 1-5】\n";
        for (let i = 1; i <= 5; i++) {
            let key = `${currentArticleIdx}_tf_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 6-13 (ONE WORD ONLY)】\n";
        for (let i = 6; i <= 13; i++) {
            let key = `${currentArticleIdx}_sent_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "The Impact of the Potato");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
