    // 禁用原生右键菜单（除高亮span外）
    document.addEventListener('contextmenu', function(e) {
        let target = e.target;
        let isHighlightSpan = false;
        while(target && target !== document.body) {
            if(target.classList && target.classList.contains('highlight')) {
                isHighlightSpan = true;
                break;
            }
            target = target.parentElement;
        }
        if (!isHighlightSpan) {
            e.preventDefault();
            return false;
        }
        e.preventDefault();
        return false;
    });
    
    // 禁止复制/剪切等
    document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
    document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {

    // ---------- 恐龙脚印 文章内容 ----------
    const fullArticleText = `Footprints in the Mud

*The dinosaurs may have risen to power in as little as 10,000 years.*

Everybody knows that the dinosaurs became extinct as a result of a large asteroid; something big hit the Earth 65 million years ago and, when the dust had fallen, so had the great reptiles. There is thus a nice, if ironic, symmetry in the idea that a similar impact brought about the dinosaurs' rise. That is the thesis proposed by Paul Olsen of Columbia University.

Dinosaurs first appear in the fossil record 230 million years ago, during the Triassic period. But they were mostly small, and they shared the Earth with lots of other sorts of reptile. It was in the subsequent Jurassic period, which began 202 million years ago, that they overran the planet and turned into the monsters realistically depicted in modern books and movies. Dr Olsen and his colleagues are not the first to suggest that the dinosaurs inherited the Earth as the result of an asteroid strike. But they are the first to show that the takeover did, indeed, happen in a geological eye- blink.

Dinosaurs are rare. Dinosaur footprints are, however, surprisingly abundant. And the size of the prints is as good an indication of the size of the beasts as are the skeletons themselves. Dr Olsen and his colleagues therefore concentrated on prints, not bones. The prints in question were made in Eastern North America, a part of the world then full of rift valleys similar to those in East Africa today. Like the modern African rift valleys, the Triassic/Jurassic American ones contained lakes, and these lakes grew and shrank at regular intervals because of climatic changes. Rocks from this place and period can be dated to within a few thousand years. As a bonus, squishy lake- edge sediments are just the things for recording the tracks of passing animals.

By dividing the labour between them, the research team were able to study such tracks at 80 sites and look at 18 so- called 'ichnotaxa'. These are recognisable types of footprint that cannot be matched precisely within the species of animal that left them. But they can be matched with a general sort of animal, and thus act as an indicator of the fate of that group, even when there are no bones to tell the story.

Their findings show that five of the ichnotaxa disappear before the end of the Triassic, and four march confidently across the boundary into the Jurassic. Six, however, vanish at the boundary, or only just splutter across it; and three appear from nowhere, almost as soon as the Jurassic begins. That boundary itself is suggestive. The first geological indication of the impact that killed the dinosaurs was an unusually high level of iridium in rocks at the end of the Cretaceous period, when the beasts disappear from the fossil record. Iridium is normally rare at the Earth's surface, but it is more abundant in meteorites. When people began to believe the impact theory, they started looking for other Cretaceous- end anomalies. One that turned up was a surprising abundance of fern spores in rocks just above the boundary layer - a phenomenon known as the 'fern spike'.

That matched the theory nicely. Many modern ferns are opportunists. They cannot compete against plants with leaves, but if a piece of land is cleared by, say, a volcanic eruption, they are often the first things to set up shop there. An asteroid strike would have scoured much of the Earth of its vegetable cover, and provided a paradise for ferns. A fern spike in the rocks is thus a good indication that something terrible has happened.

The surprises are how rapidly the new ichnotaxa appeared and how quickly they increased in size. Dr Olsen and his colleagues suggest that the explanation for this may be a phenomenon called ecological release. This is seen today when reptiles (which in modern times tend to be small creatures) reach islands where they face no competitors. The most spectacular example is on the Indonesian island of Komodo, where local lizards have grown so large that they are often referred to as dragons. The dinosaurs, in other words, could flourish only when the competition had been knocked out.

That leaves the question of where the impact happened. No large hole in the Earth's crust seems to be 202 million years old. It may, of course, have been overlooked. Old craters are eroded and buried, and not always easy to find. Alternatively, it may have vanished. Although continental crust is more or less permanent, the ocean floor is constantly recycled by the tectonic processes that bring about continental drift. There is no ocean floor left that is more than 200 million years old, so a crater that formed in the ocean would have been swallowed up by now.

There is a third possibility, however. This is that the crater is known, but has been misdated. The Manicouagan 'structure', a crater in Quebec, is thought to be 214 million years old. It is huge - some 100 kilometres across - and seems to be the largest of between three and five craters that formed within a few hours of each other as the lumps of disintegrated comet hit the Earth one by one. Such an impact would surely have had a perceptible effect on the world, but the rocks from 214 million years ago do not record one. It is possible, therefore, that Manicouagan has been misdated. That will be the next thing to check.`;

    const questionsRaw = `**You should spend about 20 minutes on Questions 1- 13, which are based on Reading Passage 1 below.**

Dr Olsen's group believe that the sudden increase in the size of dinosaurs may have been due to something known as 【7】. A current example of this can be found on Komodo Island in Indonesia, where some of the lizards are commonly called 【8】because of their size. Apparently, they have grown this big because they do not have any 【9】. The asteroid strike that may have cleared the way for dinosaurs to become the dominant group probably occurred 202 million years ago.

According to the writer, there are three possible reasons why we have not found a large hole in the Earth's crust dating back 202 million years. First, it may have been【10】 by scientists, because craters are easily covered up. Or, it could have【11】 ; for example, if the hole had been in the ocean, it would no longer exist because of the【12】 that produce continental drift. Thirdly, the hole could still exist but have been 【13】.`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;
        if (!submitted) startTimerForCurrentArticle();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) html += `<p>${escapeHtml(para)}</p>`;
        }
        return html;
    }
    
    // 渲染题目 - 填空题段落不加粗，无中文提示
    function renderQuestions() {

        html += `<div class="section-header">📋 Questions 1-6 (TRUE / FALSE / NOT GIVEN)</div>`;
        
        const tfQuestions = [
            { id: 1, text: "There is still doubt about the theory that an asteroid strike killed the dinosaurs." },
            { id: 2, text: "Books and the cinema have exaggerated the size of dinosaurs." },
            { id: 3, text: "Other scientists have rejected Olsen's idea of a sudden dinosaur occupation of the Earth." },
            { id: 4, text: "Dinosaur footprints are found more frequently than dinosaur skeletons." },
            { id: 5, text: "Ichnotaxa offer an exact identification of a dinosaur species." },
            { id: 6, text: "There is evidence that some groups of dinosaurs survived from the Triassic period into the Jurassic period." }
        ];
        
        for (let q of tfQuestions) {
            let answerKey = `${currentArticleIdx}_tf_${q.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${q.id}</span> ${escapeHtml(q.text)}</div>`;
            html += `<div class="options-list">
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="TRUE" ${stored === 'TRUE' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> TRUE</label>
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="FALSE" ${stored === 'FALSE' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> FALSE</label>
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="NOT GIVEN" ${stored === 'NOT GIVEN' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> NOT GIVEN</label>
            </div></div>`;
        }
        
        // 摘要填空区域 - 不加粗，无中文提示
        html += `<div class="section-header" style="margin-top: 20px;">📝 Questions 7-13 (Summary Completion)</div>`;
        html += `<div class="summary-text">`;
        html += `<p>Dr Olsen's group believe that the sudden increase in the size of dinosaurs may have been due to something known as <input type="text" class="fill-input" data-sum-qid="7" data-article="${currentArticleIdx}" placeholder="7" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_7`] || '')}">.</p>`;
        html += `<p>A current example of this can be found on Komodo Island in Indonesia, where some of the lizards are commonly called <input type="text" class="fill-input" data-sum-qid="8" data-article="${currentArticleIdx}" placeholder="8" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_8`] || '')}"> because of their size.</p>`;
        html += `<p>Apparently, they have grown this big because they do not have any <input type="text" class="fill-input" data-sum-qid="9" data-article="${currentArticleIdx}" placeholder="9" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_9`] || '')}">.</p>`;
        html += `<p>The asteroid strike that may have cleared the way for dinosaurs to become the dominant group probably occurred 202 million years ago.</p>`;
        html += `<p>According to the writer, there are three possible reasons why we have not found a large hole in the Earth's crust dating back 202 million years. First, it may have been <input type="text" class="fill-input" data-sum-qid="10" data-article="${currentArticleIdx}" placeholder="10" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_10`] || '')}"> by scientists, because craters are easily covered up.</p>`;
        html += `<p>Or, it could have <input type="text" class="fill-input" data-sum-qid="11" data-article="${currentArticleIdx}" placeholder="11" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_11`] || '')}"> ; for example, if the hole had been in the ocean, it would no longer exist because of the <input type="text" class="fill-input" data-sum-qid="12" data-article="${currentArticleIdx}" placeholder="12" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_12`] || '')}"> that produce continental drift.</p>`;
        html += `<p>Thirdly, the hole could still exist but have been <input type="text" class="fill-input" data-sum-qid="13" data-article="${currentArticleIdx}" placeholder="13" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_13`] || '')}">.</p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('input[data-tf-qid]').forEach(radio => {
            radio.removeEventListener('change', handleTFChange);
            radio.addEventListener('change', handleTFChange);
        });
        document.querySelectorAll('input[data-sum-qid]').forEach(inp => {
            inp.removeEventListener('input', handleSumInput);
            inp.addEventListener('input', handleSumInput);
        });
    }
    
    function handleTFChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.tfQid);
        let key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleSumInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 1-6】\n";
        for (let i = 1; i <= 6; i++) {
            let key = `${currentArticleIdx}_tf_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 7-13】\n";
        for (let i = 7; i <= 13; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Footprints in the Mud");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
