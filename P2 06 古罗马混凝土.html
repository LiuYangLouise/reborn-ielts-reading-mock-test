    // Disable native context menu except on highlight spans
    document.addEventListener('contextmenu', function(e) {
        let target = e.target;
        let isHighlightSpan = false;
        while(target && target !== document.body) {
            if(target.classList && target.classList.contains('highlight')) {
                isHighlightSpan = true;
                break;
            }
            target = target.parentElement;
        }
        if (!isHighlightSpan) {
            e.preventDefault();
            return false;
        }
        e.preventDefault();
        return false;
    });
    
    // Disable copy/cut
    document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
    document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
            e.preventDefault();

    // ---------- Learning from the Romans Article ----------
    const fullArticleText = `Learning from the Romans

*How an ancient building material is influencing modern construction*

A In a quest to make concrete more durable and sustainable, an international team of geologists and engineers has found inspiration in the concrete used by the ancient Romans. The chemical secrets of Roman concrete have been uncovered in samples taken from a concrete Roman breakwater. A breakwater is a barrier that is built out into the sea to protect coasts and harbors from the force of waves. This particular breakwater has spent the last 2,000 years submerged in seawater. The international team of researchers that collected the samples was led by Paulo Monteiro, a professor of civil and environmental engineering at the University of California, Berkeley. Analysis of samples from the ancient underwater site in Pozzuoli Bay near Naples in Italy, and pinpointed why the best Roman concrete was superior to most modern concrete.

B Concrete was the Roman Empire's construction material of choice. It was used in land monuments such as the Pantheon in Rome, as well as in underwater and partially underwater coastal and harbor structures. Monteiro and his team were particularly interested in how the coastal and harbor structures endured the unforgiving saltwater environment. Chemical analysis of Roman concrete showed that it differs from the modern kind in several ways. One is the content of the cement that binds the material in the concrete. The most commonly used cement in recent decades has been Portland cement. Portland cement is a compound of calcium, silicates, and hydrates (C-S-H). However, analysis of Roman concrete shows that it contains a significantly different cement. Roman cement contains aluminum, which is not found in Portland cement, and less silicon than is found in Portland cement. The resulting calcium-aluminum-silicate-hydrate (C-A-S-H) is an exceptionally stable cement.

C The recipe for the contents of Roman concrete was first described around 30 BC by Vitruvius, an engineer for the Roman Emperor Augustus. Volcanic ash was one of the ingredients, and it is now understood that this is crucial, as it is volcanic ash that contains the aluminum that ultimately gives Roman concrete its great durability. The Romans devised an efficient method of making concrete for coastal structures. They combined volcanic ash with lime, which added the calcium to the mix. This was then packed, together with stones and chunks of rock, into wooden molds, which were then immersed in seawater. The seawater instantly triggered a hot chemical reaction. The lime was hydrated by the seawater, which means that it incorporated water molecules into its structure, and reacted with the volcanic ash to cement the whole mixture together. This reaction formed the concrete that was used to build some of the most enduring structures in Western civilization.

D According to Marie Jackson, a member of the research team, Roman concrete is one of the most durable construction materials on the planet, and that was no accident. Shipping was the lifeline of political, economic, and military stability for the Roman Empire, so constructing harbors that would last was critical. Over time, the Romans used less and less concrete. 'As the Roman Empire declined, and shipping declined, the need for the seawater concrete declined,' said Jackson. You could also argue that the original structures were built so well that, once they were in place, they didn't need to be replaced,' she added.

E Producing Roman concrete also left a smaller carbon footprint than its modern counterpart. It's not that modern concrete isn't good---it's so good we use 19 billion tons of it a year,' says Monteiro. 'The problem is that manufacturing Portland cement accounts for seven percent of the carbon dioxide that industry puts into the air.' Portland cement holds most modern concrete together. However, making Portland cement releases carbon dioxide into the atmosphere from burning fuel in order to heat a mix of limestone and clays to 1,450 degrees Celsius. The production of Roman concrete, however, was much cleaner, as less heat was needed. A temperature that was a third lower than that required for making Portland cement was sufficient for making Roman concrete.

F Some modern concrete no longer contains Portland cement; instead, fly ash is used, which causes fewer greenhouse gas emissions. Fly ash is a waste product from burning coal, and the researchers are investigating whether volcanic ash would be a good, large- volume replacement in countries that cannot access fly ash easily. There is not enough fly ash in this world to replace half of the Portland cement being used,' said Monteiro. 'Many countries don't have fly ash, so the idea is to find alternative local materials that will work, including the kind of volcanic ash that Romans used. Using these alternatives could replace 40 percent of the world's demand for Portland cement.'

G Cutting greenhouse gas emissions is one powerful incentive for finding a better way to provide the concrete the world needs; another is the need for stronger, longer- lasting buildings, bridges, and other structures. In the middle 20th century, concrete structures were designed to last 50 years, and a lot of them are on borrowed time,' Monteiro says. 'Now we design buildings to last 100 to 120 years.' Yet Roman harbor installations have survived 2,000 years of chemical attack from seawater and wave action. Stronger, longer- lasting modern concrete may be the legacy of a deeper understanding of how the Romans made their incomparable concrete.`;

    const questionsRaw = `**You should spend about 20 minutes on Questions 14-26, which are based on Reading Passage 2 below.**

**Questions 14-20**

**Reading Passage 2 has seven paragraphs, A-G.**

**Which paragraph contains the following information?**

**Write the correct letter A-G in boxes 14-20 on your answer sheet.**

19 a comparison of the durability of Roman concrete with concrete produced today

20 details of how the Romans used seawater to make concrete

**Questions 21 and 22**

**Choose TWO letters, A-E.**

**Write the correct letters in boxes 21 and 22 on your answer sheet.**

According to the passage, which TWO of the following statements about fly ash are true?

A Fly ash results in less damage to the environment than Portland cement.

B Fly ash was used by the Romans as an alternative to volcanic ash.

C Fly ash is already used in the production of some concrete.

D All countries have access to fly ash resources.

E Fly ash will soon replace volcanic ash.

**Questions 23-26**

**Complete the summary below.**

**Choose ONE WORD AND/OR A NUMBER from the passage for each answer.**

**Write your answers in boxes 23-26 on your answer sheet.**

The environmental effects of concrete production

Roman concrete is better for the environment than modern concrete, which is made by using Portland cement. This is because a temperature of 1,450 degrees Celsius is needed to combine clays and 【23】to make Portland cement. This level of heat was reduced by a 【24】when making Roman concrete. Needing less heat meant less 【25】had to be burned and less carbon dioxide was produced. According to Monteiro, when considering the amount of carbon dioxide emitted by 【26】seven percent of it comes from the manufacture of Portland cement.`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("Time is up! Please submit your answers.");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;
        if (!submitted) startTimerForCurrentArticle();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) html += `<p>${escapeHtml(para)}</p>`;
        }
        return html;
    }

            { id: 16, text: "an argument for finding substitutes for a limited resource that is used in making cement" },
            { id: 17, text: "information about the structure from which the scientists took their Roman concrete samples" },
            { id: 18, text: "a comparison of the environmental impacts of making modern and Roman concrete" },
            { id: 19, text: "a comparison of the durability of Roman concrete with concrete produced today" },
            { id: 20, text: "details of how the Romans used seawater to make concrete" }
        ];
        
        for (let item of infoItems) {
            let answerKey = `${currentArticleIdx}_para_${item.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${item.id}</span> ${escapeHtml(item.text)}</div>`;
            html += `<select class="heading-select" data-para-qid="${item.id}" data-article="${currentArticleIdx}">`;
            html += `<option value="">-- Select paragraph --</option>`;
            for (let letter of ['A', 'B', 'C', 'D', 'E', 'F', 'G']) {
                let selected = (stored === letter) ? 'selected' : '';
                html += `<option value="${letter}" ${selected}>Paragraph ${letter}</option>`;
            }
            html += `</select></div>`;
        }
        
        // Multiple choice (two answers) 21-22
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 21-22 (Choose TWO letters, A-E)</div>`;
        html += `<div class="question-item"><div class="q-title"><span class="q-num">21 & 22</span> According to the passage, which TWO of the following statements about fly ash are true?</div>`;
        html += `<div class="checkbox-group">`;
        const flyAshOptions = [
            { letter: "A", text: "Fly ash results in less damage to the environment than Portland cement." },

            { letter: "C", text: "Fly ash is already used in the production of some concrete." },
            { letter: "D", text: "All countries have access to fly ash resources." },
            { letter: "E", text: "Fly ash will soon replace volcanic ash." }
        ];
        let storedFly = userAnswers[`${currentArticleIdx}_fly`] || "";
        let selectedFly = storedFly ? storedFly.split(',') : [];

            let isChecked = selectedFly.includes(opt.letter);

        html += `</div><div class="summary-hint" style="font-size:12px; color:#c97e5a; margin-top:8px;">Select exactly two options</div></div>`;
        
        // Summary completion 23-26 (ONE WORD AND/OR A NUMBER)
        html += `<div class="section-header" style="margin-top: 20px;">📝 Questions 23-26 (Complete the summary - ONE WORD AND/OR A NUMBER)</div>`;
        html += `<div class="summary-text">`;
        html += `<p>The environmental effects of concrete production</p>`;
        html += `<p>Roman concrete is better for the environment than modern concrete, which is made by using Portland cement. This is because a temperature of 1,450 degrees Celsius is needed to combine clays and <input type="text" class="fill-input" data-sum-qid="23" data-article="${currentArticleIdx}" placeholder="23" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_23`] || '')}"> to make Portland cement.</p>`;
        html += `<p>This level of heat was reduced by a <input type="text" class="fill-input" data-sum-qid="24" data-article="${currentArticleIdx}" placeholder="24" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_24`] || '')}"> when making Roman concrete.</p>`;
        html += `<p>Needing less heat meant less <input type="text" class="fill-input" data-sum-qid="25" data-article="${currentArticleIdx}" placeholder="25" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_25`] || '')}"> had to be burned and less carbon dioxide was produced.</p>`;
        html += `<p>According to Monteiro, when considering the amount of carbon dioxide emitted by <input type="text" class="fill-input" data-sum-qid="26" data-article="${currentArticleIdx}" placeholder="26" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_26`] || '')}"> seven percent of it comes from the manufacture of Portland cement.</p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        // Paragraph matching
        document.querySelectorAll('select[data-para-qid]').forEach(sel => {
            sel.removeEventListener('change', handleParaChange);
            sel.addEventListener('change', handleParaChange);
        });
        // Fly ash checkboxes
        const flyCheckboxes = document.querySelectorAll('.fly-checkbox');
        flyCheckboxes.forEach(cb => {
            cb.removeEventListener('change', handleFlyChange);
            cb.addEventListener('change', handleFlyChange);
        });
        // Summary completion
        document.querySelectorAll('input[data-sum-qid]').forEach(inp => {
            inp.removeEventListener('input', handleSumInput);
            inp.addEventListener('input', handleSumInput);
        });
    }
    
    function handleParaChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.paraQid);
        let key = `${currentArticleIdx}_para_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleFlyChange(e) {
        if (submitted) return;
        let selected = [];
        document.querySelectorAll('.fly-checkbox:checked').forEach(cb => {
            selected.push(cb.value);
        });
        if (selected.length > 2) {
            e.target.checked = false;
            selected = selected.filter(v => v !== e.target.value);
            alert("Please select exactly two options.");
        }
        let key = `${currentArticleIdx}_fly`;
        userAnswers[key] = selected.join(',');
        // Re-render to maintain state
        renderCurrent();
    }
    
    function handleSumInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 14-20 (Paragraph matching)】\n";
        for (let i = 14; i <= 20; i++) {
            let key = `${currentArticleIdx}_para_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 21-22 (Fly ash - two answers)】\n";
        let flyAns = userAnswers[`${currentArticleIdx}_fly`] || "(not answered)";
        report += `  ${flyAns}\n`;
        report += "\n【Questions 23-26 (Summary completion)】\n";
        for (let i = 23; i <= 26; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Learning from the Romans");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
