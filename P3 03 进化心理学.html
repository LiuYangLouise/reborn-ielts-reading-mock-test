    const fullArticleText = `Charles Darwin and Evolutionary Psychology

Charles Darwin, the brilliant anthropologist and creator of the theory of evolution, is not normally associated with the modern business world. Nevertheless, Darwinian evolutionary theory is the foundation of a new wave of ideas about human behaviour in general and particularly the way people behave in the workplace; these ideas have given the title of 'evolutionary psychology'. Evolutionary psychology revolves around the notion that our brains, like our bodies, have an inherited evolutionary design that has scarcely changed for 10,000 years. As respected evolutionary psychology experts Leda Cosmides and John Tooby comment, 'our modern skulls house a Stone Age mind'. The US biologist Edward O. Wilson sees evolutionary psychology as being a discipline which is based on both sociobiology, which is the study of the biological basis of social behaviour, and psychology, which is the systematic study of human behaviour.

Nigel Nicholson, an organisational psychologist from the London Business School, is a strong supporter of evolutionary psychology and on this subject has published Managing the Human Animal. His book takes the reader on a journey from the Stone Age plans of the savannah to the modern office, and includes a discussion of Darwinism and behavioural psychology, together with a dissection of dysfunctional organisational behaviour. It is an effective approach explaining why people behave as they do, particularly at work. Evolutionary psychology is increasingly being cited in management circles, where managers are trying to understand puzzling aspects of human behaviour and, by doing so, improve the workplace. Nicholson believes that evolutionary psychology can help managers understand what goes wrong in organisational life and what they can do about it.

Nicholson maintains that evolutionary psychology dismisses the long-held assumption that our minds are like blank pages just waiting for culture and experience to write on them and shape our nature. He points out that sophisticated research shows the brain actually houses a store of knowledge when we are born, and now genetic research is establishing there are certain genes that account for abilities, tastes and tendencies. The stored knowledge in the human brain has not changed much since the Stone Age. As Tooby and Cosmides stress, there have not been enough generations for a brain that is well-adapted to our post-industrial life to evolve through natural selection.

Nicholson argues that emotion is the central component of our mental make-up. He maintains that emotion was, and continues to be, our radar, guiding us throughout today's techno-defined business world, just as it once helped our ancestors to survive. It is obvious that the business world emphasises rational, not emotional, behaviour, but Nicholson maintains that we still use the emotional part of our minds to make sense of other people's behaviour and to act in a way that helps us to survive. He also notes that it takes very little to trigger people's innate distrust of others, even though nowadays our safety is not constantly under threat, as it was in the Stone Age. Our safety in antiquity depended on supporting our near family and friends and being suspicious of outsiders.

Nicholson draws the conclusion that by knowing the reasons for people's behaviour it is possible to mould corporate environments so that people act in a way that is more productive and less destructive. But not everyone finds his conclusions easy to accept. One group that resists his message is young MBA graduates. They have been taught to believe that business success depends on the relentless application of rational analysis to the facts. However, older and wiser executives, who have real experience of human nature, are more open to his ideas. Even so, these executives cling to the idea of a magic formula to bring people into line with the company's practices. But that is back-to-front thinking, according to Nicholson. Instead, he says, we should be reinventing our business structures, not our fundamental human nature, which has been around for millennia.

Nicholson has several specific recommendations about how the corporate world should adapt to human nature. For instance, he questions the trend towards working from home. He believes that people will prefer traditional working patterns if working from home leaves them isolated from their work community. He also doubts whether the virtual company, where people are linked mainly by electronic communication, will ever replace the real company, because people will still want to meet each other face-to-face. They will still aim at lifelong status advancement in the same way that individuals in primitive societies looked for status.`;

    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";

        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);

            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();

        html += `<p>Nicholson's ideas are unwelcome to <select class="summary-select" data-sum-qid="37" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'A' ? 'selected' : ''}>A. business leaders</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'B' ? 'selected' : ''}>B. MBA graduates</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'C' ? 'selected' : ''}>C. promotion structures</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'D' ? 'selected' : ''}>D. reward strategy</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'E' ? 'selected' : ''}>E. magic formula</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'F' ? 'selected' : ''}>F. strategic planning</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'G' ? 'selected' : ''}>G. back-to-front thinking</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'H' ? 'selected' : ''}>H. business environments</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_37`] === 'I' ? 'selected' : ''}>I. human nature</option></select> but some executives are more open to what evolutionary psychology says.</p>`;
        html += `<p>However, these executives still believe that there is a <select class="summary-select" data-sum-qid="38" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'A' ? 'selected' : ''}>A. business leaders</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'B' ? 'selected' : ''}>B. MBA graduates</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'C' ? 'selected' : ''}>C. promotion structures</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'D' ? 'selected' : ''}>D. reward strategy</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'E' ? 'selected' : ''}>E. magic formula</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'F' ? 'selected' : ''}>F. strategic planning</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'G' ? 'selected' : ''}>G. back-to-front thinking</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'H' ? 'selected' : ''}>H. business environments</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_38`] === 'I' ? 'selected' : ''}>I. human nature</option></select> that will make employees act according to the company's practices.</p>`;
        html += `<p>According to Nicholson, these senior executives are engaging in <select class="summary-select" data-sum-qid="39" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'A' ? 'selected' : ''}>A. business leaders</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'B' ? 'selected' : ''}>B. MBA graduates</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'C' ? 'selected' : ''}>C. promotion structures</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'D' ? 'selected' : ''}>D. reward strategy</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'E' ? 'selected' : ''}>E. magic formula</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'F' ? 'selected' : ''}>F. strategic planning</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'G' ? 'selected' : ''}>G. back-to-front thinking</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'H' ? 'selected' : ''}>H. business environments</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_39`] === 'I' ? 'selected' : ''}>I. human nature</option></select> and we should not try to change <select class="summary-select" data-sum-qid="40" data-article="${currentArticleIdx}"><option value="">-- Select --</option><option value="A" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'A' ? 'selected' : ''}>A. business leaders</option><option value="B" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'B' ? 'selected' : ''}>B. MBA graduates</option><option value="C" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'C' ? 'selected' : ''}>C. promotion structures</option><option value="D" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'D' ? 'selected' : ''}>D. reward strategy</option><option value="E" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'E' ? 'selected' : ''}>E. magic formula</option><option value="F" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'F' ? 'selected' : ''}>F. strategic planning</option><option value="G" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'G' ? 'selected' : ''}>G. back-to-front thinking</option><option value="H" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'H' ? 'selected' : ''}>H. business environments</option><option value="I" ${userAnswers[`${currentArticleIdx}_sum_40`] === 'I' ? 'selected' : ''}>I. human nature</option></select> but instead we should change our business structures.</p>`;

    function attachDynamicEvents() {
        // Multiple choice
        document.querySelectorAll('select[data-mc-qid]').forEach(sel => {
            sel.removeEventListener('change', handleMCChange);
            sel.addEventListener('change', handleMCChange);
        });
        // YES/NO/NOT GIVEN
        document.querySelectorAll('input[data-yn-qid]').forEach(radio => {
            radio.removeEventListener('change', handleYNChange);
            radio.addEventListener('change', handleYNChange);
        });
        // Summary completion
        document.querySelectorAll('select[data-sum-qid]').forEach(sel => {
            sel.removeEventListener('change', handleSumChange);
            sel.addEventListener('change', handleSumChange);
        });
    }
    
    function handleMCChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.mcQid);
        let key = `${currentArticleIdx}_mc_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleYNChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.ynQid);
        let key = `${currentArticleIdx}_yn_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleSumChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 27-31 (Multiple choice)】\n";
        for (let i = 27; i <= 31; i++) {
            let key = `${currentArticleIdx}_mc_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 32-35 (YES/NO/NOT GIVEN)】\n";
        for (let i = 32; i <= 35; i++) {
            let key = `${currentArticleIdx}_yn_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 36-40 (Summary completion)】\n";
        for (let i = 36; i <= 40; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Charles Darwin and Evolutionary Psychology");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
