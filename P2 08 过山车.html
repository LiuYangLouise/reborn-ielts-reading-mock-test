    const fullArticleText = `Roller coaster: the great fairground attraction

How they move

Like a passenger train, a roller coaster consists of a series of
connected cars that move on a track. But unlike a passenger train, it
has no engine or power source of its own. For most of the ride, it is
moved only by the forces of inertia and gravity. The only exertion of
energy occurs at the very beginning of the ride when the coaster train
is pulled up the lift hill.

The traditional lifting mechanism is a long length of chain running up
the hill under the track. The chain is fastened in a loop, which is
wound around a gear at the top of the hill and another one at the
bottom. The gear at the bottom of the hill is turned by a motor. This
turns the chain so that it continually moves up the hill like a long
conveyor belt. The coaster cars grip onto the chain, which simply pulls
them to the top. At the summit, the train is released and starts its
descent.

The purpose of this initial ascent is to build up a sort of reservoir of
potential energy, which simply means that as the coaster gets higher in
the air, there is a greater distance gravity can pull it down.

As the train starts coasting down the hill, this potential energy is
converted into kinetic energy (energy of motion), and the train speeds
up. At the bottom of the hill, this has reached its maximum, and this
propels the train up the second hill, again building up the
potential-energy level.

In this way, the course of the track is constantly converting energy
from kinetic to potential and back again. This fluctuation in
acceleration is what makes roller coasters so much fun. At its most
basic level, this is all a roller coaster is - a machine that uses
gravity and inertia to send a train along a winding track.

Coasting through history

Roller coasters have a long, fascinating history. Their direct ancestors
were ice slides, popular in Russia in the 16th and 17th centuries. They
consisted of a long, steep, wooden slide covered in ice. Riders walked
up a ladder or set of stairs to the top of the slide, as high as 21
metres up. At the top, they climbed into sleds made of wood or blocks of
ice and shot down the slope. At the base, the sleds would crash-land in
a sand pile.

It seems that the idea was then imported into France. For most of the
year, the warmer climate would melt the ice, so the French started
building waxed slides instead. To help the sleds move down these slides,
they added wheels, and in 1817, for the first time, a train was attached
to the track. The French continued to expand on this idea, coming up
with more complex track layouts, with multiple cars and all sorts of
twists and turns.

The first American roller coaster was built in the mountains of
Pennsylvania in the mid-1800s, originally to provide an easy way to send
coal to the railway 29 km down the mountain. When the track was first
built, a crew at the bottom of the mountain would attach the cart to a
team of mules after emptying the load, and the mules would drag it back
up to the top. They were eventually replaced with steam engines to make
the system more efficient.

Soon after these improvements were made, the railway company built a new
tunnel that brought the freight trains much closer to the coal mine. No
longer required for its original purpose, the roller coaster was
configured as a 'scenic tour'. For one dollar, tourists got a
leisurely ride up to the top of the mountain, followed by a wild, bumpy
ride straight down. This was soon a resounding success, attracting
thousands of tourists every year.

Scenic rides like this continued to thrive and were joined by wooden
roller coasters similar to the ones we know today. These coasters were
the main attraction at popular amusement parks throughout the United
States, such as the many parks of Coney Island in New York. By the
1920s, roller coasters were in full swing, with some 2,000 rides in
operation around the country.

Following the Great Depression, a decline in roller-coaster production
began in the early 1930s, but a second roller-coaster boom in the 1970s
and the beginning of the 1980s revitalised the amusement-park industry
and introduced a slew of innovative tubular steel coasters.

This was followed by a decline in interest for the rest of the decade,
but since the early 1990s the amusement-park industry has experienced
another coaster boom of sorts. New launching techniques and other
technological developments have opened up a world of options for
designers, so in some rides you feel as if you are flying. In the next
few years we can expect to see many faster, taller and more twisted
rides popping up in amusement parks around the world.`;

    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }

    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }

            if (submitted) return;

                return;

            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();

            if (m === '>') return '&gt;';

        html += `<div class="summary-text">`;
        html += `<p><strong>History of roller coasters</strong></p>`;
        html += `<p>- Modern roller coasters are descended from 16th-century Russian slides with a surface of <input type="text" class="fill-input" data-note-qid="17" data-article="${currentArticleIdx}" placeholder="17" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_17`] || '')}">.</p>`;
        html += `<p>- In France, because of the higher temperatures, the wooden surface on the slides was <input type="text" class="fill-input" data-note-qid="18" data-article="${currentArticleIdx}" placeholder="18" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_18`] || '')}">, and <input type="text" class="fill-input" data-note-qid="19" data-article="${currentArticleIdx}" placeholder="19" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_19`] || '')}"> were attached to the cars to ease the descent.</p>`;
        html += `<p>- The first US roller coaster was used for transporting <input type="text" class="fill-input" data-note-qid="20" data-article="${currentArticleIdx}" placeholder="20" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_20`] || '')}"> down a mountainside in carts.</p>`;
        html += `<p>- Initially, these were pulled by mules, but in time power was produced by <input type="text" class="fill-input" data-note-qid="21" data-article="${currentArticleIdx}" placeholder="21" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_21`] || '')}">.</p>`;
        html += `</div>`;
        
        // 判断题 22-26
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 22-26 (TRUE / FALSE / NOT GIVEN)</div>`;
        
        const tfQuestions = [
            { id: 22, text: "The earliest modifications to the basic slide were made in France." },
            { id: 23, text: "Roller coasters continued to increase in popularity throughout the 1920s and 1930s." },
            { id: 24, text: "New roller-coaster technology was introduced in the 1970s in response to public demand." },
            { id: 25, text: "Roller coasters were less popular for most of the 1980s than in the 1970s and 1990s." },
            { id: 26, text: "The design of roller-coaster rides became more varied in the 1990s." }
        ];
        
        for (let q of tfQuestions) {
            let answerKey = `${currentArticleIdx}_tf_${q.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${q.id}</span> ${escapeHtml(q.text)}</div>`;
            html += `<div class="options-list">
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="TRUE" ${stored === 'TRUE' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> TRUE</label>
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="FALSE" ${stored === 'FALSE' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> FALSE</label>
                <label class="opt-label"><input type="radio" name="tf_${q.id}" value="NOT GIVEN" ${stored === 'NOT GIVEN' ? 'checked' : ''} data-tf-qid="${q.id}" data-article="${currentArticleIdx}"> NOT GIVEN</label>
            </div></div>`;
        }
        
        return html;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('.fill-input').forEach(inp => {
            inp.removeEventListener('input', handleNoteInput);
            inp.addEventListener('input', handleNoteInput);
        });
        document.querySelectorAll('input[data-tf-qid]').forEach(radio => {
            radio.removeEventListener('change', handleTFChange);
            radio.addEventListener('change', handleTFChange);
        });
    }
    
    function handleTFChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.tfQid);
        let key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleNoteInput(e) {
        if (submitted) return;
        let inp = e.target;
        let qid = parseInt(inp.dataset.noteQid);
        let key = `${currentArticleIdx}_note_${qid}`;
        userAnswers[key] = inp.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 14-16 (Diagram - ONE WORD ONLY)】\n";
        for (let i = 14; i <= 16; i++) {
            let key = `${currentArticleIdx}_note_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 17-21 (Summary - NO MORE THAN TWO WORDS)】\n";
        for (let i = 17; i <= 21; i++) {
            let key = `${currentArticleIdx}_note_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 22-26 (TRUE / FALSE / NOT GIVEN)】\n";
        for (let i = 22; i <= 26; i++) {
            let key = `${currentArticleIdx}_tf_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已提交过答案");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button><button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('.fill-input, input[data-tf-qid]').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有答案和重置高亮？")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Roller coaster: the great fairground attraction");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("已提交答案，请先清空"); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} 篇文章 (每篇20分钟)`;
    }
    updateTabBar();
</script>
</body>
</html>
