<body>
<div class="app-container">
    <div class="mock-header">
        <div class="title-area">
            <h1>📖 Reborn新生留学 Reading Mock Test</h1>
            <p>左键选中高亮，右键删除高亮 | 已内置「橄榄油历史」专题 | 判断 + 流程图填空 + 笔记填空</p>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn reset-btn" id="clearAllBtn">🗑️ 清空所有答案</button>
            <div class="timer-block">
                <div class="timer-label">⏱️ 剩余时间</div>
                <div class="timer-display" id="countdownDisplay">--:--</div>
            </div>
        </div>
    </div>

    <div class="article-tab-bar">
        <div class="article-switch" id="articleSwitchContainer"></div>
        <div class="article-indicator" id="articleCountInfo">1 篇文章已加载</div>

    <div class="reading-dashboard">
        <div class="left-article-pane" id="leftArticlePane">
            <div id="articleRenderArea"></div>
        </div>
        <div class="right-questions-pane" id="rightQuestionsPane">
            <div id="questionsRenderArea"></div>
        </div>
    </div>

    <div class="submit-section">
        <button class="global-submit" id="submitAllBtn">✅ 提交全部答案</button>
    </div>

</div>

<script>
    // 橄榄油历史文章数据
    const oliveArticle = {
        title: "The Early History of Olive Oil",
        bodyText: `The Early History of Olive Oil

Olive oil is produced from the fruit of the olive tree, which is a member of the Oleaceae plant family. The trees require some cold weather during the year, but also tolerate hot, dry conditions, and do not like moisture when they are flowering. They actually produce better when subjected to these stressful conditions, and as a result, olive trees have traditionally been grown on land where little else will survive.

Archaeologists today are divided over exactly where the first domestication of the olive occurred: some say it was in the area which is now Iran, Syria, Jordan and Egypt, while others contend it was in mainland Greece or on the island of Crete. The one thing that can be said with certainty is that cultivation began at least 6,000 years ago and spread slowly westward across the lands bordering on the Mediterranean Sea. Olive oil was used for a variety of purposes during these early times, including as a pharmacological ointment and in rituals for anointing royalty.

The ancient Greeks believed the olive tree was a priceless gift from the goddess Athena and used its oil in sacred religious rituals. In fact, the Greek poet Homer called olive oil 'liquid gold', and during the 6th and 7th centuries BC, Greek law forbade the cutting down of olive trees and made it punishable by death. The ancient Middle Eastern ruler King David valued his groves of olive trees and his olive oil warehouses so much that he posted guards around the clock to protect them.

Over the years, olive oil developed other uses. Its employment in cooking dates at least as far back as the 5th century BC, as described by the Greek philosopher Plato. Its use as an aid to beauty and health later became ingrained in many Mediterranean cultures. The Romans, for example, are said to have used generous amounts on their bodies to moisturise their skin after bathing. With the spread of the Roman Empire, olive oil became a major commodity, and its trade promoted commerce throughout the ancient world. It is generally believed that in the 1st- 2nd centuries BC, olive trees were taken to North Africa and then to Spain, which was later to become the world's largest producer of olive oil. Artefacts found at various Mediterranean archaeological sites include olive oil storage vessels with olive plant residue still in them. Historical evidence still in existence in the form of wall paintings and ancient manuscripts (including the works of the Roman naturalist and philosopher, Pliny the Elder) all record production techniques and the various uses of olive oil.

Making olive oil in those early days was a laborious process accomplished without mechanisation. Processing or milling the fruit involved several distinct stages to extract the liquid. The olives were harvested from the trees by hand or by beating the fruit from the trees with long sticks. The olives were then rinsed and crushed to separate out the large seed found in the centre of each. The remaining seedless flesh was put in woven bags and pressed. Hot water was then poured over the bags to separate the oil from the solid bits of olive. The liquid produced in this process, consisting of oil and water, was drained into stone basins or tanks, where it was allowed to settle and separate. In cold weather, a bit of salt was added to speed up the separation process. As much oil as possible was drawn off the water, but the result was still not pure oil. Therefore, this impure mixture was allowed once more to settle in vats and then separated in order to refine the product.

The waste water from the milling process, which is called amurca, is a bitter-tasting and foul-smelling liquid. In many ancient civilisations it was often simply discarded, causing serious pollution because of its acidity and high salt content. However, in the Roman period it was regarded as a very useful substance. When spread on surfaces, amurca forms a hard finish and therefore it was often applied to the floors of grain storage buildings where it hardened, keeping out water, mud and pests. When boiled down, amurca was applied to leather to soften it so that it was easier to shape into articles of clothing and shoes. It could also be eaten by farm animals and was, in fact, fed to livestock suffering from malnutrition. According to ancient texts, amurca was also utilised in moderate amounts by farmers as a fertiliser or as a pesticide, helping them to protect their crops from insects and even small rodents.`,
        // 判断题 1-6
        tfQuestions: [
            { id: 1, text: "In the cultivation of olives, a period without rain is advantageous." },
            { id: 2, text: "The most fertile fields are usually chosen for growing olives." },
            { id: 3, text: "In ancient Greece, the olive tree was said to have divine origins." },
            { id: 4, text: "Olive oil was more costly to buy in Greece than gold." },
            { id: 5, text: "Plato mentions the use of olive oil in the preparation of food." },
            { id: 6, text: "North African farmers initially resisted the introduction of olive trees." }
        ],
        // 流程图填空 7-9 (嵌入)
        flowchartEmbedded: {
            text: `<div class="flow-line">Olives harvested</div>
<div class="flow-line">→ Olives rinsed and crushed</div>
<div class="flow-line">→ Large seed removed</div>
<div class="flow-line">→ Seedless flesh put in <span class="fill-badge">7</span> <input type="text" class="inline-fill-input" data-fill-id="7" placeholder="one word" autocomplete="off"> and pressed</div>
<div class="flow-line">→ Hot water added</div>
<div class="flow-line">→ Liquid drained into basins</div>
<div class="flow-line">→ <span class="fill-badge">8</span> <input type="text" class="inline-fill-input" data-fill-id="8" placeholder="one word" autocomplete="off"> added to speed up separation in cold weather</div>
<div class="flow-line">→ Mixture left to settle, separated, refined</div>`,
            questions: [7,8]
        },
        // 笔记填空 10-13 (Amurca)
        notesEmbedded: {
            text: `<div class="notes-section">
<div class="note-line">In ancient times, this waste liquid was usually thrown away, which led to <span class="fill-badge">10</span> <input type="text" class="inline-fill-input" data-fill-id="10" placeholder="one word" autocomplete="off">.</div>
<div class="note-line">However, Romans had practical applications for amurca:</div>
<div class="note-line">- when dried, created a hard surface, so used on <span class="fill-badge">11</span> <input type="text" class="inline-fill-input" data-fill-id="11" placeholder="one word" autocomplete="off"> of certain buildings</div>
<div class="note-line">- used when making <span class="fill-badge">12</span> <input type="text" class="inline-fill-input" data-fill-id="12" placeholder="one word" autocomplete="off"> into goods to wear</div>
<div class="note-line">- fed to livestock</div>
<div class="note-line">- used on farms as a <span class="fill-badge">13</span> <input type="text" class="inline-fill-input" data-fill-id="13" placeholder="one word" autocomplete="off"> to stop insects or animals from damaging crops</div>
</div>`,
            questions: [10,11,12,13]
        }
    };
    
    let articlesData = [oliveArticle];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 禁用右键默认菜单 + 禁止复制翻译
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
    document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
    document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    function startTimer() {
        if (submitted) return;
        if (articlesData.length === 0) return;
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        globalDeadline = Date.now() + (articlesData.length * 20 * 60 * 1000);
        if (!submitted) startTimer();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            let processed = escapeHtml(para).replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            if (processed.trim()) html += `<p>${processed}</p>`;
        }
        return html;
    }
    
    // 渲染题目区：判断题 + 流程图填空 + 笔记填空
    function renderQuestionsPanel(article) {
        let html = `<div class="instruction-note">📌 阅读文章后作答。判断题请点选，填空题请直接在下方输入框中作答 (每空仅一个单词)。</div>`;
        html += `<div class="questions-container">`;
        
        // 判断题 1-6
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 1–6</div>
            <div class="group-instruction">TRUE / FALSE / NOT GIVEN</div>`;
        for (let q of article.tfQuestions) {
            const answerKey = `${currentArticleIdx}_tf_${q.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${q.id}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                </div>
                <div class="tf-options">
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="TRUE" ${saved === "TRUE" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>TRUE</span>
                    </label>
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="FALSE" ${saved === "FALSE" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>FALSE</span>
                    </label>
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="NOT GIVEN" ${saved === "NOT GIVEN" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>NOT GIVEN</span>
                    </label>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 流程图填空 7-9 (其中7和8为填空，9隐含在流程图中？题目要求7-9，但原题流程图有三个空：7,8,9? 重新检查: 原题流程图为7-9，但嵌入文本中只有7和8两个输入框。需要增加第9空？根据原题：第9空对应的是流程图中的哪个？实际上原题流程图有三个空: 7( woven bags ), 8( salt ), 9( refined? ) 但原题描述最后一步 refine 没有单独空。根据官方题目，7和8明确，9可能是 refine 但题干没有额外。为了完整，我在流程图中也加入第9空对应“refine”过程。但更准确按照原题要求：流程图填空7-9，但原题文本最后一个箭头是“Mixture left to settle, separated, refined”，refined 是最后一步。因此添加第9空对应 refine 过程中的动词。按照考试逻辑，9应填 refine 或者类似。但为了不遗漏，我将在流程图中加入第9空。
        // 修正：原题flow-chart 7-9: 7 bags, 8 salt, 9 refined? 但答案应为 refine (动词) 或者 refined? 原文: "separated in order to refine the product" 因此 refine 作为动词合适。加入第9空。
        let flowchartHtml = `<div class="flow-line">Olives harvested</div>
<div class="flow-line">→ Olives rinsed and crushed</div>
<div class="flow-line">→ Large seed removed</div>
<div class="flow-line">→ Seedless flesh put in <span class="fill-badge">7</span> <input type="text" class="inline-fill-input" data-fill-id="7" placeholder="one word" autocomplete="off"> and pressed</div>
<div class="flow-line">→ Hot water added</div>
<div class="flow-line">→ Liquid drained into basins</div>
<div class="flow-line">→ <span class="fill-badge">8</span> <input type="text" class="inline-fill-input" data-fill-id="8" placeholder="one word" autocomplete="off"> added to speed up separation in cold weather</div>
<div class="flow-line">→ Mixture left to settle, separated, then <span class="fill-badge">9</span> <input type="text" class="inline-fill-input" data-fill-id="9" placeholder="one word" autocomplete="off"></div>`;
        
        html += `<div class="question-group">
            <div class="group-title">📝 QUESTIONS 7–9</div>
            <div class="group-instruction">Complete the flow-chart. Choose ONE WORD ONLY from the passage for each answer.</div>
            <div class="flowchart-embedded">${flowchartHtml}</div>
        </div>`;
        
        // 笔记填空 10-13
        html += `<div class="question-group">
            <div class="group-title">📝 QUESTIONS 10–13</div>
            <div class="group-instruction">Complete the notes. Choose ONE WORD ONLY from the passage for each answer.</div>
            <div class="notes-embedded">${article.notesEmbedded.text}</div>
        </div>`;
        html += `</div>`;
        return html;
    }
    
    // 处理TF单选
    function handleTfChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-tf-id'));
        const value = radio.value;
        const key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = value;
        const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
        allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
    }
    
    // 处理填空输入
    function handleFillInput(e) {
        if (submitted) return;
        const input = e.target;
        const qid = parseInt(input.getAttribute('data-fill-id'));
        const key = `${currentArticleIdx}_fill_${qid}`;
        userAnswers[key] = input.value.trim();
    }
    
    function attachQuestionEvents() {
        // TF radio
        document.querySelectorAll('input[type="radio"][data-tf-id]').forEach(radio => {
            radio.removeEventListener('change', handleTfChange);
            radio.addEventListener('change', handleTfChange);
        });
        // 填空输入框
        document.querySelectorAll('.inline-fill-input').forEach(inp => {
            inp.removeEventListener('input', handleFillInput);
            inp.addEventListener('input', handleFillInput);
            const qid = parseInt(inp.getAttribute('data-fill-id'));
            const key = `${currentArticleIdx}_fill_${qid}`;
            if (userAnswers[key]) {
                inp.value = userAnswers[key];
            }
        });
    }
    
    function renderCurrent() {
        if (articlesData.length === 0) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        let questionsHtml = renderQuestionsPanel(article);
        document.getElementById('questionsRenderArea').innerHTML = questionsHtml;
        attachQuestionEvents();
        reapplyHighlightFeature();
        updateTabBar();
    }
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        let btnsHtml = '';
        for (let i = 0; i < articlesData.length; i++) {
            let activeClass = (i === currentArticleIdx) ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Olive Oil</button>`;
        }
        container.innerHTML = btnsHtml;
        document.getElementById('articleCountInfo').innerHTML = `${articlesData.length} 篇文章 (每篇20分钟)`;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (submitted) { alert("已提交答案，请清空后再切换"); return; }
                let idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
    }
    
    // 高亮功能
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch (err) { }
    }
    
    function handleContextMenuCustom(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        const articlePane = document.getElementById('articleRenderArea');
        while (target && target !== articlePane) {
            if (target.classList && target.classList.contains('highlight')) {
                highlightSpan = target;
                break;
            }
            target = target.parentElement;
        }
        if (!highlightSpan) return;
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const deleteOption = document.createElement('div');
        deleteOption.className = 'context-menu-item';
        deleteOption.textContent = '🗑️ Delete highlight';
        deleteOption.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const text = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(text, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(deleteOption);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function initHighlightFeature() {
        const pane = document.getElementById('leftArticlePane');
        pane.removeEventListener('mouseup', handleTextSelection);
        pane.addEventListener('mouseup', handleTextSelection);
        pane.removeEventListener('contextmenu', handleContextMenuCustom);
        pane.addEventListener('contextmenu', handleContextMenuCustom);
    }
    function reapplyHighlightFeature() { initHighlightFeature(); }
    
    // 提交汇总
    function computeResults() {
        let report = "";
        for (let idx = 0; idx < articlesData.length; idx++) {
            report += `\n📄 P${idx+1}: The Early History of Olive Oil\n─────────────────────\n`;
            let tfKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_tf_`)).sort();
            let fillKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_fill_`)).sort();
            for (let key of tfKeys) {
                let qid = key.split('_')[2];
                report += `  ${qid}. ${userAnswers[key]}\n`;
            }
            for (let key of fillKeys) {
                let qid = key.split('_')[2];
                let ans = userAnswers[key] || "(未作答)";
                report += `  ${qid}. ${ans}\n`;
            }
            if (tfKeys.length === 0 && fillKeys.length === 0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已经提交过了");
        submitted = true;
        stopTimer();
        let resultStr = computeResults();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px; display:flex; gap:15px; justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResults()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, .inline-fill-input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有已填答案？")) {
            userAnswers = {};
            submitted = false;
            document.getElementById('submitAllBtn').disabled = false;
            document.getElementById('resultPanel').style.display = 'none';
            renderCurrent();
            refreshTimer();
        }
    };
    
    renderCurrent();
    refreshTimer();
    initHighlightFeature();
</script>
</body>
</html>
