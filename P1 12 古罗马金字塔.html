Though Rome draws tourists from around the world to its many impressive sites, one notable monument there has never attracted nearly as much interest: the Pyramid of Cestius. But why would there be a pyramid in Italy? After the Roman conquest of Egypt in 30 B.C., Egyptian architectural style became the fashion in Rome.

Though obelisks and other monuments inspired by Egypt's great pyramids sprang up around the city, only two actual pyramids are known to have been built. The only one left standing, the Pyramid of Cestius, was designed as the burial pyramid for a Roman politician named Caius Cestius, who ordered that the building work be completed within a period of 330 days. Construction took place at some point between 18 B.C. and 12 B.C. Cestius' pyramid had a layer of white Carrara marble on the outside, and was constructed from brick held together by a basic kind of cement on the inside. One of the things that strikes you when you look at the pyramid is how steep it is, so that the shape of Cestius' pyramid is quite unlike that of typical Egyptian ones. This is a difference that could have been the result of inaccurate information sent back to Rome by soldiers who saw the pyramids in person in Egypt. Alternatively, Roman builders could have drawn inspiration from the pyramids in Nubia, a region located in what is today northern Sudan and southern Egypt.

At the time of its construction, since there was a strict Roman law prohibiting the placement of tombs within the city itself, the Pyramid of Cestius would have stood in the countryside. Rome grew enormously during the next two centuries, and, by the 3rd century A.D., the pyramid would have been surrounded by buildings. We also know that in the 3rd century A.D., the Pyramid of Cestius was hidden behind a high wall on the orders of Emperor Aurelian; this probably helped it survive throughout the centuries to come, even as other ancient monuments disappeared. By the Middle Ages, the pyramid was covered in vegetation and thick dirt, and popular myth had developed that it might be a tomb for one of the twin brothers Romulus and Remus, who were regarded as the men who had established the city of Rome. Cestius' actual tomb within the pyramid and the inscription identifying the pyramid as his weren't rediscovered until the 1660s, when the pyramid underwent restoration. During excavations, when trees and plants were cleared away, two marble bases were found in front of the pyramid, as well as fragments of bronze statues that had once stood on them, on either side of the pyramid. The people employed to excavate the pyramid did not find the urn that would have contained Cestius' remains, but they did come across a tunnel. It was quite possible, therefore, that robbers had at some earlier time removed the contents of the tomb. But while some of the features of Cestius' tomb no longer exist, at least the pyramid itself has survived.

Today, the foundations of Cestius' pyramid rest below street level near an intersection with heavy traffic, so that passing tourists and residents could easily fail to notice its full height of 119 feet. Across the intersection is the Piramide station, located on Line B of the Rome Metro. In 2011, the Japanese clothing-company entrepreneur Yuzo Yagi, president of Yagi Tsusho Ltd, announced his intention to help the Italian government pay for an ambitious renovation of the Pyramid of Cestius. 'It's an act of gratitude,' he later told journalists. 'Our company has grown thanks to Italy.' Work began at the site shortly after Yagi signed an official agreement with the Special Superintendency for the Archaeological Heritage of Rome, and was completed ahead of schedule thanks to his 2-million-euro contribution.

As archaeologist Leonardo Guarnieri explained to journalists, officials are now conducting tours of the newly renovated pyramid twice a month by reservation. Visitors who take advantage of the tour can make their way through a narrow corridor in order to enter the burial chamber itself. It is within these walls that they can admire the frescoes: watercolour paintings typical of the time. In the chamber, it is possible to make out four frescoes of the winged Roman goddess of war, Victoria, a figure from Roman legend, as well as a series of vases, the type that would have been used for special rituals and purification purposes. We know from the writings of earlier visitors that there used to be more here, but the majority have disappeared over time. Only one problem remains now that the restoration is complete. The white exterior of the Pyramid of Cestius will have to be cleaned every few months to remove the layer of urban pollution. A team of free-climbers will be employed to do the job, in order to avoid placing builders' scaffolding around the newly welcoming monument.`;

        html += `<p>12 the <input type="text" class="fill-input" data-note-qid="12" data-article="${currentArticleIdx}" placeholder="12" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_12`] || '')}"> inside the tomb suggests that robbers had been there</p>`;
        html += `<p><strong>Restoration of Cestius' pyramid today</strong></p>`;
        html += `<p>13 climbers are helping to get rid of signs of <input type="text" class="fill-input" data-note-qid="13" data-article="${currentArticleIdx}" placeholder="13" value="${escapeHtml(userAnswers[`${currentArticleIdx}_note_13`] || '')}"></p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('input[data-tf-qid]').forEach(radio => {
            radio.removeEventListener('change', handleTFChange);
            radio.addEventListener('change', handleTFChange);
        });
        document.querySelectorAll('input[data-note-qid]').forEach(inp => {
            inp.removeEventListener('input', handleNoteInput);
            inp.addEventListener('input', handleNoteInput);
        });
    }
    
    function handleTFChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.tfQid);
        let key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleNoteInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.noteQid);
        let key = `${currentArticleIdx}_note_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 1-7】\n";
        for (let i = 1; i <= 7; i++) {
            let key = `${currentArticleIdx}_tf_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 8-13 (ONE WORD ONLY)】\n";
        for (let i = 8; i <= 13; i++) {
            let key = `${currentArticleIdx}_note_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "The Pyramid of Cestius");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
