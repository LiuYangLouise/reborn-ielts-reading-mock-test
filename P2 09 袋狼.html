<body>
<div class="app-container">
    <div class="mock-header">
        <div class="title-area">
            <h1>📖 Reborn新生留学 Reading Mock Test</h1>
            <p>左键选中高亮，右键删除高亮 | 已内置「袋狼」专题 | 摘要填空 + 观点匹配 + 选择</p>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn reset-btn" id="clearAllBtn">🗑️ 清空所有答案</button>
            <div class="timer-block">
                <div class="timer-label">⏱️ 剩余时间</div>
                <div class="timer-display" id="countdownDisplay">--:--</div>
            </div>
        </div>
    </div>

    <div class="article-tab-bar">
        <div class="article-switch" id="articleSwitchContainer"></div>
        <div class="article-indicator" id="articleCountInfo">1 篇文章已加载</div>
    </div>

    <div class="reading-dashboard">
        <div class="left-article-pane" id="leftArticlePane">
            <div id="articleRenderArea"></div>
        </div>
        <div class="right-questions-pane" id="rightQuestionsPane">
            <div id="questionsRenderArea"></div>
        </div>
    </div>

    <div class="submit-section">
        <button class="global-submit" id="submitAllBtn">✅ 提交全部答案</button>
    </div>
    <div id="resultPanel" class="result-panel"></div>
</div>

<script>
    // 袋狼文章数据
    const tigerArticle = {
        title: "The Tasmanian Tiger",
        bodyText: `The Tasmanian Tiger

The Tasmanian tiger, or thylacine, was a carnivorous marsupial (a meat-eating mammal which carries its young in a pouch). It was given the name 'tiger' because it had striped fur, and because it was ferocious. Between 24 million and 15 million years ago, many types of thylacine roamed across Australia, their powerful jaws playing a role in maintaining a balance in the ecosystems of their day. Some species were fox-sized, while others were barely the size of kittens.

But when a period of climate change cooled Australia about 12 million years ago, the numbers of these ancient thylacines began to decline. By about 3 million years ago, only one species was left. About 4,000 years ago, these vanished completely from the Australian mainland, so that Tasmania, a large island to the south of Australia, became the last remaining place where thylacines existed. They ruled the island's animal life unchallenged until Europeans—with sheep, dogs and a great indifference to native flora and fauna—seem to have brought about their extinction. In 1936, the last captive Tasmanian tiger died in Hobart Zoo. Since then, many expeditions have searched for tigers in the Tasmanian bush, but no definitive evidence has been found. Despite this, there are many who keep searching.

In 1981, Dutch-born zoologist Hans Naarding was in Tasmania conducting a survey of Latham's snipe, a species of endangered bird. One night, he saw an animal in the light from the searchlight mounted on his vehicle. He described it as about the size of a large dog, but with slightly sloping hindquarters and a fairly thick tail continuing straight on from its backbone. He said that it had 12 distinct stripes on its back, running down to the point where the tail began. He reported the sighting to the Director of Tasmania's National Parks. "When the news broke," said Naarding, "I was besieged by television crews, including four or five from Japan, and others from the United Kingdom, Germany, New Zealand and South America."

Government and private search parties combed the region, but no further sightings were made. The tiger, as always, had escaped to its lair—a place that many insist exists only in the imagination. Others disagree: there have been more than 4,000 claimed sightings of the animal since it supposedly died out, and the average number of claims reported to the authorities each year is now 150. So is it out there? Even experts differ in opinion.

Randolph Rose, Associate Professor of Zoology at the University of Tasmania, says that he once dreamed of seeing a thylacine, but is now convinced that his dream will go unfulfilled. The consensus among conservationists is that any animal with a population base of less than 1,000 is headed for extinction within 60 years. "Sixty years ago," he says, "there was only one thylacine that we know of, and that was in Hobart Zoo. Take it from me, the tiger is gone." But Dr David Pemberton, curator of zoology at the Tasmanian Museum, states that, despite scientific thinking that a relatively large population is required to sustain a species, "the Florida panther is down to a dozen or so animals, and, while it does have some inbreeding problems, it's still ticking along! After all, animals can be notoriously elusive. The strange fish known as the coelacanth, with its 'proto legs,' was thought to have died out with the dinosaurs 700 million years ago, until a specimen was dragged to the surface in a shark net off the coast of South Africa in 1938."

Wildlife biologist Nick Mooney has the unenviable task of investigating all so-called sightings of the tiger. It was Mooney who was first consulted in late February 2005 about the authenticity of new digital photographic images of a thylacine allegedly taken by a tourist. "On face value," Mooney says, "this particular account of a sighting and the photographs submitted as proof amount to one of the most convincing cases for the species' survival that I have seen." Many other 'sightings' have been hoaxes, and many sincere seekers are victims of obsession. "It is a blind optimism that something is, rather than cynicism that something isn't," Mooney says. "If something crosses the road, it's not a case of 'I wonder what that was?' Rather, it is a case of 'That's a thylacine!'"

However, Mooney treats all sightings at face value. "I never try to embarrass people," he says, "but the fact that I don't pack the car immediately after they telephone can often be taken as ridicule. Obsessive characters get angry that someone in my position is not out there when they think the thylacine is there."

Hans Naarding, whose sighting of a striped animal two decades ago was the highlight of a lifetime of animal spotting, remains puzzled by the time and money people waste on tiger searches. He says resources would be better applied to saving another endangered animal, the Tasmanian devil, and helping declining migratory bird populations. Could the thylacine still be out there? "Sure," Naarding says. "I know the vast south-west wilderness of Tasmania well. They could survive ... [But] if this is the case, it will not be long before they do disappear completely." Naarding believes that any discovery of surviving thylacines would be "rather pointless." "How do you bring a species back from extinction?" he asks. "What could you do with it? If there are thylacines out there, they are better off right where they are."`,
        // 摘要填空 14-18
        summaryFill: {
            text: `The thylacine was a dog-like animal which had a <span class="fill-badge">14</span> <input type="text" class="inline-fill-input" data-fill-id="14" placeholder="answer" autocomplete="off"> coat and was carnivorous. It was originally spread widely throughout the mainland of <span class="fill-badge">15</span> <input type="text" class="inline-fill-input" data-fill-id="15" placeholder="answer" autocomplete="off">. However, the number of thylacine decreased in that area around <span class="fill-badge">16</span> <input type="text" class="inline-fill-input" data-fill-id="16" placeholder="answer" autocomplete="off"> age because of climate change.

In the end, thylacines were found only on the island of <span class="fill-badge">17</span> <input type="text" class="inline-fill-input" data-fill-id="17" placeholder="answer" autocomplete="off"> until the arrival of <span class="fill-badge">18</span> <input type="text" class="inline-fill-input" data-fill-id="18" placeholder="answer" autocomplete="off"> with their farming practices brought about a drastic reduction in thylacine numbers. The last one is thought to have died in Hobart Zoo in 1936.`,
            questions: [14,15,16,17,18]
        },
        // 观点匹配 19-24 (A Hans Naarding, B Randolph Rose, C David Pemberton, D Nick Mooney)
        matchStatements: [
            { id: 19, text: "There is no longer any hope of finding a surviving Tasmanian tiger." },
            { id: 20, text: "It would be preferable not to disturb any surviving Tasmanian tigers." },
            { id: 21, text: "Many who claim to have seen Tasmanian tigers are not objective witnesses." },
            { id: 22, text: "Expert estimates of numbers needed to ensure species survival may be inaccurate." },
            { id: 23, text: "There is a great deal of international interest in Tasmanian tiger stories." },
            { id: 24, text: "Some fresh evidence provided by a visitor to Tasmania seems credible." }
        ],
        // 选择题 25-26
        mcqQuestions: [
            { id: 25, text: "Has Naarding's sighting of a Tasmanian tiger resulted in",
              options: [
                  "A. the capture of the tiger.",
                  "B. an extensive follow-up.",
                  "C. many other sightings.",
                  "D. the death of the tiger."
              ] },
            { id: 26, text: "The example of the coelacanth is used to show that",
              options: [
                  "A. new animal species are still evolving.",
                  "B. animals can possess surprising physical characteristics.",
                  "C. species of sea animals can be saved from extinction.",
                  "D. opinions regarding the extinction of animal species can be mistaken."
              ] }
        ]
    };
    
    let articlesData = [tigerArticle];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 禁用右键默认菜单 + 禁止复制翻译
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
    document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
    document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    function startTimer() {
        if (submitted) return;
        if (articlesData.length === 0) return;
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        globalDeadline = Date.now() + (articlesData.length * 20 * 60 * 1000);
        if (!submitted) startTimer();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            let processed = escapeHtml(para).replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            if (processed.trim()) html += `<p>${processed}</p>`;
        }
        return html;
    }
    
    // 渲染题目区：摘要填空 + 观点匹配 + 选择题
    function renderQuestionsPanel(article) {
        let html = `<div class="instruction-note">📌 阅读文章后作答。摘要填空请直接在文本中输入答案 (每空不超过两个单词和/或一个数字)；观点匹配请选择对应人物；选择题请点选。</div>`;
        html += `<div class="questions-container">`;
        
        // 摘要填空 14-18
        html += `<div class="question-group">
            <div class="group-title">📝 QUESTIONS 14–18</div>
            <div class="group-instruction">Complete the summary. Choose NO MORE THAN TWO WORDS AND/OR A NUMBER from the passage for each answer.</div>
            <div class="summary-embedded">${article.summaryFill.text}</div>
        </div>`;
        
        // 观点匹配 19-24
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 19–24</div>
            <div class="group-instruction">Match each statement with the correct person, A-D.</div>`;
        for (let stmt of article.matchStatements) {
            const answerKey = `${currentArticleIdx}_match_${stmt.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${stmt.id}</span>
                    <span class="q-text">${escapeHtml(stmt.text)}</span>
                </div>
                <div class="match-options">
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="A" ${saved === "A" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="A"> <span>A. Hans Naarding</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="B" ${saved === "B" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="B"> <span>B. Randolph Rose</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="C" ${saved === "C" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="C"> <span>C. David Pemberton</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="D" ${saved === "D" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="D"> <span>D. Nick Mooney</span></label>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 选择题 25-26
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 25–26</div>
            <div class="group-instruction">Choose the correct letter, A, B, C or D.</div>`;
        for (let q of article.mcqQuestions) {
            const answerKey = `${currentArticleIdx}_mcq_${q.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${q.id}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                </div>
                <div class="mcq-options">`;
            for (let opt of q.options) {
                const optLetter = opt.charAt(0);
                const isChecked = (saved === optLetter);
                html += `<label class="mcq-opt">
                    <input type="radio" name="mcq_${q.id}" value="${optLetter}" ${isChecked ? "checked" : ""} data-mcq-id="${q.id}" data-mcq-val="${optLetter}">
                    <span>${escapeHtml(opt)}</span>
                </label>`;
            }
            html += `</div></div>`;
        }
        html += `</div>`;
        html += `</div>`;
        return html;
    }
    
    // 事件绑定
    function attachQuestionEvents() {
        // 填空输入框
        document.querySelectorAll('.inline-fill-input').forEach(inp => {
            inp.removeEventListener('input', handleFillInput);
            inp.addEventListener('input', handleFillInput);
            const qid = parseInt(inp.getAttribute('data-fill-id'));
            const key = `${currentArticleIdx}_fill_${qid}`;
            if (userAnswers[key]) {
                inp.value = userAnswers[key];
            }
        });
        // 观点匹配radio
        document.querySelectorAll('input[type="radio"][data-match-id]').forEach(radio => {
            radio.removeEventListener('change', handleMatchChange);
            radio.addEventListener('change', handleMatchChange);
        });
        // 选择题radio
        document.querySelectorAll('input[type="radio"][data-mcq-id]').forEach(radio => {
            radio.removeEventListener('change', handleMcqChange);
            radio.addEventListener('change', handleMcqChange);
        });
    }
    
    function handleFillInput(e) {
        if (submitted) return;
        const input = e.target;
        const qid = parseInt(input.getAttribute('data-fill-id'));
        const key = `${currentArticleIdx}_fill_${qid}`;
        userAnswers[key] = input.value.trim();
    }
    
    function handleMatchChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-match-id'));
        const value = radio.getAttribute('data-match-val');
        const key = `${currentArticleIdx}_match_${qid}`;
        if (radio.checked) {
            userAnswers[key] = value;
            const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
            allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
        }
    }
    
    function handleMcqChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-mcq-id'));
        const value = radio.getAttribute('data-mcq-val');
        const key = `${currentArticleIdx}_mcq_${qid}`;
        if (radio.checked) {
            userAnswers[key] = value;
            const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
            allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
        }
    }
    
    function renderCurrent() {
        if (articlesData.length === 0) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        let questionsHtml = renderQuestionsPanel(article);
        document.getElementById('questionsRenderArea').innerHTML = questionsHtml;
        attachQuestionEvents();
        reapplyHighlightFeature();
        updateTabBar();
    }
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        let btnsHtml = '';
        for (let i = 0; i < articlesData.length; i++) {
            let activeClass = (i === currentArticleIdx) ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Thylacine</button>`;
        }
        container.innerHTML = btnsHtml;
        document.getElementById('articleCountInfo').innerHTML = `${articlesData.length} 篇文章 (每篇20分钟)`;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (submitted) { alert("已提交答案，请清空后再切换"); return; }
                let idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
    }
    
    // 高亮功能
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch (err) { }
    }
    
    function handleContextMenuCustom(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        const articlePane = document.getElementById('articleRenderArea');
        while (target && target !== articlePane) {
            if (target.classList && target.classList.contains('highlight')) {
                highlightSpan = target;
                break;
            }
            target = target.parentElement;
        }
        if (!highlightSpan) return;
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const deleteOption = document.createElement('div');
        deleteOption.className = 'context-menu-item';
        deleteOption.textContent = '🗑️ Delete highlight';
        deleteOption.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const text = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(text, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(deleteOption);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function initHighlightFeature() {
        const pane = document.getElementById('leftArticlePane');
        pane.removeEventListener('mouseup', handleTextSelection);
        pane.addEventListener('mouseup', handleTextSelection);
        pane.removeEventListener('contextmenu', handleContextMenuCustom);
        pane.addEventListener('contextmenu', handleContextMenuCustom);
    }
    function reapplyHighlightFeature() { initHighlightFeature(); }
    
    // 提交汇总
    function computeResults() {
        let report = "";
        for (let idx = 0; idx < articlesData.length; idx++) {
            report += `\n📄 P${idx+1}: The Tasmanian Tiger\n─────────────────────\n`;
            let fillKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_fill_`)).sort();
            let matchKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_match_`)).sort();
            let mcqKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_mcq_`)).sort();
            for (let key of fillKeys) {
                let qid = key.split('_')[2];
                let ans = userAnswers[key] || "(未作答)";
                report += `  ${qid}. ${ans}\n`;
            }
            for (let key of matchKeys) {
                let qid = key.split('_')[2];
                let val = userAnswers[key];
                let name = val === "A" ? "Hans Naarding" : (val === "B" ? "Randolph Rose" : (val === "C" ? "David Pemberton" : "Nick Mooney"));
                report += `  ${qid}. ${name}\n`;
            }
            for (let key of mcqKeys) {
                let qid = key.split('_')[2];
                report += `  ${qid}. ${userAnswers[key]}\n`;
            }
            if (fillKeys.length === 0 && matchKeys.length === 0 && mcqKeys.length === 0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已经提交过了");
        submitted = true;
        stopTimer();
        let resultStr = computeResults();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px; display:flex; gap:15px; justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResults()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, .inline-fill-input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有已填答案？")) {
            userAnswers = {};
            submitted = false;
            document.getElementById('submitAllBtn').disabled = false;
            document.getElementById('resultPanel').style.display = 'none';
            renderCurrent();
            refreshTimer();
        }
    };
    
    renderCurrent();
    refreshTimer();
    initHighlightFeature();
</script>
</body>
</html>
