The writer of some of the best-known stories in the English language, including Treasure Island and The Strange Case of Dr. Jekyll and Mr. Hyde

It is more than 100 years since the death of the Scottish writer Robert Louis Stevenson on the South Pacific island of Samoa, and it seems that time has not been kind to Stevenson's memory. Immediately after his death, his family and friends set to work to fashion the legend of Robert Louis Stevenson, or R. L. S., as he became known, one of the few writers familiar from his initials alone. Subsequent works of biography then turned him into a writer of almost religious importance. One example was literary critic Balfour, who in 1901 portrayed Stevenson's family as ministering angels to the dying genius during his final illness. Similarly, the biographer Crouch absurdly overstated Stevenson's significance by placing him in the same company as those most revered names in English literature: Shakespeare and Keats. The reaction to this nonsense was a number of highly critical assessments of Stevenson's legacy in the 1920s.

Normally, the critical pendulum can be relied on to swing back again, but there are several aspects of Stevenson's work that have, until recently, acted against a more balanced appraisal. First is the allegation that Stevenson was a mere master of linguistic fireworks, who lacked moral depth. Some critics accused him of being a literary charlatan, of juggling words very prettily to strike effects which overawed an ignorant public, and served to distract from the inadequacy of his ideas.

Then there has long been a prejudice against the adventure story as the proper medium for deep moral seriousness, a prejudice which is still extremely influential today. It seems that we can accept that an adventure film can successfully express profound moral truths, but we reject the same idea for a book. The absurdity of this becomes apparent when we think of writers like Joseph Conrad and Graham Greene, but it is no use pretending that this bias against adventure stories is not part of our high culture. A further problem is that Stevenson has often not found favour in the land of his birth because his conservatism so often collides with the strong radical tradition in Scotland. His many escapist stories and preference for living abroad have led to accusations that he camouflaged Scotland's problems. Lastly, the high adventure of Stevenson's own lifestyle has sometimes obscured his output, his life a greater story than any he could devise. This was precisely what his friends feared would happen towards the end of his short life: his art might be overwhelmed by the drama of life in Samoa.

One consequence of this has been that Stevenson's influence on other writers has too often been neglected. The writer and poet Oscar Wilde was deeply influenced by Stevenson, even though he declared that Stevenson would have produced better work if he had lived in London rather than Samoa. Stevenson tends to stick in the throat even of those writers who would like to spit him out, such as Shaw, who claimed to have learned from him that the romantic hero is always mocked by reality. Likewise, the writer Galsworthy, who began as a determined critic, later changed his mind and said that the superiority of Stevenson over the novelist Hardy was that Stevenson was all life and Hardy all death. The influence on the novelist Chesterton would also repay detailed study, for it was through him that Stevenson has managed to cross the ages, emerging as an influence on the modernist movement and our own contemporary Latin American school of "magical realism".

When making an assessment of his life and work one question must inevitably be asked: was Robert Louis Stevenson Scotland's greatest writer of English prose? For most commentators this honour falls to Sir Walter Scott, author of Ivanhoe among many other classic novels, and it is true that in terms of craftsmanship, precision and the ability to minutely regulate language to create the desired effect, Scott takes the prize. However, this is not the same thing at all as inherent talent; by way of comparison one may take the example of the two great Russian composers Shostakovich and Prokofiev, of whom the former had learned more precise skills of execution but the latter's intrinsic genius was greater, and so it seems to be with Scott and Stevenson. Admittedly, Scott's detailed style does permit his stories to explore levels of tragedy that are beyond Stevenson's reach, but in this regard they have the musty smell of the museum, somehow artificial and removed from modern day reality. On the other hand, Stevenson's skill with plotting and narrative gives his books a timeless quality, so that they still live today, and Stevenson was also the shrewder judge of behaviour and psychology. For example, his compelling descriptions of a man with a split personality in The Strange Case of Dr. Jekyll and Mr. Hyde have proved so accessible and accurate that the expression "Jekyll and Hyde" has entered common English usage. Even if we do not see a revival of critical interest in this great Scottish writer, it is to be hoped that readers go back to Robert Louis Stevenson's magnificent stories and reassess this neglected genius.`;

            html += `<div class="question-group"><div class="group-title">📋 QUESTIONS 32–35</div><div class="group-instruction">YES if the statement agrees with the claims of the writer, NO if it contradicts, NOT GIVEN if impossible to say.</div>`;
            for(let q of yesnoQuestions) {
                let key = `${currentArticleIdx}_yn_${q.id}`;
                let saved = userAnswers[key] || "";
                html += `<div class="question-card">
                    <div class="question-header"><span class="q-number">${q.id}</span><span class="q-text">${escapeHtml(q.text)}</span></div>
                    <div class="yesno-options">`;
                for(let opt of yesnoOptions) {
                    let checked = (saved === opt) ? 'checked' : '';
                    html += `<label class="yesno-opt"><input type="radio" name="yn_${q.id}" value="${opt}" ${checked} data-yn-id="${q.id}" data-yn-val="${opt}"> <span>${opt}</span></label>`;
                }
                html += `</div></div>`;
            }
            html += `</div>`;
            
            // Summary 36-40 with dropdown
            let summaryQuestions = [36, 37, 38, 39, 40];
            let summaryTexts = [
                "Scott had greater __________ , but Stevenson had more __________ , and the same distinction can be made between the two composers Shostakovich and Prokofiev.",
                "It is true that Scott's books showed more __________ when it came to tragedy, though in an old-fashioned way, while Stevenson's books are still popular because of his __________ .",
                "And Stevenson's understanding of __________ has resulted in the widespread use of an expression from one of his books."
            ];
            
            html += `<div class="question-group"><div class="group-title">📋 QUESTIONS 36–40</div><div class="group-instruction">Complete the summary. Choose the correct letter, A-I, from the list.</div>`;
            
            // 36 & 37 pair
            let key36 = `${currentArticleIdx}_sum_36`;
            let saved36 = userAnswers[key36] || "";
            let key37 = `${currentArticleIdx}_sum_37`;
            let saved37 = userAnswers[key37] || "";
            html += `<div class="question-card"><div class="question-header"><span class="q-number">36</span><span class="q-text">Scott had greater ______</span></div>
                <select class="summary-select" data-sum-id="36"><option value="">-- Select --</option>`;
            for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved36===opt.value ? 'selected' : ''}>${opt.text}</option>`;
            html += `</select></div>`;
            html += `<div class="question-card"><div class="question-header"><span class="q-number">37</span><span class="q-text">but Stevenson had more ______</span></div>
                <select class="summary-select" data-sum-id="37"><option value="">-- Select --</option>`;
            for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved37===opt.value ? 'selected' : ''}>${opt.text}</option>`;
            html += `</select></div>`;
            
            let key38 = `${currentArticleIdx}_sum_38`;
            let saved38 = userAnswers[key38] || "";
            let key39 = `${currentArticleIdx}_sum_39`;
            let saved39 = userAnswers[key39] || "";
            html += `<div class="question-card"><div class="question-header"><span class="q-number">38</span><span class="q-text">Scott's books showed more ______ when it came to tragedy</span></div>
                <select class="summary-select" data-sum-id="38"><option value="">-- Select --</option>`;
            for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved38===opt.value ? 'selected' : ''}>${opt.text}</option>`;
            html += `</select></div>`;
            html += `<div class="question-card"><div class="question-header"><span class="q-number">39</span><span class="q-text">while Stevenson's books are still popular because of his ______</span></div>
                <select class="summary-select" data-sum-id="39"><option value="">-- Select --</option>`;
            for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved39===opt.value ? 'selected' : ''}>${opt.text}</option>`;
            html += `</select></div>`;
            
            let key40 = `${currentArticleIdx}_sum_40`;
            let saved40 = userAnswers[key40] || "";
            html += `<div class="question-card"><div class="question-header"><span class="q-number">40</span><span class="q-text">Stevenson's understanding of ______ has resulted in the widespread use of an expression from one of his books.</span></div>
                <select class="summary-select" data-sum-id="40"><option value="">-- Select --</option>`;
            for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved40===opt.value ? 'selected' : ''}>${opt.text}</option>`;
            html += `</select></div>`;
            
            html += `</div></div>`;
            return html;
        }
        
        function attachEvents() {
            // MCQ radios
            document.querySelectorAll('input[data-mcq-id]').forEach(radio => {
                radio.removeEventListener('change', handleMcqChange);
                radio.addEventListener('change', handleMcqChange);
            });
            // YES/NO radios
            document.querySelectorAll('input[data-yn-id]').forEach(radio => {
                radio.removeEventListener('change', handleYesNoChange);
                radio.addEventListener('change', handleYesNoChange);
            });
            // Summary dropdowns
            document.querySelectorAll('.summary-select').forEach(sel => {
                sel.removeEventListener('change', handleSummaryChange);
                sel.addEventListener('change', handleSummaryChange);
            });
        }
        
        function handleMcqChange(e) {
            if(submitted) return;
            let radio = e.target;
            let qid = parseInt(radio.getAttribute('data-mcq-id'));
            let val = radio.getAttribute('data-mcq-val');
            let key = `${currentArticleIdx}_mcq_${qid}`;
            if(radio.checked) userAnswers[key] = val;
        }
        
        function handleYesNoChange(e) {
            if(submitted) return;
            let radio = e.target;
            let qid = parseInt(radio.getAttribute('data-yn-id'));
            let val = radio.getAttribute('data-yn-val');
            let key = `${currentArticleIdx}_yn_${qid}`;
            if(radio.checked) userAnswers[key] = val;
        }
        
        function handleSummaryChange(e) {
            if(submitted) return;
            let sel = e.target;
            let qid = parseInt(sel.getAttribute('data-sum-id'));
            let key = `${currentArticleIdx}_sum_${qid}`;
            userAnswers[key] = sel.value;
        }
        
        function renderCurrent() {
            let art = articlesData[currentArticleIdx];
            let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(art.title)}</div><div class="article-text">${formatArticleText(art.bodyText)}</div></div>`;
            document.getElementById('articleRenderArea').innerHTML = artHtml;
            document.getElementById('questionsRenderArea').innerHTML = renderQuestionsPanel(art);
            attachEvents();
            initHighlight();
        }
        
        // Highlight feature
        function handleTextSelection(e) {
            if(submitted) return;
            const selection = window.getSelection();
            if(!selection.toString().trim()) return;
            const range = selection.getRangeAt(0);
            const container = document.getElementById('articleRenderArea');
            if(!container.contains(range.commonAncestorContainer)) return;
            try {
                const span = document.createElement('span');
                span.className = 'highlight';
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch(err) {}
        }
        
        function handleContextMenuCustom(e) {
            if(submitted) return;
            let target = e.target;
            let highlightSpan = null;
            const articlePane = document.getElementById('articleRenderArea');
            while(target && target !== articlePane) {
                if(target.classList && target.classList.contains('highlight')) {
                    highlightSpan = target;
                    break;
                }
                target = target.parentElement;
            }
            if(!highlightSpan) return;
            e.preventDefault();
            if(currentContextMenu) currentContextMenu.remove();
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            const delOpt = document.createElement('div');
            delOpt.className = 'context-menu-item';
            delOpt.textContent = '🗑️ Delete highlight';
            delOpt.onclick = (ev) => {
                ev.stopPropagation();
                const parent = highlightSpan.parentNode;
                const textNode = document.createTextNode(highlightSpan.textContent);
                parent.replaceChild(textNode, highlightSpan);
                parent.normalize();
                menu.remove();
                currentContextMenu = null;
            };
            menu.appendChild(delOpt);
            document.body.appendChild(menu);
            currentContextMenu = menu;
            setTimeout(() => {
                const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
                document.addEventListener('click', closeHandler);
            }, 0);
        }
        
        function initHighlight() {
            const pane = document.getElementById('leftArticlePane');
            pane.removeEventListener('mouseup', handleTextSelection);
            pane.addEventListener('mouseup', handleTextSelection);
            pane.removeEventListener('contextmenu', handleContextMenuCustom);
            pane.addEventListener('contextmenu', handleContextMenuCustom);
        }
        
        function computeResults() {
            let report = "";
            for(let idx=0; idx<articlesData.length; idx++) {
                let art = articlesData[idx];
                report += `\n📄 ${art.title}\n─────────────────────\n`;
                let allKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_`)).sort();
                let map = new Map();
                for(let k of allKeys) {
                    let parts = k.split('_');
                    let qid = parseInt(parts[2]);
                    let val = userAnswers[k];
                    map.set(qid, val || "(no answer)");
                }
                let sorted = Array.from(map.keys()).sort((a,b)=>a-b);
                for(let q of sorted) report += `  ${q}. ${map.get(q)}\n`;
                if(sorted.length===0) report += `  (no answers)\n`;
                report += `\n`;
            }
            return report;
        }
        
        document.getElementById('submitAllBtn').onclick = () => {
            if(submitted) return alert("Already submitted.");
            submitted = true;
            stopTimer();
            let resultStr = computeResults();
            let panel = document.getElementById('resultPanel');
            panel.innerHTML = `<div class="result-header">📊 Answer Summary (with question numbers)</div><div class="copy-area">${resultStr.replace(/\n/g,'<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy answers for checking</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
            panel.style.display = 'block';
            document.getElementById('copyResultsBtn')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(computeResults()); alert("Answers copied"); });
            document.getElementById('closeResultBtn')?.addEventListener('click', ()=>{ panel.style.display = 'none'; });
            document.getElementById('submitAllBtn').disabled = true;
            document.querySelectorAll('select, input').forEach(el => el.disabled = true);
        };
        
        document.getElementById('clearAllBtn').onclick = () => {
            if(confirm("Clear all answers and reset highlights?")) {
                stopTimer(); submitted=false; userAnswers={}; globalDeadline=null;
                renderCurrent(); document.getElementById('resultPanel').style.display='none';
                document.getElementById('submitAllBtn').disabled=false;
                refreshTimer();
            }
        };
        
        const parsed = parseArticle(combined, "Robert Louis Stevenson");
        articlesData = [parsed];
        currentArticleIdx=0; submitted=false; userAnswers={};
        renderCurrent(); refreshTimer();
        
        function updateTabBar() {
            let container = document.getElementById('articleSwitchContainer');
            if(!articlesData.length) return;
            let btns = '';
            for(let i=0;i<articlesData.length;i++) {
                let activeClass = i===currentArticleIdx ? 'active-article' : '';
                btns += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · R.L. Stevenson</button>`;
            }
            container.innerHTML = btns;
            document.querySelectorAll('.nav-article-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(submitted) { alert("Already submitted, please reset first."); return; }
                    let idx = parseInt(btn.getAttribute('data-idx'));
                    if(!isNaN(idx) && idx !== currentArticleIdx) {
                        currentArticleIdx = idx;
                        renderCurrent();
                        updateTabBar();
                    }
                });
            });
            document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage (20 minutes)`;
        }
        updateTabBar();
    })();
</script>
</body>
</html>
