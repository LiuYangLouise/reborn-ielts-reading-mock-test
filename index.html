<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码登录</title>
    <style>
        body{background:#1A1A1A;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:Arial;}
        .box{background:#222;padding:40px;border-radius:15px;text-align:center;}
        input{padding:12px 20px;width:240px;margin:10px 0;font-size:16px;text-align:center;}
        button{padding:12px 30px;background:#007bff;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
        .tip{color:red;margin-top:10px;}
    </style>
</head>
<body>
    <div class="box">
        <h2>请输入密码</h2>
        <input type="password" id="pwd" placeholder="输入密码">
        <br>
        <button onclick="check()">进入练习</button>
        <div class="tip" id="msg"></div>
    </div>

    <script>
        // 你自己的密码
        const PASSWORD = "123456";

        function check() {
            let val = document.getElementById("pwd").value;
            if (val === PASSWORD) {
                // 重点：密码正确 → 显示文件夹里所有练习页
                window.location.href = "./";
            } else {
                document.getElementById("msg").innerText = "密码错误";
            }
        }
    </script>
</body>
</html>
