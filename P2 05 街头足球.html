    // ---------- 街头足球 文章内容 ----------
    const fullArticleText = `Playing Soccer

There are many differences between playing soccer in the street and joining a youth team in an organized league in the USA

A Street soccer, as its name implies, is an informal variation of the sport, often played on the street, particularly in urban areas. There are many reasons for the widespread popularity of street soccer. Unlike youth soccer, its more formally organized counterpart, no large space is needed, and goal posts, corner markers, and marked lines, associated with the formal game, are typically absent, as are game officials or referees. Another attraction of street soccer is that it is played frequently and competitively, but does not necessarily require standard 11-a-side teams or fixed playing positions. Unlike in youth soccer, inexperienced street soccer players rarely learn from repetitive technical and tactical drills. Instead, they learn from their poor performance in competition, unconscious of the skills they are nonetheless developing, and without older adults or coaches present. Players learn without effort through playing the game, and soon attain an almost natural feeling for the sport.

B However, there are lots of cities in the world today where conditions are such that street soccer is no longer possible. Congested traffic now dominates where games were once played. Parks and open fields are used as hangouts for older teenagers with other interests. Add to this the requirement in many localities for official permits to use public spaces and the managed schedules that many young people have today, and spontaneous play of any kind is hard to imagine.

C In spite of all these obstacles, which are probably solvable in most instances, there is another sociological explanation of why in many places street soccer doesn't enjoy the same popularity it once did. In his book How Soccer Explains the World, US writer Franklin Foer observes: But for all the talk of freedom, the 1960s parenting style had a far less relaxed side too. Like the 1960s consumer movement which brought seat belts and airbags to cars, the (youth) soccer movement felt like it could create a set of ... regulations that would protect both the child's body and mind from damage. Soccer leagues like the one I played in as a child handed out 'participation' prizes to every player, no matter how few games his (or her) team won. Where most of the world accepts the practice of using your head to hit the ball as an essential element of the game, some (youth) soccer parents have worried over the potential for injury to the brain. An entire industry grew up to manufacture protective headgear. Even though very little medical evidence supports this fear, some youth leagues prohibited heading the ball altogether.

D A growing body of people don't believe street soccer involves a legitimate educational method. They argue that children need to be taught by experts. Youth soccer instruction now begins with four-year-olds, so that they will have an advantage as six-year-olds. This need to get ahead brings with it a fear of falling behind that only expert instruction can prevent. This type of instruction leaves no room for the trial-and-error approach of street soccer.

E One of the basic ideas of street soccer is that young players are assigned a particular role by a better player and are expected to play for the good of the team. Such an assignment runs counter to the idea of youth soccer that every child needs to learn every position and will benefit from doing so. In street soccer, you fill the role that you are best able to at a particular time. While this role assignment can change from game to game, the purpose is always the same: to get the best out of each individual at any given moment.

F In street soccer, children have to learn patience, to wait their turn, to realize that they are not entitled to make decisions, or even be listened to simply because they show up. Positions of responsibility are earned through competition within the team. Younger players in street soccer must wait to attain those positions. In youth soccer, however, with its overly democratic values, youngsters are guaranteed their time in the spotlight. Whether it's their turn to be captain, to play a central position or to take a crucial shot, youth soccer players come to believe that hard work and patience aren't really necessary.

G Not only does every youth soccer player get a chance, it is assumed that each individual has played well. 'Everyone's a winner; no one's a loser' is a guiding principle of youth soccer. This ensures each individual goes away positive about themselves. No one can leave a game or a practice feeling bad. But, if there really are no losers, then why try at all? Since giving less than your best receives the same reward as giving your best, why go to any extra effort?

In street soccer, every game results in a winner and a loser and everyone knows who is who. Losing a game is a common experience and players learn early on how to handle this. As a result, unlike most youth soccer players, they acquire resilience.

A further difference between these two strands of soccer is that in street soccer a formal record is not kept. You can lose one day and win the next. The results are only temporary and are forgotten within minutes of the end of the match. But in organized youth soccer, the position each person plays and the results are formally noted and maintained throughout a season.`;

    const questionsRaw = `**You should spend about 20 minutes on Questions 14-26, which are based on Reading Passage 2 on the following pages.**

Winners and losers

For youth soccer players, a key 24 is that they should always come away from the game with a positive attitude. In this respect, regardless of the effort the players make, they get some kind of 25 at the end of a game. In street soccer, however, players gain resilience because they have to learn to cope with failure. But the outcome of a match isn't remembered for long. In fact, no-one ever keeps a 26 of the results of games.`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];

    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) html += `<p>${escapeHtml(para)}</p>`;
        }
        return html;
    }

        // 段落信息匹配 14-19
        html += `<div class="section-header">📋 Questions 14-19 (Which section contains the following information?)</div>`;

            { id: 15, text: "examples outside sport of greater emphasis on individual safety" },

            { id: 17, text: "details of urban changes that discourage street soccer" },
            { id: 18, text: "a mention of the lesson that failure teaches street soccer players" },
            { id: 19, text: "an explanation of why youth soccer emphasises the need for coaches" }
        ];
        
        for (let item of infoItems) {
            let answerKey = `${currentArticleIdx}_section_${item.id}`;
            let stored = userAnswers[answerKey] || "";
            html += `<div class="question-item"><div class="q-title"><span class="q-num">${item.id}</span> ${escapeHtml(item.text)}</div>`;
            html += `<select class="heading-select" data-section-qid="${item.id}" data-article="${currentArticleIdx}" style="width:auto; min-width:100px; padding:8px; border-radius:20px;">`;
            html += `<option value="">-- Select paragraph --</option>`;
            for (let letter of ['A', 'B', 'C', 'D', 'E', 'F', 'G']) {
                let selected = (stored === letter) ? 'selected' : '';
                html += `<option value="${letter}" ${selected}>Paragraph ${letter}</option>`;
            }
            html += `</select></div>`;
        }
        
        // 双选题 20-21 (街球受欢迎的原因)
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 20-21 (Choose TWO reasons for the popularity of street soccer)</div>`;
        html += `<div class="question-item"><div class="q-title"><span class="q-num">20 & 21</span> Select TWO letters, A-E.</div>`;
        html += `<div class="checkbox-group">`;
        const reasons = [
            { letter: "A", text: "Many famous soccer players got their start in street soccer." },
            { letter: "B", text: "Young people can begin playing street soccer at a very early age." },
            { letter: "C", text: "You do not need elaborate facilities to play street soccer." },
            { letter: "D", text: "Inexperienced street soccer players are not criticised for mistakes." },
            { letter: "E", text: "Street soccer teams can have varying numbers of players." }

        let selectedArray = stored20_21 ? stored20_21.split(',') : [];
        for (let r of reasons) {
            let isChecked = selectedArray.includes(r.letter);
            html += `<label class="checkbox-label"><input type="checkbox" class="twenties-checkbox" value="${r.letter}" ${isChecked ? 'checked' : ''}> ${r.letter}. ${r.text}</label>`;
        }
        html += `</div><div class="summary-hint" style="font-size:12px; color:#c97e5a; margin-top:8px;">⚠️ 请选择两个选项</div></div>`;
        
        // 双选题 22-23 (1960s parenting style results)
        html += `<div class="section-header" style="margin-top: 20px;">📋 Questions 22-23 (Choose TWO results of the 1960s parenting style according to Franklin Foer)</div>`;
        html += `<div class="question-item"><div class="q-title"><span class="q-num">22 & 23</span> Select TWO letters, A-E.</div>`;
        html += `<div class="checkbox-group">`;
        const results = [
            { letter: "A", text: "Participation in youth soccer became much more expensive." },
            { letter: "B", text: "Some youth soccer leagues adopted more restrictive rules of play." },
            { letter: "C", text: "Fewer young people joined youth soccer teams." },
            { letter: "D", text: "Youth soccer players were sometimes rewarded for simply playing in games." },
            { letter: "E", text: "Soccer equipment manufacturers directed advertising towards parents." }
        ];
        let stored22_23 = userAnswers[`${currentArticleIdx}_twenties2`] || "";
        let selectedArray2 = stored22_23 ? stored22_23.split(',') : [];
        for (let r of results) {
            let isChecked = selectedArray2.includes(r.letter);
            html += `<label class="checkbox-label"><input type="checkbox" class="twenties2-checkbox" value="${r.letter}" ${isChecked ? 'checked' : ''}> ${r.letter}. ${r.text}</label>`;
        }
        html += `</div><div class="summary-hint" style="font-size:12px; color:#c97e5a; margin-top:8px;">⚠️ 请选择两个选项</div></div>`;
        
        // 摘要填空 24-26 (一词)
        html += `<div class="section-header" style="margin-top: 20px;">📝 Questions 24-26 (Complete the summary - ONE WORD ONLY)</div>`;
        html += `<div class="summary-text">`;
        html += `<p><strong>Winners and losers</strong></p>`;
        html += `<p>For youth soccer players, a key <input type="text" class="fill-input" data-sum-qid="24" data-article="${currentArticleIdx}" placeholder="24" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_24`] || '')}"> is that they should always come away from the game with a positive attitude.</p>`;
        html += `<p>In this respect, regardless of the effort the players make, they get some kind of <input type="text" class="fill-input" data-sum-qid="25" data-article="${currentArticleIdx}" placeholder="25" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_25`] || '')}"> at the end of a game.</p>`;
        html += `<p>In street soccer, however, players gain resilience because they have to learn to cope with failure. But the outcome of a match isn't remembered for long. In fact, no-one ever keeps a <input type="text" class="fill-input" data-sum-qid="26" data-article="${currentArticleIdx}" placeholder="26" value="${escapeHtml(userAnswers[`${currentArticleIdx}_sum_26`] || '')}"> of the results of games.</p>`;
        html += `</div>`;
        
        return html;
    }
    
    function attachDynamicEvents() {
        // 段落信息匹配
        document.querySelectorAll('select[data-section-qid]').forEach(sel => {
            sel.removeEventListener('change', handleSectionChange);
            sel.addEventListener('change', handleSectionChange);
        });
        // 双选题20-21
        const checkboxes20 = document.querySelectorAll('.twenties-checkbox');
        checkboxes20.forEach(cb => {
            cb.removeEventListener('change', handleTwentiesChange);
            cb.addEventListener('change', handleTwentiesChange);
        });
        // 双选题22-23
        const checkboxes22 = document.querySelectorAll('.twenties2-checkbox');
        checkboxes22.forEach(cb => {
            cb.removeEventListener('change', handleTwenties2Change);
            cb.addEventListener('change', handleTwenties2Change);
        });
        // 摘要填空
        document.querySelectorAll('input[data-sum-qid]').forEach(inp => {
            inp.removeEventListener('input', handleSumInput);
            inp.addEventListener('input', handleSumInput);
        });
    }
    
    function handleSectionChange(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sectionQid);
        let key = `${currentArticleIdx}_section_${qid}`;
        userAnswers[key] = e.target.value;
    }
    
    function handleTwentiesChange(e) {
        if (submitted) return;
        let selected = [];
        document.querySelectorAll('.twenties-checkbox:checked').forEach(cb => {
            selected.push(cb.value);
        });
        if (selected.length > 2) {
            e.target.checked = false;
            selected = selected.filter(v => v !== e.target.value);
            alert("请只选择两个选项");
        }
        let key = `${currentArticleIdx}_twenties`;
        userAnswers[key] = selected.join(',');
        // 重新渲染保持同步
        renderCurrent();
    }
    
    function handleTwenties2Change(e) {
        if (submitted) return;
        let selected = [];
        document.querySelectorAll('.twenties2-checkbox:checked').forEach(cb => {
            selected.push(cb.value);
        });
        if (selected.length > 2) {
            e.target.checked = false;
            selected = selected.filter(v => v !== e.target.value);
            alert("请只选择两个选项");
        }
        let key = `${currentArticleIdx}_twenties2`;
        userAnswers[key] = selected.join(',');
        renderCurrent();
    }
    
    function handleSumInput(e) {
        if (submitted) return;
        let qid = parseInt(e.target.dataset.sumQid);
        let key = `${currentArticleIdx}_sum_${qid}`;
        userAnswers[key] = e.target.value.trim();
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestions();
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "📊 Answer Summary\n─────────────────────\n\n";
        report += "【Questions 14-19 (Section matching)】\n";
        for (let i = 14; i <= 19; i++) {
            let key = `${currentArticleIdx}_section_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        report += "\n【Questions 20-21 (Reasons for street soccer popularity)】\n";
        let ans20 = userAnswers[`${currentArticleIdx}_twenties`] || "(not answered)";
        report += `  ${ans20}\n`;
        report += "\n【Questions 22-23 (1960s parenting style results)】\n";
        let ans22 = userAnswers[`${currentArticleIdx}_twenties2`] || "(not answered)";
        report += `  ${ans22}\n`;
        report += "\n【Questions 24-26 (Summary - ONE WORD ONLY)】\n";
        for (let i = 24; i <= 26; i++) {
            let key = `${currentArticleIdx}_sum_${i}`;
            let ans = userAnswers[key] || "(not answered)";
            report += `  ${i}. ${ans}\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("Answers already submitted.");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 Answer Summary</div><div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy Answers</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResultsWithAnswers()); alert("Answers copied!"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("Clear all answers and reset highlights?")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    const parsed = parseArticleContent(combinedContent, "Playing Soccer");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("Answers already submitted. Please reset first."); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage(s) (20 mins each)`;
    }
    updateTabBar();
</script>
</body>
</html>
