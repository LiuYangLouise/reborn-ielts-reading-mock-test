        const fullArticleText = `A closer examination of a study on verbal and non-verbal messages

A study of non-verbal communication carried out in 1967 continues to be widely quoted today. David Lapakko looks at limitations in the original study.

Description of the Study

The findings of a study on verbal and non-verbal messages in communication by Albert Mehrabian and his colleagues at UCLA in 1967 have been quoted so frequently that they are now often regarded as a self-evident truth.

In the first experiment, subjects were asked to listen to a recording of a female saying the word "maybe" in three tones of voice to convey liking, neutrality, and disliking. The subjects were then shown photos of female faces expressing the same three emotions and were asked to guess the emotions in the recorded voice and the photos. It was found that the photos received more accurate responses than the voices. In the second experiment, subjects listened to nine recorded words spoken in different tones of voice. Three words had positive meanings (e.g. honey), three were neutral (e.g. oh), and three were negative (e.g. terrible). Again, the subjects had to guess the speaker's emotions. It was found that tone of voice carried more meaning than the individual words. From these experiments the researchers concluded that 7% of our feeling towards a speaker is based on the actual words they use, 38% on their tone of voice, and 55% on their body language (e.g. facial expression).

Methodological Issues

However, a closer look at the study reveals several limitations. The first is that the entire study involved only 62 subjects. Of these, 25 were used to select the word for the first experiment, while the key issue - comparing verbal and non-verbal communication - was determined by only the 37 remaining subjects. All were female undergraduates who participated as part of their introductory psychology course, and their ages and academic qualifications seem remarkably uniform. Thus, the findings may simply be a product of the nature of the sample.

Critics have also pointed out that the 7-38-55 formula is flawed since it was pieced together from two different experiments, neither of which involved all three channels (verbal, vocal, and facial). In addition, in the first experiment the single word "maybe" was used throughout so it was impossible for the effects of changes in verbal input to be assessed. The researchers intentionally used a "neutral" word so naturally the subjects found little meaning there. Clearly, such a methodology lacks validity. In the real world, people communicate in a particular context and speak in phrases and full-blown sentences, making extensive use of the multi-faceted vehicle of language.

My concern is that interpretations of this study have gained such prominence in our pedagogical literature. This 7-38-55 formula appears in many basic texts, used for training in public speaking, interpersonal communication, and organizational communication.

Lessons to consider

Clearly, one appealing aspect of the Mehrabian study is its numerical precision. Communication is a complex phenomenon, but it seems less so when we can rely on these three magical numbers. In contrast to the ambiguities of language, numbers seem to possess exactness. And the popular appeal of the study has given the 7-38-55 formula enormous credibility. There is a certain mystique about non-verbal communication, and the continued references to this research sustain it, encouraging people to believe in the overwhelming importance of the non-verbal message compared with the verbal one. Yet we know that even one ill-chosen word to a colleague or friend can make or break a communicative effort. Words do matter. Bradley (1991), one of the few textbook writers to criticize the Mehrabian study, makes the same point when he observes, "If we could communicate 93% of information and attitudes with vocal and facial cues, it would be wasteful to spend time learning a language."

Mehrabian himself believes his research should not be interpreted to devalue the role of language in communication, saying:

"Please remember that all my findings... dealt with communications of feelings and attitudes... it is absurd to imply or suggest that the verbal portion of all communication constitutes only 7% of the message... anytime we communicate abstract relationships (e.g., x = y -- the square of z) clearly 100% of the entire communication is verbal." (Mehrabian, 1995)

To be fair, many textbook writers attempt to be faithful to the context of Mehrabian's research. For example, Stewart and D'Angelo (1988) write: "Mehrabian argues that when we're uncertain about what someone's feeling, or about how much we like him or her, we rely... only 7% on the words that are spoken." Others try to play down the specific percentages, saying that an understanding of the general importance of non-verbal cues is more important. Nonetheless, other textbook authors simply use the numbers without placing any limits on their meaning.

Conclusion

Since this relatively small study was first published it has achieved an influence far beyond its intended scope. We need to put it into its proper perspective and learn some important lessons from it regarding social science research, communication pedagogy, and the forces which have created widespread misunderstanding about communication.`;

        const combined = fullArticleText + "\n\n===questions===\n" + questionsRaw;

        function parseArticle(full, fallback) {
            let sep = "===questions===";
            let articlePart = "", qPart = "";
            if(full.includes(sep)) {
                let parts = full.split(sep);
                articlePart = parts[0].trim();
                qPart = parts.slice(1).join(sep).trim();
            } else {
                articlePart = full.trim();
                qPart = "";
            }
            let title = fallback;
            let lines = articlePart.split(/\r?\n/);
            if(lines.length && lines[0].trim().length && lines[0].trim().length < 100) {
                title = lines[0].trim();
                articlePart = lines.slice(1).join("\n").trim();
            }
            return { title, bodyText: articlePart, questionsRawText: qPart };
        }

        function renderQuestionsPanel(article) {
            let raw = article.questionsRawText || "";
            if(!raw.trim()) return '<div>⚠️ Questions missing</div>';
            let escaped = raw.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; });
            escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            let lines = escaped.split(/\r?\n/);
            let html = `<div class="instruction-text">📌 Answer all questions. For YES/NO/NOT GIVEN and MCQ, select the radio button. For dropdowns, choose the correct letter.</div><div class="raw-questions-text">`;
            for(let line of lines) {

                proc = proc.replace(/\[dropdown_(\d+)\]/g, (m, qid) => {

                    for(let opt of opts) sel += `<option value="${opt.value}" ${stored===opt.value ? 'selected' : ''}>${opt.text}</option>`;

                    return sel;
                });
                proc = proc.replace(/\[yn_(\d+)\]/g, (m, qid) => {
                    let key = `${currentArticleIdx}_${qid}`;
                    let stored = userAnswers[key] || "";
                    return renderYesNo(qid, stored);
                });
                proc = proc.replace(/\[mcq_(\d+)\]/g, (m, qid) => {
                    let key = `${currentArticleIdx}_${qid}`;
                    let stored = userAnswers[key] || "";
                    return renderMCQ(qid, stored);
                });
                html += `<div class="question-line">${proc}</div>`;
            }
            html += `</div>`;
            return html;
        }

        function attachEvents() {
            document.querySelectorAll('.dropdown-select').forEach(sel => {
                sel.removeEventListener('change', handleDropdown);
                sel.addEventListener('change', handleDropdown);
            });
            document.querySelectorAll('.yes-no-notgiven input, .mcq-radio-group input').forEach(radio => {
                radio.removeEventListener('change', handleRadio);
                radio.addEventListener('change', handleRadio);
            });
        }

        function handleDropdown(e) {
            if(submitted) return;
            let sel = e.target;
            let qid = parseInt(sel.dataset.qid);
            let key = `${currentArticleIdx}_${qid}`;
            userAnswers[key] = sel.value;
        }
        function handleRadio(e) {
            if(submitted) return;
            let name = e.target.name;
            let val = e.target.value;
            let qid = null;
            if(name.startsWith('yn_')) qid = name.split('_')[1];
            else if(name.startsWith('mcq_')) qid = name.split('_')[1];
            if(qid) {
                let key = `${currentArticleIdx}_${qid}`;
                userAnswers[key] = val;
            }
        }

        function renderCurrent() {
            let art = articlesData[currentArticleIdx];
            let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(art.title)}</div><div class="article-text">${formatArticleText(art.bodyText)}</div></div>`;
            document.getElementById('articleRenderArea').innerHTML = artHtml;
            document.getElementById('questionsRenderArea').innerHTML = renderQuestionsPanel(art);
            attachEvents();
            initHighlight();
        }

        function initHighlight() {
            const pane = document.getElementById('leftArticlePane');
            pane.removeEventListener('mouseup', handleSelect);
            pane.addEventListener('mouseup', handleSelect);
            pane.removeEventListener('contextmenu', handleCtx);
            pane.addEventListener('contextmenu', handleCtx);
            document.addEventListener('click', ()=>{ if(window._ctxMenu) { window._ctxMenu.remove(); window._ctxMenu=null; } });
        }
        function handleSelect(e) {
            if(submitted) return;
            let sel = window.getSelection();
            if(!sel.toString().trim()) return;
            let range = sel.getRangeAt(0);
            let container = document.getElementById('articleRenderArea');
            if(!container.contains(range.commonAncestorContainer)) return;
            try { let span = document.createElement('span'); span.className='highlight'; range.surroundContents(span); sel.removeAllRanges(); } catch(e){}
        }
        function handleCtx(e) {
            if(submitted) return;
            let target = e.target;
            let hl = null;
            while(target && target !== document.getElementById('articleRenderArea')) {
                if(target.classList && target.classList.contains('highlight')) { hl=target; break; }
                target = target.parentElement;
            }
            if(!hl) { e.preventDefault(); return; }
            e.preventDefault();
            if(window._ctxMenu) window._ctxMenu.remove();
            let menu = document.createElement('div'); menu.className='context-menu';
            menu.style.left=e.pageX+'px'; menu.style.top=e.pageY+'px';
            let del = document.createElement('div'); del.className='context-menu-item'; del.textContent='🗑️ Delete highlight';
            del.onclick = (ev) => { ev.stopPropagation(); let parent=hl.parentNode; let txt=document.createTextNode(hl.textContent); parent.replaceChild(txt,hl); parent.normalize(); menu.remove(); window._ctxMenu=null; };
            menu.appendChild(del); document.body.appendChild(menu); window._ctxMenu=menu;
            setTimeout(()=>{ document.addEventListener('click', function closeCtx(){ if(window._ctxMenu){ window._ctxMenu.remove(); window._ctxMenu=null;} document.removeEventListener('click',closeCtx); }); },0);
        }

        function computeResults() {
            let report = "";
            for(let idx=0; idx<articlesData.length; idx++) {
                let art = articlesData[idx];
                report += `\n📄 ${art.title}\n─────────────────────\n`;
                let map = new Map();
                for(let k in userAnswers) {
                    if(k.startsWith(`${idx}_`)) {
                        let qid = parseInt(k.split('_')[1]);
                        map.set(qid, userAnswers[k] || "(no answer)");
                    }
                }
                let sorted = Array.from(map.keys()).sort((a,b)=>a-b);
                for(let q of sorted) report += `  ${q}. ${map.get(q)}\n`;
                if(sorted.length===0) report += `  (no answers)\n`;
                report += `\n`;
            }
            return report;
        }

        document.getElementById('submitAllBtn').onclick = () => {
            if(submitted) return alert("Already submitted.");
            submitted = true; stopTimer();
            let res = computeResults();
            let panel = document.getElementById('resultPanel');
            panel.innerHTML = `<div class="result-header">📊 Answer Summary (with question numbers)</div><div class="copy-area">${res.replace(/\n/g,'<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy answers for checking</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
            panel.style.display = 'block';
            document.getElementById('copyResultsBtn')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(computeResults()); alert("Answers copied"); });
            document.getElementById('closeResultBtn')?.addEventListener('click', ()=>{ panel.style.display = 'none'; });
            document.getElementById('submitAllBtn').disabled = true;
            document.querySelectorAll('select, input').forEach(el => el.disabled = true);
        };
        document.getElementById('clearAllBtn').onclick = () => {
            if(confirm("Clear all answers and reset highlights?")) {
                stopTimer(); submitted=false; userAnswers={}; globalDeadline=null;
                renderCurrent(); document.getElementById('resultPanel').style.display='none';
                document.getElementById('submitAllBtn').disabled=false;
                refreshTimer();
            }
        };

        const parsed = parseArticle(combined, "Verbal & Non-verbal Messages");
        articlesData = [parsed];
        currentArticleIdx=0; submitted=false; userAnswers={};
        renderCurrent(); refreshTimer();
        function updateTabBar() {
            let container = document.getElementById('articleSwitchContainer');
            if(!articlesData.length) return;
            let btns = '';
            for(let i=0;i<articlesData.length;i++) {
                let activeClass = i===currentArticleIdx ? 'active-article' : '';
                btns += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,35))}</button>`;
            }
            container.innerHTML = btns;
            document.querySelectorAll('.nav-article-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(submitted) { alert("Already submitted, please reset first."); return; }
                    let idx = parseInt(btn.dataset.idx);
                    if(!isNaN(idx) && idx !== currentArticleIdx) {
                        currentArticleIdx = idx;
                        renderCurrent();
                        updateTabBar();
                    }
                });
            });
            document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage (20 minutes)`;
        }
        updateTabBar();
    })();
</script>
</body>
</html>
