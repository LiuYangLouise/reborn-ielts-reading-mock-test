Do tiny changes of facial expression show whether someone is telling lies?

Forty years ago, the research psychologist Dr Paul Ekman was addressing a group of young psychiatrists in training when he was asked a question, the answer to which has kept him busy ever since. Suppose the group wanted to know whether a particular patient who swears they are telling the truth really is. They look and sound sincere. So here is the question: is there any way you can be sure they are telling the truth? Ekman did not know the answer then, but he wanted to find out.

As part of his research, he had already filmed a series of 12-minute interviews with psychiatric patients. In a subsequent conversation, one of the patients told him that she had lied to him. So Ekman sat and looked at the film but saw nothing noteworthy. Then he slowed it down and looked again. Then he slowed it down even further. And suddenly, there, across just two frames of the film, he saw it: an intense expression of extreme anguish. It lasted less than a fifteenth of a second, but once he had spotted the first expression, he soon found three more examples in that same interview. He termed his discovery 'micro-expressions': very rapid, intense demonstrations of emotion that the subject intended to conceal.

Over the course of the next four decades, Ekman successfully demonstrated a proposition first suggested by Charles Darwin: that the ways in which we express rage, disgust, contempt, fear, surprise, happiness and sadness are universal. The facial muscles triggered by those seven basic emotions are, he has shown, essentially standard, regardless of language and culture, from the US to Japan and Brazil to Papua New Guinea. What is more, expressions of emotion are impossible to suppress and, particularly when we are lying, micro-expressions of powerfully felt emotions will inevitably flit across our face before we get the chance to stop them.

Fortunately for liars, most people will fail to spot these fleeting signals of inner torment. Of the 15,000 Ekman has tested, only 50 people, whom he calls 'naturals', have been able to do it. But given a little more training, Ekman says, almost anyone can develop the skill. He should know: since these tests were completed in the mid-1980s and the first publication of his research, he has been called in by the FBI and CIA (among countless more law-enforcement and other agencies around the world), not just to solve cases, but to teach them how to use his technique for themselves. He has held workshops for defence and prosecution lawyers, health professionals, even jealous spouses, all of them wanting to know exactly when someone is not being 100 percent candid.

Most recently, Ekman's research has resulted in a new television series about the exploits of the fictional Dr Cal Lightman, a scientist who studies involuntary body language to discover not only if you are lying, but why you might have been motivated to do so. According to the publicity blurb, Lightman is a human lie detector, even more accurate than a polygraph test. Ekman concedes he was sceptical when the producer first approached him with the idea of turning his life's work into a TV series, and initially would have stopped the project if he could. In particular, he was fearful that the show would exaggerate the effectiveness of his techniques and create the quite inaccurate impression among audiences that criminals could no longer hope to get away with lying. In the worst-case scenario, he was concerned about unfair convictions---that one day someone not properly trained in his techniques might be sitting on a jury and wrongly find someone guilty of a crime simply on the basis of a television programme.

In the end, though, he was won over because the series is unusual in several respects. It is the first time, as far as Ekman is aware, that a commercial TV drama has been based on the work of just one scientist. That scientist is also deeply involved in the project, talking through plot ideas and checking five successive drafts of each script to ensure details are correct. He was also impressed with the producer's manifestly serious and well-intentioned reasons for making the programme. Now that the first series has been completed, he believes probably 80-90 per cent of the show is based on fact and that's good enough for what it is. After all, it is a drama, not a documentary.

Ekman, incidentally, professes to have been a terrible liar ever since he was a small boy and observes that the ability to detect a lie and the ability to lie successfully are completely unrelated. He has been asked by people running for high office if he could teach them to become more credible with the public but has always refused to use his skills in that way on ethical grounds. He also insists that there are various kinds of lies. A 'true' lie can be identified by having two essential characteristics: there must be a deliberate intent to mislead and there must be no notification that this is what is occurring. This means that an actor or a poker player isn't a true liar. They are supposed to deceive you---it's part of the game---and the same is true of flattery. He prefers to focus on the kinds of lies where the liar would be in grave trouble if they were found out, and where the target would feel properly aggrieved if they knew.`;

                    let optLetter = opt.charAt(0);
                    let checked = (saved === optLetter) ? 'checked' : '';
                    html += `<label class="mcq-opt"><input type="radio" name="mcq_${qid}" value="${optLetter}" ${checked} data-mcq-id="${qid}" data-mcq-val="${optLetter}"> <span>${escapeHtml(opt)}</span></label>`;
                }
                html += `</div></div>`;
            }
            html += `</div>`;
            
            // Summary 32-36 with dropdown
            html += `<div class="question-group"><div class="group-title">📋 QUESTIONS 32–36</div><div class="group-instruction">Complete the summary. Choose the correct letter, A-I, from the list.</div>`;
            
            let summaryIds = [32, 33, 34, 35, 36];
            let summaryLabels = [
                "Initially, Ekman was unenthusiastic because he feared encouraging viewers' ______",
                "For example, he was worried that one day the programme could result in ______ not being carried out.",
                "He is not aware of any other comparable programme based on a single person's ______",
                "The ______ of the show's producer have been another pleasant surprise.",
                "Ekman is happy with the show's overall ______"
            ];
            
            for(let i = 0; i < summaryIds.length; i++) {
                let qid = summaryIds[i];
                let key = `${currentArticleIdx}_sum_${qid}`;
                let saved = userAnswers[key] || "";
                html += `<div class="question-card">
                    <div class="question-header"><span class="q-number">${qid}</span><span class="q-text">${escapeHtml(summaryLabels[i])}</span></div>
                    <select class="summary-select" data-sum-id="${qid}"><option value="">-- Select --</option>`;
                for(let opt of summaryOptions) html += `<option value="${opt.value}" ${saved===opt.value ? 'selected' : ''}>${opt.text}</option>`;
                html += `</select></div>`;
            }
            html += `</div>`;
            
            // YES/NO/NOT GIVEN 37-40
            let yesnoQuestions = [
                { id: 37, text: "Ekman regrets the lies he told as a child." },
                { id: 38, text: "People who are good at lying tend to be good at detecting lies." },
                { id: 39, text: "Ekman has worked with poker players to help them lie more convincingly." },
                { id: 40, text: "Ekman is more interested in the types of lies with serious consequences." }
            ];
            
            html += `<div class="question-group"><div class="group-title">📋 QUESTIONS 37–40</div><div class="group-instruction">YES if the statement agrees with the claims of the writer, NO if it contradicts, NOT GIVEN if impossible to say.</div>`;
            for(let q of yesnoQuestions) {
                let key = `${currentArticleIdx}_yn_${q.id}`;
                let saved = userAnswers[key] || "";
                html += `<div class="question-card">
                    <div class="question-header"><span class="q-number">${q.id}</span><span class="q-text">${escapeHtml(q.text)}</span></div>
                    <div class="yesno-options">`;
                for(let opt of yesnoOptionsList) {
                    let checked = (saved === opt) ? 'checked' : '';
                    html += `<label class="yesno-opt"><input type="radio" name="yn_${q.id}" value="${opt}" ${checked} data-yn-id="${q.id}" data-yn-val="${opt}"> <span>${opt}</span></label>`;
                }
                html += `</div></div>`;
            }
            html += `</div></div>`;
            return html;
        }
        
        function attachEvents() {
            // MCQ radios
            document.querySelectorAll('input[data-mcq-id]').forEach(radio => {
                radio.removeEventListener('change', handleMcqChange);
                radio.addEventListener('change', handleMcqChange);
            });
            // YES/NO radios
            document.querySelectorAll('input[data-yn-id]').forEach(radio => {
                radio.removeEventListener('change', handleYesNoChange);
                radio.addEventListener('change', handleYesNoChange);
            });
            // Summary dropdowns
            document.querySelectorAll('.summary-select').forEach(sel => {
                sel.removeEventListener('change', handleSummaryChange);
                sel.addEventListener('change', handleSummaryChange);
            });
        }
        
        function handleMcqChange(e) {
            if(submitted) return;
            let radio = e.target;
            let qid = parseInt(radio.getAttribute('data-mcq-id'));
            let val = radio.getAttribute('data-mcq-val');
            let key = `${currentArticleIdx}_mcq_${qid}`;
            if(radio.checked) userAnswers[key] = val;
        }
        
        function handleYesNoChange(e) {
            if(submitted) return;
            let radio = e.target;
            let qid = parseInt(radio.getAttribute('data-yn-id'));
            let val = radio.getAttribute('data-yn-val');
            let key = `${currentArticleIdx}_yn_${qid}`;
            if(radio.checked) userAnswers[key] = val;
        }
        
        function handleSummaryChange(e) {
            if(submitted) return;
            let sel = e.target;
            let qid = parseInt(sel.getAttribute('data-sum-id'));
            let key = `${currentArticleIdx}_sum_${qid}`;
            userAnswers[key] = sel.value;
        }
        
        function renderCurrent() {
            let art = articlesData[currentArticleIdx];
            let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(art.title)}</div><div class="article-text">${formatArticleText(art.bodyText)}</div></div>`;
            document.getElementById('articleRenderArea').innerHTML = artHtml;
            document.getElementById('questionsRenderArea').innerHTML = renderQuestionsPanel(art);
            attachEvents();
            initHighlight();
        }
        
        // Highlight feature
        function handleTextSelection(e) {
            if(submitted) return;
            const selection = window.getSelection();
            if(!selection.toString().trim()) return;
            const range = selection.getRangeAt(0);
            const container = document.getElementById('articleRenderArea');
            if(!container.contains(range.commonAncestorContainer)) return;
            try {
                const span = document.createElement('span');
                span.className = 'highlight';
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch(err) {}
        }
        
        function handleContextMenuCustom(e) {
            if(submitted) return;
            let target = e.target;
            let highlightSpan = null;
            const articlePane = document.getElementById('articleRenderArea');
            while(target && target !== articlePane) {
                if(target.classList && target.classList.contains('highlight')) {
                    highlightSpan = target;
                    break;
                }
                target = target.parentElement;
            }
            if(!highlightSpan) return;
            e.preventDefault();
            if(currentContextMenu) currentContextMenu.remove();
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            const delOpt = document.createElement('div');
            delOpt.className = 'context-menu-item';
            delOpt.textContent = '🗑️ Delete highlight';
            delOpt.onclick = (ev) => {
                ev.stopPropagation();
                const parent = highlightSpan.parentNode;
                const textNode = document.createTextNode(highlightSpan.textContent);
                parent.replaceChild(textNode, highlightSpan);
                parent.normalize();
                menu.remove();
                currentContextMenu = null;
            };
            menu.appendChild(delOpt);
            document.body.appendChild(menu);
            currentContextMenu = menu;
            setTimeout(() => {
                const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
                document.addEventListener('click', closeHandler);
            }, 0);
        }
        
        function initHighlight() {
            const pane = document.getElementById('leftArticlePane');
            pane.removeEventListener('mouseup', handleTextSelection);
            pane.addEventListener('mouseup', handleTextSelection);
            pane.removeEventListener('contextmenu', handleContextMenuCustom);
            pane.addEventListener('contextmenu', handleContextMenuCustom);
        }
        
        function computeResults() {
            let report = "";
            for(let idx=0; idx<articlesData.length; idx++) {
                let art = articlesData[idx];
                report += `\n📄 ${art.title}\n─────────────────────\n`;
                let allKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_`)).sort();
                let map = new Map();
                for(let k of allKeys) {
                    let parts = k.split('_');
                    let qid = parseInt(parts[2]);
                    let val = userAnswers[k];
                    map.set(qid, val || "(no answer)");
                }
                let sorted = Array.from(map.keys()).sort((a,b)=>a-b);
                for(let q of sorted) report += `  ${q}. ${map.get(q)}\n`;
                if(sorted.length===0) report += `  (no answers)\n`;
                report += `\n`;
            }
            return report;
        }
        
        document.getElementById('submitAllBtn').onclick = () => {
            if(submitted) return alert("Already submitted.");
            submitted = true;
            stopTimer();
            let resultStr = computeResults();
            let panel = document.getElementById('resultPanel');
            panel.innerHTML = `<div class="result-header">📊 Answer Summary (with question numbers)</div><div class="copy-area">${resultStr.replace(/\n/g,'<br>')}</div><div style="margin-top:20px;display:flex;gap:15px;justify-content:center;"><button id="copyResultsBtn" class="ctrl-btn">📋 Copy answers for checking</button><button id="closeResultBtn" class="ctrl-btn reset-btn">Close</button></div>`;
            panel.style.display = 'block';
            document.getElementById('copyResultsBtn')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(computeResults()); alert("Answers copied"); });
            document.getElementById('closeResultBtn')?.addEventListener('click', ()=>{ panel.style.display = 'none'; });
            document.getElementById('submitAllBtn').disabled = true;
            document.querySelectorAll('select, input').forEach(el => el.disabled = true);
        };
        
        document.getElementById('clearAllBtn').onclick = () => {
            if(confirm("Clear all answers and reset highlights?")) {
                stopTimer(); submitted=false; userAnswers={}; globalDeadline=null;
                renderCurrent(); document.getElementById('resultPanel').style.display='none';
                document.getElementById('submitAllBtn').disabled=false;
                refreshTimer();
            }
        };
        
        const parsed = parseArticle(combined, "The Art of Deception");
        articlesData = [parsed];
        currentArticleIdx=0; submitted=false; userAnswers={};
        renderCurrent(); refreshTimer();
        
        function updateTabBar() {
            let container = document.getElementById('articleSwitchContainer');
            if(!articlesData.length) return;
            let btns = '';
            for(let i=0;i<articlesData.length;i++) {
                let activeClass = i===currentArticleIdx ? 'active-article' : '';
                btns += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Deception</button>`;
            }
            container.innerHTML = btns;
            document.querySelectorAll('.nav-article-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(submitted) { alert("Already submitted, please reset first."); return; }
                    let idx = parseInt(btn.getAttribute('data-idx'));
                    if(!isNaN(idx) && idx !== currentArticleIdx) {
                        currentArticleIdx = idx;
                        renderCurrent();
                        updateTabBar();
                    }
                });
            });
            document.getElementById('articleCountInfo').innerText = `${articlesData.length} passage (20 minutes)`;
        }
        updateTabBar();
    })();
</script>
</body>
</html>
