<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reborn新生留学 · 睡眠研究阅读模考</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f2f2 0%, #d4e6e6 100%);
            padding: 20px;
            min-height: 100vh;
            user-select: text;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .mock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: white;
            border-radius: 28px;
            padding: 15px 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #d0e2e2;
        }
        .title-area h1 {
            color: #0F6B6B;
            font-size: 26px;
            letter-spacing: 1px;
        }
        .title-area p {
            color: #2a8c8c;
            font-size: 14px;
        }
        .control-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background-color: #0F6B6B;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .ctrl-btn.reset-btn {
            background-color: #c97e5a;
        }
        .ctrl-btn:hover {
            transform: translateY(-2px);

        }
        .timer-block {
            background-color: #0F6B6B20;
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid #0F6B6B;
            text-align: center;
        }
        .timer-label {
            font-size: 13px;
            font-weight: bold;
            color: #0F6B6B;
        }
        .timer-display {
            font-size: 28px;
            font-weight: 700;
            font-family: monospace;
            color: #0F6B6B;
            line-height: 1;
        }
        .article-tab-bar {
            display: flex;
            gap: 15px;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid #d1eaea;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .article-switch {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-article-btn {
            background-color: #e0f0f0;

            padding: 8px 20px;

        .article-indicator {
            font-weight: 600;

        }
        .reading-dashboard {
            display: flex;
            gap: 24px;
            min-height: 70vh;
            background: transparent;
        }
        .left-article-pane {
            flex: 1.1;
            background: #FEFEF7;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);

            background: #FEFEF7;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow-y: auto;
            max-height: 75vh;
            padding: 28px 28px;
            border: 1px solid #e2efef;
        }
        .article-wrapper {
            display: block;
        }
        .article-title {
            font-size: 24px;
            font-weight: 700;
            color: #0F6B6B;
            border-left: 5px solid #0F6B6B;
            padding-left: 18px;
            margin-bottom: 16px;
        }
        .article-text {
            line-height: 1.5;
            color: #2c3e3e;
            font-size: 15px;
            text-align: left;
        }
        .article-text p {
            margin-bottom: 10px;

        }
        .highlight {
            background-color: #fff3b0;
            cursor: pointer;

        }

        .raw-questions-text {
            margin-bottom: 20px;

        .instruction-text {

            padding: 10px 14px;

        }
        .submit-section {

        }
        .global-submit {
            background-color: #0F6B6B;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        .result-panel {
            background: white;
            border-radius: 28px;
            margin-top: 30px;
            padding: 20px 28px;
            border: 2px solid #0F6B6B;

            text-align: left;
        }
        .result-header {
            font-size: 22px;
            color: #0F6B6B;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .copy-area {
            background: #f2f9f9;
            padding: 20px;
            border-radius: 18px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 13px;
            border: 1px solid #cce2e2;

            overflow-y: auto;

        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        ::-webkit-scrollbar {

        }
        .context-menu-item {
            padding: 8px 20px;
            cursor: pointer;
            color: #2c5a5a;
            transition: background 0.1s;
        }
        .context-menu-item:hover {
            background: #e0f0f0;
            color: #0F6B6B;
        }
        .raw-questions-text strong, .raw-questions-text b {
            font-weight: 700;
            color: #1e4a4a;
        }
        .inline-fill-input {
            display: inline-block;
            min-width: 130px;
            padding: 4px 8px;
            border: 1px solid #c2dddd;
            border-radius: 12px;
            font-size: 13px;
            background: white;
            margin: 0 4px;
            font-family: inherit;
        }
        .inline-fill-input:focus {
            outline: none;
            border-color: #0F6B6B;
            box-shadow: 0 0 0 2px rgba(15,107,107,0.2);
        }
        .question-line {
            margin-bottom: 4px;
            line-height: 1.5;
        }
        .fill-line-with-number {
            display: inline;
        }
        .q-number-badge {
            display: inline-block;
            background: #0F6B6B;
            color: white;
            border-radius: 20px;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            line-height: 22px;
            margin-right: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="mock-header">
        <div class="title-area">
            <h1>📖 Reborn新生留学 · 睡眠研究阅读模考</h1>
            <p>左键选中高亮，右键删除高亮 | 已内置Sleep Study | 禁止复制/查词/翻译</p>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn reset-btn" id="clearAllBtn">🗑️ 清空所有答案 & 重置</button>
            <div class="timer-block">
                <div class="timer-label">⏱️ 剩余时间</div>
                <div class="timer-display" id="countdownDisplay">20:00</div>
            </div>
        </div>
    </div>

    <div class="article-tab-bar" id="articleTabBar">
        <div class="article-switch" id="articleSwitchContainer"></div>
        <div class="article-indicator" id="articleCountInfo">1 篇文章 (每篇20分钟)</div>
    </div>

    <div class="reading-dashboard">
        <div class="left-article-pane" id="leftArticlePane">
            <div id="articleRenderArea" style="min-height: 200px;"></div>
        </div>
        <div class="right-questions-pane" id="rightQuestionsPane">
            <div id="questionsRenderArea"></div>
        </div>
    </div>

    <div class="submit-section">
        <button class="global-submit" id="submitAllBtn">✅ 提交全部答案</button>
    </div>
    <div id="resultPanel" class="result-panel"></div>
</div>

<script>
    // 禁用原生右键菜单（除高亮span外）
    document.addEventListener('contextmenu', function(e) {
        let target = e.target;
        let isHighlightSpan = false;
        while(target && target !== document.body) {
            if(target.classList && target.classList.contains('highlight')) {
                isHighlightSpan = true;
                break;
            }
            target = target.parentElement;
        }
        if (!isHighlightSpan) {
            e.preventDefault();
            return false;
        }
        e.preventDefault();
        return false;
    });
    
    // 禁止复制/剪切等
    document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
    document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
            e.preventDefault();
            return false;
        }
        if (e.key === 'F12' || e.key === 'ContextMenu') {
            e.preventDefault();
            return false;
        }
    });
    
    // ---------- 文章内容（保留原始空行）----------
    const fullArticleText = `Sleep Study on Modern-Day Hunter-Gatherers Dispels Popular Notions

The sleep troubles common in modern life have long been blamed on our
industrial society, from the city lights, long work hours and commutes,
to caffeine and the Internet. Sleep researchers often look back on a
time when humans were able to get more rest by sleeping and waking to
the rhythms of the sun. It turns out that this may not be quite right.
In fact, our ancestors may not have been getting the recommended eight
hours of sleep, either.

In a recent study, researchers traveled all over the world to examine
sleep in some of the world's last remaining hunter-gatherer societies -
the Hadza of Tanzania, the San of Namibia, and the Tsimane of Bolivia.
Cut off from media, electricity and other distractions, these
pre-industrial societies are thought to sleep the way humans did more
than 10,000 years ago. Traveling to where they lived, often in humid,
remote locations, researchers used medical devices to record the
sleeping habits of 94 of these tribespeople and ended up collecting data
representing 1,165 days.

They found very similar sleep patterns despite their geographic
isolation. On average, all three groups sleep a little less than 6.5
hours a night, do not take naps, and don't go to sleep when it gets
dark. Like many of us, the Hadza, San, and Tsimane spend more time in
bed - from 6.9 to 8.5 hours - than they do actually sleeping. This adds
up to a sleep efficiency that is very similar to today's industrial
populations.

According to Jerome Siegel, director of the University of California's
Center for Sleep Research, evidence suggests sleep habits may not be
environmental or cultural, but central to the physical makeup of humans.
These findings question the millions of dollars that have been spent on
research that tries to explain why some sleepers get only about six
hours of sleep a night. Also, such findings question whether lack of
sleep is a cause of obesity, mood disorders, and other physical and
mental illnesses which have become so common in recent decades.
Scientists have documented that people's energy often falls in the
mid-afternoon. Some have suggested that it's because we've managed to
suppress a natural desire for a nap.

However, the new study provides evidence that this is unlikely, and that
napping was actually rare in hunter-gatherer societies. The researchers
estimated that naps may have occurred on up to 7 percent of winter days
and 22 percent of summer days. They noted that their devices were only
good at detecting longer naps, so it is possible that some of the study
subjects took naps that were short, perhaps 15 minutes or less.

Another fascinating finding from the study had to do with the circadian
rhythms, our daily activity cycles related to sunlight. Instead of going
to sleep right at dusk, tribespeople were staying awake an average of
between 2.5 and 4.4 hours after sunset. All three tribes had fires
going, but the light itself was much lower than you might get from a
light bulb. They did, however, have a tendency to wake up anywhere
between an hour before and an hour after sunrise.

Siegel and his co-authors investigated this further by looking into the
significance of temperature. They found that it also played a big role,
though it was somewhat less important than light in influencing sleep
patterns. They wrote that "sleep in both the winter and summer usually
occurred during the period of cooling and that waking times usually
occurred near the height of the daily warming trend."

The tribespeople that were studied are different from people living in
modern conditions in a number of respects. Importantly, almost none of
them were troubled by sleeplessness. In interviews with the researchers
conducted through interpreters, only 1.5 to 2.5 percent of the study
subjects said they had severe difficulties sleeping more than once a
year. This figure is far lower than the 10 to 30 percent recorded in
many industrialized countries today. Siegel suggested that "mimicking
aspects of the natural environment" may therefore help treat some sleep
disorders.

The tribespeople are also much healthier. Not a single one is
overweight, indicating their overall higher levels of physical fitness.
They also tended to have healthier hearts. Thus comes a critical
question. If we can't blame our health problems on our lack of sleep,
could it be that the reason we feel so unrested is because of poor
health?`;

    // 题目部分：保留加粗标记，横线位置用占位符，并标注题号
    const questionsRaw = `**You should spend about 20 minutes on Questions 1-13, which are based on Reading Passage 1 below.**

**Questions 1-4**

**Do the following statements agree with the information given in Reading Passage 1?**

**In boxes 1-4 on your answer sheet, write**

**TRUE if the statement agrees with the information**

**FALSE if the statement contradicts the information**

**NOT GIVEN if there is no information on this**

1 Scientists studied hunter-gatherer societies because their sleep patterns are assumed to be similar to those of humans more than 10,000 years ago.

2 The medical devices used in the research were specially designed for humid conditions.

3 Researchers found that tribespeople stayed longer in bed than inhabitants of industrialised regions.

4 Jerome Siegel believes that environment and culture have little effect on sleep patterns.

**Questions 5-13**

**Complete the notes below.**

**Choose ONE WORD ONLY from the passage for each answer.**

**Write your answers in boxes 5-13 on your answer sheet.**

New Evidence on Sleep Patterns

New ideas about napping

- scientists have recorded an afternoon drop in [5] ___________

- studies of hunter-gatherer societies show that napping was rare and occurred more often during the [6] ___________

- the devices may not have detected [7] ___________ naps

Daily activity cycles

- the tribespeople went to sleep several hours after sunset

- even with [8] ___________ there was little light

- tribespeople usually woke up around [9] ___________

- scientists found that [10] ___________ had almost as much influence on sleep patterns as light

Differences between tribespeople and people in industrialised regions

- [11] ___________ is something that very few of the tribespeople suffered from

- the environment of tribespeople may have been more suitable for sleep

- tribespeople had better fitness than industrialised populations and were not [12] ___________

- tribespeople also had stronger [13] ___________`;

    const combinedContent = fullArticleText + "\n\n===questions===\n" + questionsRaw;
    
    // 解析器
    function parseArticleContent(fullText, fallbackTitle) {
        let separator = "===questions===";
        let articlePart = "";
        let questionsPartRaw = "";
        if (fullText.includes(separator)) {
            let parts = fullText.split(separator);
            articlePart = parts[0].trim();
            questionsPartRaw = parts.slice(1).join(separator).trim();
        } else {
            articlePart = fullText.trim();
            questionsPartRaw = "";
        }
        let title = fallbackTitle || "Reading Passage";
        let lines = articlePart.split(/\r?\n/);
        if (lines.length > 0 && lines[0].trim().length > 0 && lines[0].trim().length < 100) {
            title = lines[0].trim();
            articlePart = lines.slice(1).join("\n").trim();
        }
        return { title, bodyText: articlePart, questionsRawText: questionsPartRaw };
    }
    
    let articlesData = [];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    
    function startTimerForCurrentArticle() {
        if (submitted) return;
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "00:00"; return; }
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        const totalMinutes = articlesData.length * 20;
        globalDeadline = Date.now() + totalMinutes * 60 * 1000;
        if (!submitted) startTimerForCurrentArticle();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            if (para.trim()) {
                html += `<p>${escapeHtml(para)}</p>`;
            } else {
                html += `<p><br></p>`;
            }
        }
        return html;
    }
    
    // 将 [数字] 转换为带题号的输入框
    function replacePlaceholdersWithInputs(text) {
        // 匹配 [数字] 后面可能有下划线或空格的情况
        return text.replace(/\[(\d+)\]\s*_{3,}|\[(\d+)\]\s*_____|\[(\d+)\]\s*___________/g, function(match, qid1, qid2, qid3) {
            let qid = qid1 || qid2 || qid3;
            let answerKey = `${currentArticleIdx}_${qid}`;
            let storedVal = userAnswers[answerKey] || "";
            return `<span class="fill-line-with-number"><span class="q-number-badge">${qid}</span><input type="text" class="inline-fill-input" data-qid="${qid}" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(storedVal)}" style="width: ${Math.max(130, storedVal.length * 12 + 30)}px"></span>`;
        }).replace(/\[(\d+)\]/g, function(match, qid) {
            // 处理没有下划线的占位符
            let answerKey = `${currentArticleIdx}_${qid}`;
            let storedVal = userAnswers[answerKey] || "";
            return `<span class="fill-line-with-number"><span class="q-number-badge">${qid}</span><input type="text" class="inline-fill-input" data-qid="${qid}" data-article="${currentArticleIdx}" placeholder="Answer" value="${escapeHtml(storedVal)}" style="width: ${Math.max(130, storedVal.length * 12 + 30)}px"></span>`;
        });
    }
    
    // 渲染题目区域
    function renderQuestionsPanel(article) {
        let rawText = article.questionsRawText || "";
        if (!rawText.trim()) return '<div>⚠️ 题目缺失</div>';
        
        // 先转义HTML，但保留 [数字] 占位符不被转义
        let escaped = rawText.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
        
        // 处理加粗标记 **文本** -> <strong>文本</strong>
        escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        let lines = escaped.split(/\r?\n/);
        let resultHtml = `<div class="instruction-text">📌 请根据文章作答，直接在横线位置填写答案（每空仅填一个单词）。</div>`;
        resultHtml += `<div class="raw-questions-text" style="white-space: pre-wrap; word-break: break-word;">`;
        
        for (let idx = 0; idx < lines.length; idx++) {
            let line = lines[idx];
            
            if (line === "") {
                resultHtml += `<br>`;
            } else {
                // 将 [数字] 替换为带题号的输入框
                let processedLine = replacePlaceholdersWithInputs(line);
                resultHtml += `<div class="question-line">${processedLine}</div>`;
            }
        }
        resultHtml += `</div>`;
        return resultHtml;
    }
    
    function attachDynamicEvents() {
        document.querySelectorAll('.inline-fill-input').forEach(inp => {
            inp.removeEventListener('input', handleInlineInput);
            inp.addEventListener('input', handleInlineInput);
            inp.removeEventListener('keyup', adjustWidth);
            inp.addEventListener('keyup', adjustWidth);
        });
    }
    
    function handleInlineInput(e) {
        if(submitted) return;
        let inp = e.target;
        let article = parseInt(inp.dataset.article);
        let qid = parseInt(inp.dataset.qid);
        let key = `${article}_${qid}`;
        userAnswers[key] = inp.value.trim();
        adjustWidth.call(inp);
    }
    
    function adjustWidth() {
        let inp = this;
        let value = inp.value;
        let minWidth = 130;
        let newWidth = Math.max(minWidth, value.length * 12 + 30);
        inp.style.width = newWidth + 'px';
    }
    
    function renderCurrent() {
        if (!articlesData.length) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper">
            <div class="article-title">${escapeHtml(article.title)}</div>
            <div class="article-text">${formatArticleText(article.bodyText)}</div>
        </div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        document.getElementById('questionsRenderArea').innerHTML = renderQuestionsPanel(article);
        attachDynamicEvents();
        initHighlightFeature();
    }
    
    function initHighlightFeature() {
        const articlePane = document.getElementById('leftArticlePane');
        articlePane.removeEventListener('mouseup', handleTextSelection);
        articlePane.addEventListener('mouseup', handleTextSelection);
        articlePane.removeEventListener('contextmenu', handleContextMenu);
        articlePane.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('click', function() { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } });
    }
    
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch(err) {}
    }
    
    function handleContextMenu(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        while (target && target !== document.getElementById('articleRenderArea')) {
            if (target.classList && target.classList.contains('highlight')) { highlightSpan = target; break; }
            target = target.parentElement;
        }
        if (!highlightSpan) { e.preventDefault(); return; }
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const delOpt = document.createElement('div');
        delOpt.className = 'context-menu-item';
        delOpt.textContent = '🗑️ Delete highlight';
        delOpt.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const textNode = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(textNode, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(delOpt);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu) { currentContextMenu.remove(); currentContextMenu = null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function computeResultsWithAnswers() {
        let report = "";
        for (let idx=0; idx<articlesData.length; idx++) {
            let art = articlesData[idx];
            report += `\n📄 P${idx+1}: ${art.title}\n─────────────────────\n`;
            let answerMap = new Map();
            for (let key in userAnswers) {
                if (key.startsWith(`${idx}_`)) {
                    let qid = parseInt(key.split('_')[1]);
                    answerMap.set(qid, userAnswers[key]);
                }
            }
            let sorted = Array.from(answerMap.keys()).sort((a,b)=>a-b);
            for (let qid of sorted) {
                let ans = answerMap.get(qid) || "(未作答)";
                report += `  ${qid}. ${ans}\n`;
            }
            if (sorted.length===0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已提交过答案");
        submitted = true;
        stopTimer();
        let resultStr = computeResultsWithAnswers();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总 (带题号)</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px;display:flex;gap:15px;justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案找老师校对</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { 
            navigator.clipboard.writeText(computeResultsWithAnswers()); 
            alert("答案已复制，可发给老师"); 
        });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { 
            panel.style.display = 'none'; 
        });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('.inline-fill-input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有答案和重置高亮？")) {
            stopTimer();
            submitted = false;
            userAnswers = {};
            globalDeadline = null;
            renderCurrent();
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('submitAllBtn').disabled = false;
            refreshTimer();
        }
    };
    
    // 初始化
    const parsed = parseArticleContent(combinedContent, "Sleep Study on Modern-Day Hunter-Gatherers Dispels Popular Notions");
    articlesData = [parsed];
    currentArticleIdx = 0;
    submitted = false;
    userAnswers = {};
    renderCurrent();
    refreshTimer();
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        if(articlesData.length===0) return;
        let btnsHtml = '';
        for(let i=0;i<articlesData.length;i++) {
            let activeClass = i===currentArticleIdx ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · ${escapeHtml(articlesData[i].title.substring(0,25))}</button>`;
        }
        container.innerHTML = btnsHtml;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(submitted) { alert("已提交答案，请先清空"); return; }
                let idx = parseInt(btn.dataset.idx);
                if(!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
        document.getElementById('articleCountInfo').innerText = `${articlesData.length} 篇文章 (每篇20分钟)`;
    }
    updateTabBar();
</script>
</body>
</html>
