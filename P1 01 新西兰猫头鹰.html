<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>Reborn新生留学 · 阅读模考 | 新西兰猫头鹰</title>
    <style>

        .mock-header {

        .timer-label {

        }

        .article-tab-bar {

        .notes-embedded {
            background: #fff9ea;

        .inline-fill-input {
            display: inline-block;
            min-width: 100px;

            margin: 0 4px;

        }
        .inline-fill-input:focus {
            outline: none;
            border-color: #0F6B6B;
            box-shadow: 0 0 0 2px #0F6B6B30;
            background: white;
        }
        .fill-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0F6B6B;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            width: 24px;
            height: 24px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .submit-section {
            margin-top: 25px;
            text-align: center;
        }
        .global-submit {
            background-color: #0F6B6B;
            color: white;
            border: none;
            padding: 14px 35px;

        }
        .result-panel {
            background: white;
            border-radius: 28px;

        }
        .result-header {
            font-size: 22px;
            color: #0F6B6B;

            margin-bottom: 20px;
        }
        .copy-area {
            background: #f2f9f9;

            border-radius: 18px;
            font-family: monospace;
            white-space: pre-wrap;

            border: 1px solid #cce2e2;

        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2efef; border-radius: 8px; }

            padding: 6px 0;
            z-index: 10000;
        }
        .context-menu-item {
            padding: 8px 20px;
            cursor: pointer;
            color: #2c5a5a;
        }
        .context-menu-item:hover {

        body { -webkit-touch-callout: none; user-select: text; }

<body>
<div class="app-container">
    <div class="mock-header">
        <div class="title-area">
            <h1>📖 Reborn新生留学 Reading Mock Test</h1>
            <p>左键选中高亮，右键删除高亮 | 已内置「新西兰猫头鹰」专题 | 判断 + 填空</p>
        </div>
        <div class="control-buttons">
            <button class="ctrl-btn reset-btn" id="clearAllBtn">🗑️ 清空所有答案</button>
            <div class="timer-block">
                <div class="timer-label">⏱️ 剩余时间</div>
                <div class="timer-display" id="countdownDisplay">--:--</div>
            </div>
        </div>
    </div>

    <div class="article-tab-bar">
        <div class="article-switch" id="articleSwitchContainer"></div>
        <div class="article-indicator" id="articleCountInfo">1 篇文章已加载</div>
    </div>

    <div class="reading-dashboard">
        <div class="left-article-pane" id="leftArticlePane">
            <div id="articleRenderArea"></div>
        </div>
        <div class="right-questions-pane" id="rightQuestionsPane">
            <div id="questionsRenderArea"></div>
        </div>
    </div>

    <div class="submit-section">
        <button class="global-submit" id="submitAllBtn">✅ 提交全部答案</button>
    </div>
    <div id="resultPanel" class="result-panel"></div>
</div>

<script>
    // 新西兰猫头鹰文章数据
    const owlArticle = {
        title: "A survivor's story",
        bodyText: `A survivor's story

*One native bird in New Zealand that has managed to survive the introduction of non-native species*

As an island country with a fauna dominated by birds, New Zealand was once home to an owl species which is now extinct, the laughing owl, named for its distinctive cry. This bird was widespread throughout the islands when European settlers arrived in the middle of the 19th century and it remained in good numbers for some years thereafter. Where other native birds suffered from predation by the Polynesian rat, the laughing owl turned the tables and adapted its diet to include the rodent. It was also capable of catching and killing the other New Zealand owl, the morepork, and even larger birds, such as the weka. However, the laughing owl was wiped out around the beginning of the 20th century, its demise caused by specimen collectors, habitat changes, and non-native predators including cats and stoats. Surprisingly, it is the smaller owl, the morepork, that has managed to survive until this day.

Speckled dark brown, with yellow eyes and long tails, they are around 29 centimetres long from head to tail and 175 grams in weight. Moreporks have fringes on the edge of their feathers, so they can fly almost silently and not alert potential prey. They have acute hearing and their large eyes are very sensitive to light.

Moreporks nest in tree hollows, in clumps of plants, or in cavities among rocks and roots. In the wild, moreporks usually start nesting in October, although two specimens have been recorded nesting in mid-winter, possibly stimulated by an ample food supply. The female lays up to three white eggs, which she incubates for 20 to 30 days. During this time, she rarely hunts, and the male brings food to her.

Once the chicks hatch, she stays mainly on the nest until the young owls are fully feathered. When hatched, chicks are covered in light grey down and have their eyes closed. The eyes do not open until the eighth day after hatching. They can fly at around 35 days.

By day, moreporks sleep in roosts. By night, they hunt a variety of animals -- mainly large invertebrates including scarab and huhu beetles, moths, caterpillars and spiders. They also take small birds and mice. They can find suitable food in pine forest as well as native forest. A morepork uses its sharp talons to catch or stun its prey, which it then carries away in its bill. Moreporks are clever hunters, and birds such as robins, grey warblers and fantails can end up as their prey. In the day, these small birds sometimes mob drowsy moreporks and chase them away from their roosts; they force the sleepy predators to search for a more peaceful spot.

Moreporks have proved to be ungracious hosts. Scientists trying to establish a population of plovers on Motuora Island in New Zealand's Hauraki Gulf were mystified as to why only two birds survived out of the 75 placed there. The culprits turned out to be five pairs of moreporks that ate or chased away the new arrivals.

Although moreporks are still considered to be relatively common, it is likely that numbers are in gradual decline due to predation and loss of habitat. As the female is a hole-nester, she is vulnerable to predators such as stoats and possums during the breeding season, and eggs and chicks will also be at risk from rats. The use of pesticides is another possible threat to the owls, though not a direct one. As moreporks are at the top of the food chain, they could be affected by an accumulative poison by consuming prey that has ingested poison.

The New Zealand Department of Conservation is taking steps to ensure the preservation of New Zealand's only native owl. The department is involved in measuring the population of moreporks and has put transmitters on a number of birds to determine survival and mortality. As well as being New Zealand's only native owl, the morepork has symbolic and spiritual importance, so in monitoring the birds it is hoped that the morepork will continue to survive and thrive.

At dusk, the melancholy sound of the morepork can be heard in forests and parks as it calls to other moreporks and claims territory. Its Māori name (ruru) echoes its two-part cry. In the tradition of the Māori people of New Zealand, the morepork, or ruru, was often seen as a careful guardian. A number of sayings referred to the bird's alertness. As a bird of the night, it was associated with the spirit world. Moreporks were believed to act as messengers to the gods in the heavens, flying along spiritual paths in the sky. They were the mediums used to communicate with the gods. The occasional high, piercing call of the morepork signified bad news, but the lower-pitched and more common "ruru" call heralded good news.`,
        // 判断题 1-7
        tfQuestions: [
            { id: 1, text: "Early European settlers made detailed studies of the morepork." },
            { id: 2, text: "The Polynesian rat had a negative effect on the number of laughing owls." },
            { id: 3, text: "The laughing owl was larger than the morepork." },
            { id: 4, text: "Rats pose a risk to young moreporks." },
            { id: 5, text: "The New Zealand Department of Conservation is hoping to limit the population of moreporks." },
            { id: 6, text: "Other bird species are frightened away when they hear the morepork's cry." },
            { id: 7, text: "In Maori tradition, the low call of the morepork had negative associations." }
        ],
        // 填空题嵌入notes (8-13, ONE WORD AND/OR A NUMBER)
        notesEmbedded: {
            text: `<div class="notes-section">
<div class="note-line"><strong>Appearance</strong><br>
- approximately <span class="fill-badge">8</span> <input type="text" class="inline-fill-input" data-fill-id="8" placeholder="word/number" autocomplete="off"> in length<br>
- feathers with fringes to enable quiet flight</div>
<div class="note-line"><strong>Nesting</strong><br>
- nests in trees, plants or spaces in roots and <span class="fill-badge">9</span> <input type="text" class="inline-fill-input" data-fill-id="9" placeholder="one word" autocomplete="off"><br>
- after about 35 days, baby moreporks are capable of leaving the nest</div>
<div class="note-line"><strong>Hunting</strong><br>
- transports its prey using its <span class="fill-badge">10</span> <input type="text" class="inline-fill-input" data-fill-id="10" placeholder="one word" autocomplete="off"><br>
- can be chased away by other birds during the <span class="fill-badge">11</span> <input type="text" class="inline-fill-input" data-fill-id="11" placeholder="one word" autocomplete="off"><br>
- attacked <span class="fill-badge">12</span> <input type="text" class="inline-fill-input" data-fill-id="12" placeholder="one word" autocomplete="off"> that had been introduced to Motuora Island</div>
<div class="note-line"><strong>Threats</strong><br>
- may be exposed to <span class="fill-badge">13</span> <input type="text" class="inline-fill-input" data-fill-id="13" placeholder="one word" autocomplete="off"> in their prey</div>
</div>`,
            questions: [8,9,10,11,12,13]
        }
    };
    
    let articlesData = [owlArticle];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 禁用右键默认菜单 + 禁止复制翻译
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
    document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
    document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    function startTimer() {
        if (submitted) return;
        if (articlesData.length === 0) return;
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        globalDeadline = Date.now() + (articlesData.length * 20 * 60 * 1000);
        if (!submitted) startTimer();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            let processed = escapeHtml(para).replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            if (processed.trim()) html += `<p>${processed}</p>`;
        }
        return html;
    }
    
    // 渲染题目区：判断题 + 嵌入填空题的notes
    function renderQuestionsPanel(article) {
        let html = `<div class="instruction-note">📌 阅读文章后作答。判断题请点选，填空题请直接在下方notes中输入答案 (每空一个单词或数字)。</div>`;
        html += `<div class="questions-container">`;
        
        // 判断题 1-7
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 1–7</div>
            <div class="group-instruction">TRUE / FALSE / NOT GIVEN</div>`;
        for (let q of article.tfQuestions) {
            const answerKey = `${currentArticleIdx}_tf_${q.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${q.id}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                </div>
                <div class="tf-options">
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="TRUE" ${saved === "TRUE" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>TRUE</span>
                    </label>
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="FALSE" ${saved === "FALSE" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>FALSE</span>
                    </label>
                    <label class="tf-opt">
                        <input type="radio" name="tf_${q.id}" value="NOT GIVEN" ${saved === "NOT GIVEN" ? "checked" : ""} data-tf-id="${q.id}">
                        <span>NOT GIVEN</span>
                    </label>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 填空题部分 (QUESTIONS 8-13) 嵌入notes
        html += `<div class="question-group">
            <div class="group-title">📝 QUESTIONS 8–13</div>
            <div class="group-instruction">Complete the notes. Choose ONE WORD AND/OR A NUMBER from the passage for each answer.</div>
            <div class="notes-embedded" id="notesEmbeddedArea">${article.notesEmbedded.text}</div>
        </div>`;
        html += `</div>`;
        return html;
    }
    
    // 处理TF单选
    function handleTfChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-tf-id'));
        const value = radio.value;
        const key = `${currentArticleIdx}_tf_${qid}`;
        userAnswers[key] = value;
        const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
        allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
    }
    
    // 处理填空输入
    function handleFillInput(e) {
        if (submitted) return;
        const input = e.target;
        const qid = parseInt(input.getAttribute('data-fill-id'));
        const key = `${currentArticleIdx}_fill_${qid}`;
        userAnswers[key] = input.value.trim();
    }
    
    function attachQuestionEvents() {
        // TF radio
        document.querySelectorAll('input[type="radio"][data-tf-id]').forEach(radio => {
            radio.removeEventListener('change', handleTfChange);
            radio.addEventListener('change', handleTfChange);
        });
        // 填空输入框
        document.querySelectorAll('.inline-fill-input').forEach(inp => {
            inp.removeEventListener('input', handleFillInput);
            inp.addEventListener('input', handleFillInput);
            const qid = parseInt(inp.getAttribute('data-fill-id'));
            const key = `${currentArticleIdx}_fill_${qid}`;
            if (userAnswers[key]) {
                inp.value = userAnswers[key];
            }
        });
    }
    
    function renderCurrent() {
        if (articlesData.length === 0) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        let questionsHtml = renderQuestionsPanel(article);
        document.getElementById('questionsRenderArea').innerHTML = questionsHtml;
        attachQuestionEvents();
        reapplyHighlightFeature();
        updateTabBar();
    }
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        let btnsHtml = '';
        for (let i = 0; i < articlesData.length; i++) {
            let activeClass = (i === currentArticleIdx) ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · Morepork</button>`;
        }
        container.innerHTML = btnsHtml;
        document.getElementById('articleCountInfo').innerHTML = `${articlesData.length} 篇文章 (每篇20分钟)`;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (submitted) { alert("已提交答案，请清空后再切换"); return; }
                let idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
    }
    
    // 高亮功能
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch (err) { }
    }
    
    function handleContextMenuCustom(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        const articlePane = document.getElementById('articleRenderArea');
        while (target && target !== articlePane) {
            if (target.classList && target.classList.contains('highlight')) {
                highlightSpan = target;
                break;
            }
            target = target.parentElement;
        }
        if (!highlightSpan) return;
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const deleteOption = document.createElement('div');
        deleteOption.className = 'context-menu-item';
        deleteOption.textContent = '🗑️ Delete highlight';
        deleteOption.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const text = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(text, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(deleteOption);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function initHighlightFeature() {
        const pane = document.getElementById('leftArticlePane');
        pane.removeEventListener('mouseup', handleTextSelection);
        pane.addEventListener('mouseup', handleTextSelection);
        pane.removeEventListener('contextmenu', handleContextMenuCustom);
        pane.addEventListener('contextmenu', handleContextMenuCustom);
    }
    function reapplyHighlightFeature() { initHighlightFeature(); }
    
    // 提交汇总
    function computeResults() {
        let report = "";
        for (let idx = 0; idx < articlesData.length; idx++) {
            report += `\n📄 P${idx+1}: A survivor's story (Morepork)\n─────────────────────\n`;
            let tfKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_tf_`)).sort();
            let fillKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_fill_`)).sort();
            for (let key of tfKeys) {
                let qid = key.split('_')[2];
                report += `  ${qid}. ${userAnswers[key]}\n`;
            }
            for (let key of fillKeys) {
                let qid = key.split('_')[2];
                let ans = userAnswers[key] || "(未作答)";
                report += `  ${qid}. ${ans}\n`;
            }
            if (tfKeys.length === 0 && fillKeys.length === 0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已经提交过了");
        submitted = true;
        stopTimer();
        let resultStr = computeResults();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px; display:flex; gap:15px; justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResults()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('input, .inline-fill-input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有已填答案？")) {
            userAnswers = {};
            submitted = false;
            document.getElementById('submitAllBtn').disabled = false;
            document.getElementById('resultPanel').style.display = 'none';
            renderCurrent();
            refreshTimer();
        }
    };
    
    renderCurrent();
    refreshTimer();
    initHighlightFeature();
</script>
</body>
</html>
