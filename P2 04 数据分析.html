<script>
    // 数据分析文章数据
    const dataArticle = {
        title: "Investment in Shares vs. Investment in Other Assets Which Gives the Greater Gain?",
        bodyText: `Investment in Shares vs. Investment in Other Assets Which Gives the Greater Gain?

*How one university collected the data to try and answer this question*

A It all began in 1958 with a phone call from Louis Engel, a banker at Merrill Lynch, a US-based financial management company, who wanted to know how investors in shares had performed relative to investors in other assets such as low-risk investments with guaranteed returns. 'I don't know, but if you gave me $50,000 I could find out,' replied Jim Lorie, a dean at the University of Chicago's business school. Louis Engel soon agreed to provide the funding, and more. The result, in 1960, was the launch of the University's Center for Research in Security Prices. Half a century later CRSP (pronounced 'crisp') data are everywhere. They provided the foundation of at least one-third of all empirical research in finance over the past 40 years, according to a presentation at a symposium held this month. They probably influenced much of the rest.

B Getting the CRSP data together was a tough process in what were then the early days of computers. Up to three million pieces of information on all the shares traded on the New York Stock Exchange between 1926 and 1960 were transferred from paper in the exchange's archive to magnetic tape. A lot of time was spent adjusting prices to take account of complexities in the market. Lorie and his co-researcher, Lawrence Fisher, chose January 1926 as the start date because they wanted the data to span at least one complete business cycle from boom to bust, or vice versa.

C When these two economists published the first study based on the CRSP data in 1964, they reported that the annual compound return on the shares over the entire 35-year period was (depending on the tax status of the investor) between 6.8% and 9%. Acknowledging that good data on the performance of other assets were not available, the study claimed that the rate of return on shares was 'substantially higher than for alternative investment media', providing the first empirical support for the still-popular idea that shares outperform other investments over the long run. Fisher and Lorie also observed that many people chose to invest in assets with lower returns because they were cautious by nature and were concerned about the risk of loss inherent in investing in the stock market. Economists today call the amount of extra return that investors need to compensate them for this additional risk the 'equity risk premium', although they differ greatly on how big investors should expect it to be.

D After Fisher and Lorie's 1964 report there was no stopping the love affair between financial economists and the data that studying these numbers produced. Myron Scholes, now a Nobel laureate, became director of CRSP in 1974, and ensured the database was both kept up to date and made readily available to academic economists everywhere. In turn, this resource became ever more useful as computing power became more affordable. The CRSP database has since been expanded to include a full range of different types of investments. It has been replicated across the world.

E One of the earliest uses of CRSP data was by Eugene Fama, an economist at the University of Chicago, to support his 'efficient-market hypothesis'. He found that over a lengthy period share prices tended to rise and fall randomly, without showing much of a pattern. Markets are efficient, he said, because all relevant information is reflected in share prices at any given moment, meaning there are no predictable movements in prices for smart investors to exploit. Fama did concede that there was some evidence of temporary short-term predictability in share prices, however. That stipulation has resulted in a vast number of papers based on discovering such 'variations' through data mining. In theory, such anomalies are potentially lucrative for investors, but as believers in efficient markets observe with satisfaction, it seems that no sooner are such anomalies discovered and reported in journals than they typically disappear.

F However, the sheer volume of material means that financial economists are becoming increasingly specialised, which may have costs as well as benefits. Some economists worry that much of this statistical analysis is creating some interference that drowns out serious thinking about the big questions, such as why the financial system nearly collapsed in 2008 and how a repeat can be avoided. Robert Shiller, an economist at Yale University and a long-time sceptic about the efficient-market hypothesis, feels that with the creation of the CRSP database economists suddenly believed that finance had become scientific. According to Shiller, conventional ideas about investing and financial markets - and about their vulnerabilities - seemed out of date to the new empiricists. He worries that academic departments are full of economists who are so specialised in data analysis that they fail to see and understand the whole. They get a sense of authority from work that contains lots of data. To have seen the 2008 global financial crisis coming, he argues, it would have been better to 'go back to old-fashioned readings of history, studying institutions and laws. We should have talked to grandpa.'

G Scholes responds to this criticism with the contention that the usefulness of this empirical analysis is proven by the fact that demand for it continues to grow. At CRSP's 50th-anniversary symposium, plans were unveiled to publish indicators on an expanding range of investments, as well as for growth and value stocks. These indicators, CRSP claims, will be more academically rigorous and cheaper than existing ones. For believers in the efficiency of markets, that should be enough to ensure CRSP's continuing success.`,
        headingsList: [
            "i Technological developments improve CRSP data",
            "ii Initial findings of the CRSP project",
            "iii A request and a far-reaching result",
            "iv Difficulties in collecting CRSP data",
            "v What the future holds",
            "vi Too much data for people to have an overall understanding",
            "vii Other university departments which depend on CRSP",
            "viii CRSP data not always being a useful basis for investment"
        ],
        // 观点匹配 21-23 (经济学家: A Fisher and Lorie, B Myron Scholes, C Eugene Fama, D Robert Shiller)
        matchStatements: [
            { id: 21, text: "A traditional approach may have helped predict a financial downturn." },
            { id: 22, text: "Some people invest conservatively and as a result make less money." },
            { id: 23, text: "It may be possible to forecast share prices but not over the long term." }
        ],
        // 填空题 24-26
        summaryFill: {
            text: `The beginnings of CRSP

In 1958 a <span class="fill-badge">24</span> <input type="text" class="inline-fill-input" data-fill-id="24" placeholder="one word" autocomplete="off"> working for a financial management company telephoned Jim Lorie to ask how well investments in shares performed in comparison to investments in low-risk assets. Lorie offered to find out and as a result the University of Chicago's Center for Research in Security Prices (CRSP) was launched. Compiling the CRSP data was difficult because <span class="fill-badge">25</span> <input type="text" class="inline-fill-input" data-fill-id="25" placeholder="one word" autocomplete="off"> were still being developed and information that had previously been on <span class="fill-badge">26</span> <input type="text" class="inline-fill-input" data-fill-id="26" placeholder="one word" autocomplete="off"> needed to be put onto magnetic tape.`,
            questions: [24,25,26]
        }
    };
    
    let articlesData = [dataArticle];
    let currentArticleIdx = 0;
    let userAnswers = {};
    let submitted = false;
    let activeTimer = null;
    let globalDeadline = null;
    let currentContextMenu = null;
    
    // 禁用右键默认菜单 + 禁止复制翻译
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
    document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
    document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
    
    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        let mins = Math.floor(sec / 60);
        let remainSec = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function stopTimer() { if (activeTimer) { clearInterval(activeTimer); activeTimer = null; } }
    function startTimer() {
        if (submitted) return;
        if (articlesData.length === 0) return;
        stopTimer();
        const totalMinutes = articlesData.length * 20;
        const totalSeconds = totalMinutes * 60;
        if (!globalDeadline || globalDeadline < Date.now()) {
            globalDeadline = Date.now() + totalSeconds * 1000;
        }
        function tick() {
            if (submitted) return;
            let diff = Math.max(0, Math.floor((globalDeadline - Date.now()) / 1000));
            if (diff <= 0) {
                document.getElementById('countdownDisplay').innerText = "00:00";
                stopTimer();
                alert("⏰ 考试时间已到！请提交答案。");
                return;
            }
            document.getElementById('countdownDisplay').innerText = formatTime(diff);
        }
        tick();
        activeTimer = setInterval(tick, 1000);
    }
    function refreshTimer() {
        if (articlesData.length === 0) { document.getElementById('countdownDisplay').innerText = "--:--"; return; }
        globalDeadline = Date.now() + (articlesData.length * 20 * 60 * 1000);
        if (!submitted) startTimer();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatArticleText(txt) {
        let paragraphs = txt.split(/\r?\n/);
        let html = '';
        for (let para of paragraphs) {
            let processed = escapeHtml(para).replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            if (processed.trim()) html += `<p>${processed}</p>`;
        }
        return html;
    }
    
    // 渲染题目区：标题匹配(14-20) + 观点匹配(21-23) + 填空(24-26)
    function renderQuestionsPanel(article) {
        let html = `<div class="instruction-note">📌 阅读文章后作答。标题匹配请从下拉框选择对应编号；观点匹配请选择对应经济学家；填空题请直接输入单词。</div>`;
        html += `<div class="questions-container">`;
        
        // 标题匹配 14-20 (段落A-G)
        const paragraphs = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 14–20</div>
            <div class="group-instruction">Choose the correct heading for each paragraph from the list of headings.</div>`;
        for (let i = 0; i < paragraphs.length; i++) {
            const paraLetter = paragraphs[i];
            const qid = 14 + i;
            const answerKey = `${currentArticleIdx}_heading_${paraLetter}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${qid}</span>
                    <span class="q-text">Paragraph ${paraLetter}</span>
                </div>
                <div class="heading-select">
                    <select data-heading-para="${paraLetter}" data-qid="${qid}">
                        <option value="">-- Select heading --</option>`;
            for (let idx = 0; idx < article.headingsList.length; idx++) {
                const headingNum = (idx+1).toString();
                const headingText = article.headingsList[idx];
                const selected = (saved === headingNum) ? 'selected' : '';
                html += `<option value="${headingNum}" ${selected}>${headingNum}. ${escapeHtml(headingText)}</option>`;
            }
            html += `</select>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 观点匹配 21-23
        html += `<div class="question-group">
            <div class="group-title">📋 QUESTIONS 21–23</div>
            <div class="group-instruction">Match each statement with the correct economist, A-D.</div>`;
        for (let stmt of article.matchStatements) {
            const answerKey = `${currentArticleIdx}_match_${stmt.id}`;
            const saved = userAnswers[answerKey] || "";
            html += `<div class="question-card">
                <div class="question-header">
                    <span class="q-number">${stmt.id}</span>
                    <span class="q-text">${escapeHtml(stmt.text)}</span>
                </div>
                <div class="match-options">
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="A" ${saved === "A" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="A"> <span>A. Fisher and Lorie</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="B" ${saved === "B" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="B"> <span>B. Myron Scholes</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="C" ${saved === "C" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="C"> <span>C. Eugene Fama</span></label>
                    <label class="match-opt"><input type="radio" name="match_${stmt.id}" value="D" ${saved === "D" ? "checked" : ""} data-match-id="${stmt.id}" data-match-val="D"> <span>D. Robert Shiller</span></label>
                </div>
            </div>`;
        }
        html += `</div>`;
        
        // 填空题 24-26
        html += `<div class="question-group">
            <div class="group-title">📝 QUESTIONS 24–26</div>
            <div class="group-instruction">Complete the summary. Choose ONE WORD ONLY from the passage for each answer.</div>
            <div class="notes-embedded">${article.summaryFill.text}</div>
        </div>`;
        html += `</div>`;
        return html;
    }
    
    // 事件绑定
    function attachQuestionEvents() {
        // 标题匹配下拉框
        document.querySelectorAll('select[data-heading-para]').forEach(select => {
            select.removeEventListener('change', handleHeadingChange);
            select.addEventListener('change', handleHeadingChange);
        });
        // 观点匹配radio
        document.querySelectorAll('input[type="radio"][data-match-id]').forEach(radio => {
            radio.removeEventListener('change', handleMatchChange);
            radio.addEventListener('change', handleMatchChange);
        });
        // 填空输入框
        document.querySelectorAll('.inline-fill-input').forEach(inp => {
            inp.removeEventListener('input', handleFillInput);
            inp.addEventListener('input', handleFillInput);
            const qid = parseInt(inp.getAttribute('data-fill-id'));
            const key = `${currentArticleIdx}_fill_${qid}`;
            if (userAnswers[key]) {
                inp.value = userAnswers[key];
            }
        });
    }
    
    function handleHeadingChange(e) {
        if (submitted) return;
        const select = e.target;
        const para = select.getAttribute('data-heading-para');
        const value = select.value;
        const key = `${currentArticleIdx}_heading_${para}`;
        if (value) userAnswers[key] = value;
        else delete userAnswers[key];
    }
    
    function handleMatchChange(e) {
        if (submitted) return;
        const radio = e.target;
        const qid = parseInt(radio.getAttribute('data-match-id'));
        const value = radio.getAttribute('data-match-val');
        const key = `${currentArticleIdx}_match_${qid}`;
        if (radio.checked) {
            userAnswers[key] = value;
            const allRadios = document.querySelectorAll(`input[name="${radio.name}"]`);
            allRadios.forEach(r => { if (r !== radio && r.checked) r.checked = false; });
        }
    }
    
    function handleFillInput(e) {
        if (submitted) return;
        const input = e.target;
        const qid = parseInt(input.getAttribute('data-fill-id'));
        const key = `${currentArticleIdx}_fill_${qid}`;
        userAnswers[key] = input.value.trim();
    }
    
    function renderCurrent() {
        if (articlesData.length === 0) return;
        let article = articlesData[currentArticleIdx];
        let artHtml = `<div class="article-wrapper"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-text">${formatArticleText(article.bodyText)}</div></div>`;
        document.getElementById('articleRenderArea').innerHTML = artHtml;
        let questionsHtml = renderQuestionsPanel(article);
        document.getElementById('questionsRenderArea').innerHTML = questionsHtml;
        attachQuestionEvents();
        reapplyHighlightFeature();
        updateTabBar();
    }
    
    function updateTabBar() {
        let container = document.getElementById('articleSwitchContainer');
        let btnsHtml = '';
        for (let i = 0; i < articlesData.length; i++) {
            let activeClass = (i === currentArticleIdx) ? 'active-article' : '';
            btnsHtml += `<button class="nav-article-btn ${activeClass}" data-idx="${i}">P${i+1} · CRSP</button>`;
        }
        container.innerHTML = btnsHtml;
        document.getElementById('articleCountInfo').innerHTML = `${articlesData.length} 篇文章 (每篇20分钟)`;
        document.querySelectorAll('.nav-article-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (submitted) { alert("已提交答案，请清空后再切换"); return; }
                let idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && idx !== currentArticleIdx) {
                    currentArticleIdx = idx;
                    renderCurrent();
                }
            });
        });
    }
    
    // 高亮功能
    function handleTextSelection(e) {
        if (submitted) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('articleRenderArea');
        if (!container.contains(range.commonAncestorContainer)) return;
        try {
            const span = document.createElement('span');
            span.className = 'highlight';
            range.surroundContents(span);
            selection.removeAllRanges();
        } catch (err) { }
    }
    
    function handleContextMenuCustom(e) {
        if (submitted) return;
        let target = e.target;
        let highlightSpan = null;
        const articlePane = document.getElementById('articleRenderArea');
        while (target && target !== articlePane) {
            if (target.classList && target.classList.contains('highlight')) {
                highlightSpan = target;
                break;
            }
            target = target.parentElement;
        }
        if (!highlightSpan) return;
        e.preventDefault();
        if (currentContextMenu) currentContextMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        const deleteOption = document.createElement('div');
        deleteOption.className = 'context-menu-item';
        deleteOption.textContent = '🗑️ Delete highlight';
        deleteOption.onclick = (ev) => {
            ev.stopPropagation();
            const parent = highlightSpan.parentNode;
            const text = document.createTextNode(highlightSpan.textContent);
            parent.replaceChild(text, highlightSpan);
            parent.normalize();
            menu.remove();
            currentContextMenu = null;
        };
        menu.appendChild(deleteOption);
        document.body.appendChild(menu);
        currentContextMenu = menu;
        setTimeout(() => {
            const closeHandler = () => { if(currentContextMenu){ currentContextMenu.remove(); currentContextMenu=null; } document.removeEventListener('click', closeHandler); };
            document.addEventListener('click', closeHandler);
        }, 0);
    }
    
    function initHighlightFeature() {
        const pane = document.getElementById('leftArticlePane');
        pane.removeEventListener('mouseup', handleTextSelection);
        pane.addEventListener('mouseup', handleTextSelection);
        pane.removeEventListener('contextmenu', handleContextMenuCustom);
        pane.addEventListener('contextmenu', handleContextMenuCustom);
    }
    function reapplyHighlightFeature() { initHighlightFeature(); }
    
    // 提交汇总
    function computeResults() {
        let report = "";
        for (let idx = 0; idx < articlesData.length; idx++) {
            report += `\n📄 P${idx+1}: Investment in Shares vs. Other Assets\n─────────────────────\n`;
            let headingKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_heading_`)).sort();
            let matchKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_match_`)).sort();
            let fillKeys = Object.keys(userAnswers).filter(k => k.startsWith(`${idx}_fill_`)).sort();
            for (let key of headingKeys) {
                let para = key.split('_')[2];
                let val = userAnswers[key];
                report += `  Paragraph ${para}: heading ${val}\n`;
            }
            for (let key of matchKeys) {
                let qid = key.split('_')[2];
                let val = userAnswers[key];
                let name = "";
                if (val === "A") name = "Fisher and Lorie";
                else if (val === "B") name = "Myron Scholes";
                else if (val === "C") name = "Eugene Fama";
                else if (val === "D") name = "Robert Shiller";
                report += `  ${qid}. ${name}\n`;
            }
            for (let key of fillKeys) {
                let qid = key.split('_')[2];
                let ans = userAnswers[key] || "(未作答)";
                report += `  ${qid}. ${ans}\n`;
            }
            if (headingKeys.length === 0 && matchKeys.length === 0 && fillKeys.length === 0) report += `  (未作答任何题目)\n`;
            report += `\n`;
        }
        return report;
    }
    
    document.getElementById('submitAllBtn').onclick = () => {
        if (submitted) return alert("已经提交过了");
        submitted = true;
        stopTimer();
        let resultStr = computeResults();
        let panel = document.getElementById('resultPanel');
        panel.innerHTML = `<div class="result-header">📊 答题汇总</div>
        <div class="copy-area">${resultStr.replace(/\n/g, '<br>')}</div>
        <div style="margin-top:20px; display:flex; gap:15px; justify-content:center;">
            <button id="copyResultsBtn" class="ctrl-btn">📋 复制答案</button>
            <button id="closeResultBtn" class="ctrl-btn reset-btn">关闭</button>
        </div>`;
        panel.style.display = 'block';
        document.getElementById('copyResultsBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(computeResults()); alert("答案已复制"); });
        document.getElementById('closeResultBtn')?.addEventListener('click', () => { panel.style.display = 'none'; });
        document.getElementById('submitAllBtn').disabled = true;
        document.querySelectorAll('select, input').forEach(el => el.disabled = true);
    };
    
    document.getElementById('clearAllBtn').onclick = () => {
        if(confirm("清空所有已填答案？")) {
            userAnswers = {};
            submitted = false;
            document.getElementById('submitAllBtn').disabled = false;
            document.getElementById('resultPanel').style.display = 'none';
            renderCurrent();
            refreshTimer();
        }
    };
    
    renderCurrent();
    refreshTimer();
    initHighlightFeature();
</script>
</body>
</html>
